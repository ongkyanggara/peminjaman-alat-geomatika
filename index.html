            { id: 'RB-001-009', category: 'Aksesoris', name: 'Rambu Ukur (5 m)', total: 9, available: 9 },
            { id: 'TM-001-035', category: 'Aksesoris', name: 'Tripod / Statip', total: 35, available: 35 },
            { id: 'PC-001', category: 'Multimedia', name: 'PC Acer Veriton', total: 1, available: 1 },
            { id: 'PC-002', category: 'Multimedia', name: 'PC Acer Veriton', total: 1, available: 1 },
            { id: 'LP-001', category: 'Multimedia', name: 'Laptop Dell', total: 1, available: 1 }
        ];

        const calculateInventory = (txData, baseInv) => {
            let currentInventory = JSON.parse(JSON.stringify(baseInv));
            txData.forEach(trx => {
                if (trx.status === 'active' && trx.items) {
                    trx.items.forEach(bItem => {
                        const itemId = bItem.kode || (bItem.name && bItem.name.match(/\[(.*?)\]/) ? bItem.name.match(/\[(.*?)\]/)[1] : null);
                        const qty = parseInt(bItem.jumlah || bItem.quantity);
                        
                        if (itemId) {
                            const invIndex = currentInventory.findIndex(i => i.id === itemId);
                            if (invIndex !== -1) {
                                currentInventory[invIndex].available -= qty;
                            }
                        }
                    });
                }
            });
            return currentInventory;
        };

        function App() {
            const localSavedTx = JSON.parse(localStorage.getItem('lab_transactions_v2') || '[]');
            const localSavedInv = JSON.parse(localStorage.getItem('lab_inventory_v2') || JSON.stringify(initialInventory));
            
            const [isAppLoading, setIsAppLoading] = useState(localSavedTx.length === 0);
            const [isSyncing, setIsSyncing] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [transactions, setTransactions] = useState(localSavedTx);
            const [baseInventory, setBaseInventory] = useState(localSavedInv);
            const [inventory, setInventory] = useState(() => calculateInventory(localSavedTx, localSavedInv));
            
            const [filterCategory, setFilterCategory] = useState('Semua');
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [showAddForm, setShowAddForm] = useState(false);
            const [newItemForm, setNewItemForm] = useState({ id: '', category: '', name: '', total: 1 });

            const [txFilter, setTxFilter] = useState('Semua');
            const [txLimit, setTxLimit] = useState(10);
            const [analysisMonth, setAnalysisMonth] = useState('Semua');

            const fileInputRef = useRef(null);
            const feedbackFileInputRef = useRef(null);
            const [currentTime, setCurrentTime] = useState(new Date());

            // --- PENGATURAN LINK DATABASE ---
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPlSeyXWP0ALhXp4VqJ_NUmB433jHqLUn4hButn2UFzHu2J9hOfEeRlj-Zdky0TA_b/exec'; 
            const GOOGLE_SCRIPT_INV_FEEDBACK_URL = 'https://script.google.com/macros/s/AKfycbwGry5HOdHq2v6NmPoOIdDbQYAXAjupfbyeHwRyIK1ymGVJMf2-g0S8CiwjOZm-JF6v/exec'; 
            
            const ACTIVE_INV_URL = GOOGLE_SCRIPT_INV_FEEDBACK_URL || GOOGLE_SCRIPT_URL;

            const [borrowForm, setBorrowForm] = useState({
                borrowerName: '', nim: '', purpose: '', praktikumCourse: '', praktikumClass: '', praktikumLayanan: '',
                borrowDate: new Date().toISOString().split('T')[0], borrowTime: '',
                returnDateEst: '', returnTimeEst: '',
                items: [{ itemId: '', quantity: 1 }],
                approvalFileName: '', fileBase64: '', mimeType: ''
            });

            // STATE KOTAK SARAN
            const [feedbackForm, setFeedbackForm] = useState({ name: '', category: '', message: '' });
            const [isSubmittingFeedback, setIsSubmittingFeedback] = useState(false);

            const [notification, setNotification] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const parseRealDate = (dateString) => {
                if (!dateString) return new Date();
                if (typeof dateString === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateString.trim())) {
                    const parts = dateString.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                }
                const d = new Date(dateString);
                return isNaN(d.getTime()) ? new Date() : d;
            };

            const formatDate = (dateString) => {
                if (!dateString) return '-';
                const d = parseRealDate(dateString);
                return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            };

            const formatDay = (dateString) => {
                if (!dateString) return '-';
                const d = parseRealDate(dateString);
                return d.toLocaleDateString('id-ID', { weekday: 'long' });
            };

            const formatTimeStr = (timeStr) => {
                if (!timeStr) return '-';
                if (typeof timeStr === 'string' && timeStr.includes('T')) {
                    try {
                        const d = new Date(timeStr);
                        if (!isNaN(d.getTime())) {
                            return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\./g, ':');
                        }
                    } catch(e) {}
                }
                if (typeof timeStr === 'string') {
                    const tMatch = timeStr.match(/(\d{1,2})[:\.](\d{1,2})/);
                    if (tMatch) {
                        return `${tMatch[1].padStart(2, '0')}:${tMatch[2].padStart(2, '0')}`;
                    }
                }
                try {
                    const d = new Date(timeStr);
                    if (!isNaN(d.getTime())) {
                        return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\./g, ':');
                    }
                } catch(e) {}
                
                return String(timeStr).substring(0, 5); 
            };

            const getLatenessString = (ms) => {
                const totalSecs = Math.floor(ms / 1000);
                if (totalSecs <= 0) return "Beberapa detik";
                
                const d = Math.floor(totalSecs / (60 * 60 * 24));
                const h = Math.floor((totalSecs % (60 * 60 * 24)) / (60 * 60));
                const m = Math.floor((totalSecs % (60 * 60)) / 60);
                const s = totalSecs % 60;
                
                let strArr = [];
                if (d > 0) {
                    strArr.push(`${d} Hari`);
                    if (h > 0) strArr.push(`${h} Jam`);
                } else if (h > 0) {
                    strArr.push(`${h} Jam`);
                    if (m > 0) strArr.push(`${m} Menit`);
                } else if (m > 0) {
                    strArr.push(`${m} Menit`);
                    if (s > 0) strArr.push(`${s} Detik`);
                } else {
                    strArr.push(`${s} Detik`);
                }
                return strArr.join(' ');
            };

            const parseTargetDate = (dateStr, timeStr) => {
                const target = parseRealDate(dateStr);
                let h = 23, m = 59;
                const tStr = String(timeStr || '').replace(/['"]/g, '').trim();
                
                if (tStr.includes('T')) {
                    const td = new Date(tStr);
                    if (!isNaN(td.getTime())) {
                        h = td.getHours();
                        m = td.getMinutes();
                    }
                } else {
                    const match = tStr.match(/(\d{1,2})[:\.](\d{1,2})/);
                    if (match) {
                        h = parseInt(match[1], 10);
                        m = parseInt(match[2], 10);
                    }
                }
                target.setHours(h, m, 0, 0);
                return target;
            };

            const getMonthYear = (dateStr) => {
                if (!dateStr) return '';
                const d = parseRealDate(dateStr);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            };

            const formatMonthYearText = (yyyymm) => {
                if (!yyyymm || yyyymm === 'Semua') return 'Keseluruhan Waktu';
                const [y, m] = yyyymm.split('-');
                const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
                return `${monthNames[parseInt(m) - 1]} ${y}`;
            };

            const renderCountdownBadge = (returnDateEst, returnTimeEst, status) => {
                if (status && status.startsWith('completed')) {
                    let isLate = false;
                    let latenessStr = "";
                    let returnedDateUI = null;
                    
                    if (status.includes('|')) {
                        const safeISOString = status.split('|')[1].replace(' ', 'T');
                        const returnTimestamp = new Date(safeISOString);
                        const targetDate = parseTargetDate(returnDateEst, returnTimeEst);
                        const diffMs = returnTimestamp.getTime() - targetDate.getTime();
                        
                        const timeAccurate = returnTimestamp.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false}).replace(/\./g, ':');

                        returnedDateUI = (
                            <div className="mt-2 pt-2 border-t border-gray-300/50 w-full text-center">
                                <p className="text-[9px] text-gray-500 font-bold uppercase tracking-wider mb-1">Dikembalikan Pada:</p>
                                <div className="flex justify-center items-center gap-1.5 text-xs text-gray-700">
                                    <span className="font-semibold">{formatDate(returnTimestamp.toISOString())}</span>
                                    <span className="font-mono font-black bg-white px-1.5 py-0.5 rounded shadow-sm tracking-widest text-[10px]">{timeAccurate} WIB</span>
                                </div>
                            </div>
                        );

                        if (diffMs > 0) {
                            isLate = true;
                            latenessStr = getLatenessString(diffMs);
                        }
                    }

                    if (isLate) {
                        return (
                            <div className="flex flex-col items-center justify-center bg-red-50 p-2.5 rounded-xl border border-red-200 w-max mx-auto shadow-sm">
                                <span className="bg-red-500 text-white px-3 py-1 rounded-md text-xs font-black shadow-sm w-full text-center tracking-wide uppercase">
                                    <i className="fas fa-times-circle mr-1"></i> Terlambat
                                </span>
                                <span className="text-[10px] font-bold text-red-600 mt-1.5 bg-red-100/80 px-2 py-0.5 rounded-full border border-red-200">
                                    Telat: {latenessStr}
                                </span>
                                {returnedDateUI}
                            </div>
                        );
                    } else {
                        return (
                            <div className="flex flex-col items-center justify-center bg-green-50 p-2.5 rounded-xl border border-green-200 w-max mx-auto shadow-sm">
                                <span className="bg-green-500 text-white px-3 py-1 rounded-md text-xs font-black shadow-sm w-full text-center tracking-wide uppercase">
                                    <i className="fas fa-check-circle mr-1"></i> Tepat Waktu
                                </span>
                                {returnedDateUI}
                                {!returnedDateUI && (
                                    <span className="text-[9px] text-green-600 font-medium italic mt-1">(Data lama)</span>
                                )}
                            </div>
                        );
                    }
                }

                const targetDate = parseTargetDate(returnDateEst, returnTimeEst);
                const diffMs = targetDate.getTime() - currentTime.getTime();

                if (diffMs <= 0) {
                    const latenessStr = getLatenessString(Math.abs(diffMs));
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-red-100 text-red-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm border border-red-200 w-max text-center animate-pulse">
                                <i className="fas fa-times-circle mr-1"></i> Terlambat
                            </span>
                            <span className="text-[10px] font-bold text-white bg-red-500 px-2 py-0.5 rounded shadow-sm tracking-wide">
                                Telat {latenessStr}
                            </span>
                        </div>
                    );
                }

                const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diffMs % (1000 * 60)) / 1000);
                const timeString = `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

                if (days > 2) {
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-green-50 text-green-700 px-3 py-1 rounded-full text-[11px] font-bold border border-green-200 w-max text-center">Aman (H-{days})</span>
                            <span className="bg-white border border-gray-200 text-gray-600 px-2 py-0.5 rounded shadow-sm text-[11px] font-mono font-black tracking-widest flex items-center">
                                <i className="fas fa-hourglass-half mr-1.5 text-blue-400"></i>{timeString}
                            </span>
                        </div>
                    );
                } else if (days > 0) {
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-yellow-50 text-yellow-700 px-3 py-1 rounded-full text-[11px] font-bold border border-yellow-300 w-max text-center">Mendekati (H-{days})</span>
                            <span className="bg-white border border-yellow-200 text-yellow-700 px-2 py-0.5 rounded shadow-sm text-[11px] font-mono font-black tracking-widest flex items-center">
                                <i className="fas fa-hourglass-half mr-1.5 text-yellow-500"></i>{timeString}
                            </span>
                        </div>
                    );
                } else {
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-[11px] font-bold border border-orange-300 w-max text-center">
                                <i className="fas fa-exclamation-triangle mr-1"></i> Hari Ini
                            </span>
                            <span className="bg-orange-500 text-white px-2 py-0.5 rounded shadow-sm text-[11px] font-mono font-black tracking-widest flex items-center animate-pulse">
                                <i className="fas fa-stopwatch mr-1.5"></i>{timeString}
                            </span>
                        </div>
                    );
                }
            };

            useEffect(() => {
                localStorage.setItem('lab_transactions_v2', JSON.stringify(transactions));
                localStorage.setItem('lab_inventory_v2', JSON.stringify(baseInventory));
            }, [transactions, baseInventory]);

            // FETCH DATA DARI KEDUA SPREADSHEET
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);

                const fetchDatabase = async () => {
                    setIsSyncing(true);
                    try {
                        const cacheBuster = '?t=' + new Date().getTime();
                        
                        const txResponsePromise = fetch(GOOGLE_SCRIPT_URL + cacheBuster).then(res => res.json()).catch(() => ({ error: "Fetch TX failed" }));
                        
                        let invResponsePromise;
                        if (GOOGLE_SCRIPT_INV_FEEDBACK_URL) {
                            invResponsePromise = fetch(GOOGLE_SCRIPT_INV_FEEDBACK_URL + cacheBuster).then(res => res.json()).catch(() => null);
                        } else {
                            invResponsePromise = Promise.resolve(null);
                        }

                        const [txRawData, invRawData] = await Promise.all([txResponsePromise, invResponsePromise]);
                        
                        const currentLocalInv = JSON.parse(localStorage.getItem('lab_inventory_v2') || JSON.stringify(initialInventory));
                        let txData = [];
                        let invData = [];

                        if (txRawData && !txRawData.error) {
                            if (Array.isArray(txRawData)) {
                                txData = txRawData;
                            } else {
                                txData = txRawData.transactions || [];
                            }
                        }

                        let activeInvSource = invRawData && invRawData.inventory ? invRawData.inventory : (txRawData && txRawData.inventory ? txRawData.inventory : null);

                        if (activeInvSource && activeInvSource.length > 0) {
                            const serverInv = activeInvSource.map(item => ({
                                id: item.id, category: item.category, name: item.name, 
                                total: item.total, available: item.total, isLocalOnly: false 
                            }));
                            
                            // Ambil seluruh item lokal yang belum ada di server (spreadsheet)
                            const unsyncedItems = currentLocalInv.filter(i => !serverInv.some(s => s.id === i.id));
                            const markedUnsynced = unsyncedItems.map(i => ({...i, isLocalOnly: true}));

                            invData = [...serverInv, ...markedUnsynced];

                            markedUnsynced.forEach(item => {
                                fetch(ACTIVE_INV_URL, {
                                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                    body: JSON.stringify({ action: "addInventory", item: item })
                                }).catch(() => {});
                            });
                        } else {
                            const markedUnsynced = currentLocalInv.map(i => ({...i, isLocalOnly: true}));
                            invData = markedUnsynced;
                            
                            markedUnsynced.forEach(item => {
                                fetch(ACTIVE_INV_URL, {
                                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                    body: JSON.stringify({ action: "addInventory", item: item })
                                }).catch(() => {});
                            });
                        }

                        const formattedTx = txData.map(trx => ({
                            ...trx,
                            borrowDateFormatted: new Date(trx.borrowDate).toLocaleDateString('id-ID')
                        }));

                        setTransactions(formattedTx);
                        setBaseInventory(invData);
                        setInventory(calculateInventory(formattedTx, invData));
                        
                    } catch (error) {
                        console.error("Gagal terhubung ke Spreadsheet:", error);
                    } finally {
                        setIsAppLoading(false);
                        setIsSyncing(false);
                    }
                };

                fetchDatabase();
                return () => clearInterval(timer);
            }, []);

            const handleShareLink = () => {
                const url = window.location.href; 
                navigator.clipboard.writeText(url).then(() => {
                    showNotification('Tautan aplikasi berhasil disalin!', 'success');

                        other.id !== item.id &&
                        timeToMins(other.start) < endMins && 
                        timeToMins(other.end) > startMins
                    );
                    return { ...item, startMins, endMins, isOverlap: overlaps.length > 0 };
                }).sort((a, b) => a.startMins - b.startMins);

                const todayDay = currentTime.getDay() || 7; // Sunday = 7
                const currentMins = currentTime.getHours() * 60 + currentTime.getMinutes();

                let nextPracticum = null;
                let minMinsAway = Infinity;
                const activePracticums = [];

                processedSchedule.forEach(item => {
                    if (item.day === todayDay && currentMins >= item.startMins && currentMins <= item.endMins) {
                        activePracticums.push(item);
                    }

                    let dayDiff = item.day - todayDay;
                    if (dayDiff < 0) dayDiff += 7;
                    let minsAway = (dayDiff * 24 * 60) + item.startMins - currentMins;
                    
                    if (dayDiff === 0 && item.startMins <= currentMins) {
                        minsAway += 7 * 24 * 60;
                    }

                    if (minsAway > 0 && minsAway < minMinsAway) {
                        minMinsAway = minsAway;
                        nextPracticum = item;
                    }
                });

                const formatCountdown = (totalMins) => {
                    const d = Math.floor(totalMins / (24 * 60));
                    const h = Math.floor((totalMins % (24 * 60)) / 60);
                    const m = totalMins % 60;
                    let str = [];
                    if (d > 0) str.push(`${d} Hari`);
                    if (h > 0) str.push(`${h} Jam`);
                    str.push(`${m} Menit`);
                    return str.join(' ');
                };

                const daysOfWeek = [
                    { id: MONDAY, name: 'Senin' },
                    { id: TUESDAY, name: 'Selasa' },
                    { id: WEDNESDAY, name: 'Rabu' },
                    { id: THURSDAY, name: 'Kamis' },
                    { id: FRIDAY, name: 'Jumat' }
                ];

                const renderDayColumn = (dayId, dayName) => {
                    const isToday = todayDay === dayId;
                    const dayItems = processedSchedule.filter(i => i.day === dayId);

                    return (
                        <div key={dayId} className={`flex flex-col rounded-xl border ${isToday ? 'border-blue-400 bg-blue-50/20 shadow-md ring-1 ring-blue-400' : 'border-gray-200 bg-gray-50/50'} overflow-hidden`}>
                            <div className={`p-3 text-center font-bold text-sm ${isToday ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'}`}>
                                {dayName} {isToday && <span className="ml-2 text-[10px] bg-white/20 px-2 py-0.5 rounded-full tracking-wider">HARI INI</span>}
                            </div>
                            <div className="p-3 flex flex-col gap-3">
                                {dayItems.length === 0 ? (
                                    <p className="text-center text-xs text-gray-400 italic py-4">Kosong</p>
                                ) : dayItems.map(item => {
                                    let status = 'upcoming';
                                    if (dayId < todayDay || (dayId === todayDay && item.endMins < currentMins)) status = 'past';
                                    else if (dayId === todayDay && currentMins >= item.startMins && currentMins <= item.endMins) status = 'current';

                                    let bg = 'bg-white hover:bg-blue-50/50 transition-colors';
                                    let border = 'border-blue-200';
                                    let iconColor = 'text-blue-500';
                                    let badgeBg = 'bg-blue-100 text-blue-700';
                                    let badgeText = 'Akan Datang';
                                    let extraClasses = '';

                                    if (status === 'past') {
                                        bg = 'bg-gray-50 opacity-50';
                                        border = 'border-gray-200';
                                        badgeBg = 'bg-gray-200 text-gray-500';
                                        iconColor = 'text-gray-400';
                                        badgeText = 'Selesai';
                                    } else if (item.isOverlap) {
                                        bg = 'bg-red-50';
                                        border = 'border-red-300';
                                        iconColor = 'text-red-500';
                                        badgeBg = 'bg-red-500 text-white';
                                        badgeText = status === 'current' ? 'BERLANGSUNG (BENTROK)' : 'BENTROK';
                                        extraClasses = status === 'current' ? 'relative z-10 transform scale-[1.02] transition-all shadow-md' : '';
                                    } else if (status === 'current') {
                                        bg = 'bg-gradient-to-br from-green-50 to-green-100';
                                        border = 'border-green-400';
                                        iconColor = 'text-green-700';
                                        badgeBg = 'bg-green-600 text-white animate-pulse shadow-sm';
                                        badgeText = 'SEDANG BERLANGSUNG';
                                        extraClasses = 'relative z-10 transform scale-[1.02] transition-all shadow-md ring-2 ring-green-500';
                                    }

                                    return (
                                        <div key={item.id} className={`p-3 rounded-lg border ${bg} ${border} shadow-sm relative flex flex-col ${extraClasses}`}>
                                            {status === 'current' && <div className="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full animate-ping"></div>}
                                            
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-xs font-black text-gray-800 leading-tight pr-2">{item.course}</span>
                                                <span className="text-[10px] font-black px-1.5 py-0.5 rounded bg-white border shadow-sm flex-shrink-0">{item.class}</span>
                                            </div>
                                            <div className={`flex items-center text-[11px] font-mono font-bold mt-1 ${iconColor}`}>
                                                <i className="far fa-clock mr-1.5"></i>
                                                {item.start} - {item.end}
                                            </div>
                                            <div className="mt-2 pt-2 border-t border-black/5">
                                                <span className={`text-[9px] font-bold px-2 py-0.5 rounded shadow-sm w-max block text-center ${badgeBg}`}>
                                                    {badgeText}
                                                </span>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex justify-between items-end border-b pb-2">
                            <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                Dashboard Monitoring 
                                {isSyncing && <i className="fas fa-sync fa-spin text-blue-500 text-sm ml-3" title="Sinkronisasi Data..."></i>}
                            </h2>
                            <div className="text-right bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm flex items-center gap-3">
                                <i className="far fa-clock text-blue-500 text-xl animate-pulse"></i>
                                <div>
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">{currentTime.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' })}</p>
                                    <p className="text-xl font-black text-blue-600 font-mono tracking-widest">{currentTime.toLocaleTimeString('id-ID', { hour12: false })}</p>
                                </div>
                            </div>
                        </div>

                        {/* BANNER: Mendekati Deadline */}
                        {mendekatiDeadlineCount > 0 && (
                            <div className="bg-yellow-50 border-l-4 border-yellow-500 p-4 rounded-r-xl flex items-center shadow-sm">
                                <i className="fas fa-exclamation-circle text-yellow-500 text-2xl mr-4"></i>
                                <div>
                                    <p className="text-sm text-yellow-800 font-bold">Perhatian: Ada alat yang mendekati jatuh tempo!</p>
                                    <p className="text-xs text-yellow-700">Sebanyak <span className="font-black text-lg">{mendekatiDeadlineCount}</span> alat akan segera mencapai batas waktu pengembalian kurang dari 48 Jam. Cek tabel di bawah.</p>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1 leading-tight">Total Semua Inventaris</p><p className="text-3xl font-black text-gray-800">{grandTotalAlat}</p></div>
                                    <div className="bg-indigo-100 p-3 rounded-lg text-indigo-600 flex-shrink-0 ml-2"><i className="fas fa-warehouse text-xl"></i></div>
                                </div>
                            </div>
                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1 leading-tight">Total Alat Utama Survei Geomatika</p><p className="text-3xl font-black text-gray-800">{totalAlat}</p></div>
                                    <div className="bg-blue-100 p-3 rounded-lg text-blue-600 flex-shrink-0 ml-2"><i className="fas fa-boxes text-xl"></i></div>
                                </div>
                            </div>
                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1 leading-tight">Ketersediaan Alat Utama</p><p className="text-3xl font-black text-green-600">{persenTersedia}%</p></div>
                                    <div className="bg-green-100 p-3 rounded-lg text-green-600 flex-shrink-0 ml-2"><i className="fas fa-check-circle text-xl"></i></div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5 mt-4"><div className="bg-green-500 h-1.5 rounded-full" style={{width: `${persenTersedia}%`}}></div></div>
                            </div>
                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1 leading-tight">Sedang Dipinjam</p><p className="text-3xl font-black text-orange-500">{persenDipinjam}%</p></div>
                                    <div className="bg-orange-100 p-3 rounded-lg text-orange-600 flex-shrink-0 ml-2"><i className="fas fa-exchange-alt text-xl"></i></div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5 mt-4"><div className="bg-orange-500 h-1.5 rounded-full" style={{width: `${persenDipinjam}%`}}></div></div>
                            </div>
                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1 leading-tight">Risiko Terlambat</p><p className="text-3xl font-black text-red-500">{persenTerlambat}%</p></div>
                                    <div className="bg-red-100 p-3 rounded-lg text-red-600 flex-shrink-0 ml-2"><i className="fas fa-exclamation-triangle text-xl"></i></div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5 mt-4"><div className="bg-red-500 h-1.5 rounded-full" style={{width: `${persenTerlambat}%`}}></div></div>
                            </div>
                        </div>

                        {/* --- BAGIAN BARU: JADWAL PRAKTIKUM --- */}
                        <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                            <div className="flex flex-col md:flex-row justify-between md:items-end mb-6 gap-4">
                                <h3 className="text-lg font-bold text-gray-800">
                                    <i className="fas fa-calendar-week text-indigo-500 mr-2"></i> Jadwal Praktikum Laboratorium Geomatika
                                </h3>
                                <div className="flex gap-3 text-[10px] font-bold uppercase tracking-wider">
                                    <div className="flex items-center"><span className="w-3 h-3 bg-gray-200 rounded-sm mr-1.5"></span> Selesai</div>
                                    <div className="flex items-center"><span className="w-3 h-3 bg-green-500 rounded-sm mr-1.5"></span> Berjalan</div>
                                    <div className="flex items-center"><span className="w-3 h-3 bg-white border border-blue-200 rounded-sm mr-1.5"></span> Mendatang</div>
                                    <div className="flex items-center"><span className="w-3 h-3 bg-red-500 rounded-sm mr-1.5"></span> Bentrok</div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                <div className="bg-green-50 border border-green-200 p-4 rounded-xl flex items-center shadow-sm">
                                    <div className="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white text-xl mr-4 shadow-md relative">
                                        <i className="fas fa-play"></i>
                                        {activePracticums.length > 0 && <span className="absolute top-0 right-0 w-3 h-3 bg-green-300 rounded-full animate-ping"></span>}
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-green-700 font-bold uppercase tracking-wider mb-1">Status Real-Time</p>
                                        <p className="text-sm font-black text-green-900 leading-tight">
                                            {activePracticums.length > 0 
                                                ? `${activePracticums.length} Praktikum Sedang Berlangsung` 
                                                : 'Tidak ada praktikum yang berjalan saat ini'}
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl flex items-center shadow-sm">
                                    <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white text-xl mr-4 shadow-md">
                                        <i className="fas fa-forward"></i>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-blue-700 font-bold uppercase tracking-wider mb-1">Praktikum Berikutnya</p>
                                        <p className="text-sm font-black text-blue-900 leading-tight">
                                            {nextPracticum 
                                                ? `${nextPracticum.course} (${nextPracticum.class})` 
                                                : 'Tidak ada jadwal tersisa minggu ini'}
                                        </p>
                                        {nextPracticum && (
                                            <p className="text-[10px] text-blue-800 font-bold mt-1 bg-white px-2 py-0.5 w-max rounded shadow-sm">
                                                Mulai dalam {formatCountdown(minMinsAway)}
                                            </p>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
                                {daysOfWeek.map(d => renderDayColumn(d.id, d.name))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                            {/* Distribusi Alat */}
                            <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                                <h3 className="text-lg font-bold text-gray-800 mb-6">Distribusi Alat Utama</h3>
                                <div className="flex flex-col md:flex-row items-center gap-8 my-auto">
                                    <div className="w-40 h-40 rounded-full shadow-inner relative flex-shrink-0" style={pieStyle}>
                                        <div className="absolute inset-0 m-auto w-24 h-24 bg-white rounded-full flex flex-col items-center justify-center shadow-sm">
                                            <span className="font-bold text-gray-800 text-xl">{totalAlat}</span>
                                            <span className="text-gray-500 text-[10px] font-bold uppercase">Total Alat</span>
                                        </div>
                                    </div>
                                    <div className="w-full space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                                        {categoryStats.map((stat, i) => (
                                            <div key={stat.category} className="flex items-center justify-between text-sm">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-3 h-3 rounded-full block flex-shrink-0" style={{backgroundColor: chartColors[i % chartColors.length]}}></span>
                                                    <span className="text-gray-600 font-medium truncate max-w-[120px]" title={stat.category}>{stat.category}</span>
                                                </div>
                                                <span className="font-bold text-gray-800">{totalAlat === 0 ? 0 : Math.round((stat.total/totalAlat)*100)}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Top Alat */}
                            <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                                <h3 className="text-lg font-bold text-gray-800 mb-4"><i className="fas fa-fire text-orange-500 mr-2"></i> Alat Paling Sering Dipinjam</h3>
                                {topItems.length === 0 ? (
                                    <p className="text-gray-400 text-sm italic py-4 text-center">Belum ada data peminjaman.</p>
                                ) : (
                                    <ul className="divide-y divide-gray-100">
                                        {topItems.map((item, idx) => (
                                            <li key={idx} className="py-3 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${idx === 0 ? 'bg-yellow-100 text-yellow-700' : idx === 1 ? 'bg-slate-200 text-slate-700' : idx === 2 ? 'bg-orange-100 text-orange-800' : 'bg-gray-50 text-gray-500'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div><p className="text-sm font-bold text-gray-800">{item.name}</p></div>
                                                </div>
                                                
                                                <div className="text-right flex flex-col items-end gap-1">
                                                    <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold w-max">{item.count} (kali)</span>
                                                    <span className="text-[10px] font-bold text-slate-500"><i className="fas fa-history mr-1 text-slate-400"></i>Load: {item.hours} Jam</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>

                        {/* --- ANALISIS CERDAS JENIS PEMINJAMAN --- */}
                        <div className="mt-6 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                            <div className="flex flex-col md:flex-row justify-between md:items-center mb-6 gap-4">
                                <h3 className="text-lg font-bold text-gray-800">
                                    <i className="fas fa-chart-line text-indigo-500 mr-2"></i> Analisis Cerdas Jenis Peminjaman
                                </h3>
                                <div className="flex gap-3 items-center">
                                    <span className="text-sm font-bold text-gray-500">Filter Periode:</span>
                                    <select className="p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 font-medium cursor-pointer" value={analysisMonth} onChange={e => setAnalysisMonth(e.target.value)}>
                                        <option value="Semua">Keseluruhan Waktu</option>
                                        {availableMonths.map(m => (
                                            <option key={m} value={m}>{formatMonthYearText(m)}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-xl flex flex-col justify-center items-start">
                                    <p className="text-[10px] text-indigo-500 font-bold uppercase tracking-wider mb-1">Total Peminjaman</p>
                                    <div className="flex items-end gap-2">
                                        <span className="text-3xl font-black text-indigo-700">{totalFilteredTx}</span>
                                        {analysisMonth !== 'Semua' && (
                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded mb-1.5 ${trendPercent >= 0 ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800'}`}>
                                                {trendPercent > 0 ? '+' : ''}{trendPercent}% vs bulan lalu
                                            </span>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl md:col-span-2 flex flex-col justify-center">
                                    <p className="text-[10px] text-blue-500 font-bold uppercase tracking-wider mb-1">Aktivitas Paling Dominan</p>
                                    <p className="text-lg font-bold text-blue-800 leading-tight">{dominant ? dominant.name : '-'}</p>
                                    <p className="text-xs text-blue-600 font-medium mt-1"><i className="fas fa-wrench mr-1"></i>Alat andalan: <span className="font-bold">{dominant ? dominant.topTool.split(']')[1] || dominant.topTool : '-'}</span></p>
                                </div>

                                <div className="bg-orange-50 border border-orange-100 p-4 rounded-xl flex flex-col justify-center">
                                    <p className="text-[10px] text-orange-500 font-bold uppercase tracking-wider mb-1">Aktivitas Terendah</p>
                                    <p className="text-lg font-bold text-orange-800 leading-tight">{least && least.name !== dominant?.name ? least.name : '-'}</p>
                                </div>
                            </div>

                            <div className="bg-slate-800 text-white p-4 rounded-xl mb-6 shadow-sm flex items-start gap-3">
                                <i className="fas fa-robot text-yellow-400 text-2xl mt-0.5 animate-pulse"></i>
                                <div>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Analisis Penggunaan Alat Lab</p>
                                    <p className="text-sm font-medium leading-relaxed text-slate-200">{narrative}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {sortedCategoriesList.map((cat, i) => {
                                    const bgColors = ['bg-blue-500', 'bg-purple-500', 'bg-teal-500', 'bg-orange-500', 'bg-rose-500', 'bg-emerald-500'];
                                    const textColors = ['text-blue-700', 'text-purple-700', 'text-teal-700', 'text-orange-700', 'text-rose-700', 'text-emerald-700'];
                                    
                                    return (
                                        <div key={cat.name}>
                                            <div className="flex justify-between items-end mb-1.5">
                                                <span className="font-bold text-gray-800 text-base">{cat.name}</span>
                                                <div className="text-right">
                                                    <span className={`font-black ${textColors[i % 6]} text-lg`}>{cat.percent}%</span>
                                                    <span className="text-gray-400 font-semibold text-xs ml-1">({cat.count} kali)</span>
                                                </div>
                                            </div>
                                            <div className="w-full bg-gray-100 rounded-full h-3 mb-3 shadow-inner">
                                                <div className={`h-3 rounded-full ${bgColors[i % 6]}`} style={{width: `${cat.percent}%`}}></div>
                                            </div>
                                            
                                            {cat.subs.length > 0 && (
                                                <div className="pl-3 border-l-2 border-gray-200 space-y-2 mt-2">
                                                    {cat.subs.slice(0, 4).map((sub, j) => {
                                                        const subPercent = Math.round((sub.count / cat.count) * 100);
                                                        return (
                                                            <div key={j} className="flex justify-between items-center text-xs">
                                                                <span className="text-gray-600 truncate pr-2" title={sub.name}>{sub.name}</span>
                                                                <span className="text-gray-800 font-bold flex-shrink-0">{sub.count}x <span className="text-gray-400 font-medium text-[10px] w-8 inline-block text-right">{subPercent}%</span></span>
                                                            </div>
                                                        )
                                                    })}
                                                    {cat.subs.length > 4 && <div className="text-[10px] text-gray-400 italic">...dan {cat.subs.length - 4} jenis lainnya</div>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                                {sortedCategoriesList.length === 0 && <p className="text-gray-400 text-sm italic">Tidak ada data untuk dianalisis pada periode ini.</p>}
                            </div>
                        </div>

                        {/* Monitor Keterlambatan FULL WIDTH */}
                        <div className="mt-6 bg-white p-6 rounded-xl border border-red-200 shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-red-50 rounded-bl-full -z-10"></div>
                            <h3 className="text-lg font-bold text-red-700 mb-4"><i className="fas fa-bell mr-2"></i> Peringatan Sistem: Monitor Keterlambatan Aktif</h3>
                            {lateTx.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-8 text-green-500">
                                    <i className="fas fa-shield-check text-4xl mb-3 opacity-50"></i>
                                    <p className="text-sm font-medium">Luar biasa! Tidak ada yang terlambat hari ini.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {lateTx.map(trx => {
                                        const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                        const diffMs = currentTime.getTime() - targetDate.getTime();
                                        const latenessStr = getLatenessString(diffMs);

                                        return (
                                        <div key={trx.id} className="flex flex-col p-4 border border-red-100 bg-red-50/40 rounded-xl hover:bg-red-50 transition shadow-sm">
                                            <div className="flex justify-between items-start mb-2">
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-gray-800 text-sm">{trx.borrowerName}</span>
                                                    <span className="text-[11px] text-gray-500 font-medium mt-0.5">{trx.items.length} Macam Alat</span>
                                                </div>
                                                <span className="text-[10px] font-black text-white bg-red-500 px-2 py-1 rounded shadow-sm">
                                                    Telat {latenessStr}
                                                </span>
                                            </div>
                                            <div className="mt-auto border-t border-red-100 pt-2 flex flex-col gap-1">
                                                <span className="text-[9px] text-red-400 font-bold uppercase tracking-wider">Target Pengembalian Semula:</span>
                                                <div className="flex gap-2">
                                                    <span className="text-xs font-bold text-red-700"><i className="far fa-calendar-times mr-1"></i>{formatDate(trx.returnDateEst)}</span>
                                                    <span className="text-xs font-bold text-red-700 bg-white px-1.5 rounded shadow-sm font-mono"><i className="far fa-clock mr-1"></i>{formatTimeStr(trx.returnTimeEst)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )})}
                                </div>
                            )}
                        </div>

                        {/* SECTION 4: Peminjaman Berjalan */}
                        <div className="mt-6 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                            <h3 className="text-lg font-bold text-gray-800 mb-4"><i className="fas fa-tasks text-blue-500 mr-2"></i> Peminjaman Berjalan (Detail Peminjam)</h3>
                            {sortedActiveTx.length === 0 ? (
                                <p className="text-gray-400 text-sm italic py-6 text-center bg-gray-50 rounded-lg">Tidak ada peminjaman aktif.</p>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-50 text-slate-600 border-y border-slate-200">
                                            <tr>
                                                <th className="p-3 font-semibold">Info Peminjam</th>
                                                <th className="p-3 font-semibold text-left">Waktu Pinjam</th>
                                                <th className="p-3 font-semibold text-left">Batas Pengembalian</th>
                                                <th className="p-3 font-semibold">Ringkasan Alat</th>
                                                <th className="p-3 font-semibold text-center">Status / Jatuh Tempo</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {sortedActiveTx.map(trx => {
                                                let statusClassRow = "hover:bg-slate-50 transition-colors";

                                                if (trx.isLate) {
                                                    statusClassRow = "bg-red-50/30 hover:bg-red-50 transition-colors";
                                                } else {
                                                    const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                                    const diffDays = Math.floor((targetDate.getTime() - currentTime.getTime()) / (1000 * 60 * 60 * 24));
                                                    if (diffDays >= 0 && diffDays <= 2) {
                                                        statusClassRow = "bg-yellow-50/30 hover:bg-yellow-50 transition-colors";
                                                    }
                                                }

                                                return (
                                                <tr key={trx.id} className={statusClassRow}>
                                                    <td className="p-3 align-top">
                                                        <p className="font-bold text-gray-800">{trx.borrowerName}</p>
                                                        <p className="text-xs text-gray-500 mb-1">{trx.nim}</p>
                                                        <span className="inline-block bg-indigo-50 border border-indigo-100 text-indigo-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">{trx.purpose || 'Lainnya'}</span>
                                                    </td>
                                                    <td className="p-3 align-top whitespace-nowrap">
                                                        <div className="flex flex-col gap-2">
                                                            <div className="flex items-start text-blue-600 font-medium">
                                                                <i className="far fa-calendar-alt text-blue-500 w-5 text-center mt-0.5"></i>
                                                                <div className="flex flex-col ml-1">
                                                                    <span className="text-gray-800 font-bold">{formatDate(trx.borrowDate)}</span>
                                                                    <span className="text-[10px] text-gray-500 font-bold uppercase">{formatDay(trx.borrowDate)}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center text-blue-600 mt-0.5">
                                                                <i className="far fa-clock w-5 text-center"></i>
                                                                <span className="ml-1 bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md shadow-sm font-mono font-bold tracking-widest text-xs">{formatTimeStr(trx.borrowTime)} WIB</span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 align-top whitespace-nowrap">
                                                        <div className="flex flex-col gap-2">
                                                            <div className="flex items-start text-red-500 font-medium">
                                                                <i className="far fa-calendar-check text-red-500 w-5 text-center mt-0.5"></i>
                                                                <div className="flex flex-col ml-1">
                                                                    <span className="text-gray-800 font-bold">{formatDate(trx.returnDateEst)}</span>
                                                                    <span className="text-[10px] text-gray-500 font-bold uppercase">{formatDay(trx.returnDateEst)}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center text-red-500 mt-0.5">
                                                                <i className="far fa-clock w-5 text-center"></i>
                                                                <span className="ml-1 bg-red-50 text-red-700 px-2 py-0.5 rounded-md shadow-sm font-mono font-bold tracking-widest text-xs">{formatTimeStr(trx.returnTimeEst)} WIB</span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 text-gray-700 whitespace-normal min-w-[200px] align-top">
                                                        <div className="flex flex-col gap-1.5 w-max">
                                                            {trx.items && trx.items.map((i, idx) => (
                                                                <span key={idx} className="bg-white border border-gray-200 text-[11px] px-2.5 py-1 rounded shadow-sm text-gray-700 font-semibold w-full block">
                                                                    {i.nama ? `[${i.kode}] ${i.nama}` : i.name} <span className="text-blue-600 ml-1">({i.jumlah || i.quantity}x)</span>
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="p-3 text-center align-top">
                                                        {renderCountdownBadge(trx.returnDateEst, trx.returnTimeEst, trx.status)}
                                                    </td>
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

                        {/* --- KOTAK SARAN & MASUKAN --- */}
                        <div className="mt-8 bg-indigo-50/50 p-6 rounded-xl border border-indigo-100 shadow-sm relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 text-indigo-100 opacity-50">
                                <i className="fas fa-comments text-[150px]"></i>
                            </div>
                            <h3 className="text-lg font-bold text-indigo-900 mb-2 relative z-10">
                                <i className="fas fa-envelope-open-text text-indigo-600 mr-2"></i> Kotak Saran & Masukan
                            </h3>
                            <p className="text-xs text-indigo-700 mb-6 relative z-10">Bantu kami meningkatkan kualitas layanan Laboratorium Geomatika. Setiap masukan Anda sangat berarti bagi kami.</p>
                            
                            <form onSubmit={handleFeedbackSubmit} className="relative z-10 bg-white p-5 rounded-lg border border-indigo-50 shadow-sm">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Nama Lengkap (Opsional)</label>
                                        <input type="text" className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm" value={feedbackForm.name} onChange={e => setFeedbackForm({...feedbackForm, name: e.target.value})} placeholder="Boleh berikan nama atau anonim" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-700 mb-1">Kategori Saran <span className="text-red-500">*</span></label>
                                        <select required className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm bg-white cursor-pointer" value={feedbackForm.category} onChange={e => setFeedbackForm({...feedbackForm, category: e.target.value})}>
                                            <option value="" disabled>-- Pilih Kategori --</option>
                                            <option value="Kondisi & Kelengkapan Alat">Kondisi & Kelengkapan Alat</option>
                                            <option value="Fasilitas Laboratorium">Fasilitas Laboratorium</option>
                                            <option value="Pelayanan Staff/Asisten">Pelayanan Staff/Asisten</option>
                                            <option value="Sistem Peminjaman (Web)">Sistem Peminjaman (Aplikasi Web)</option>
                                            <option value="Lainnya">Lainnya</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="mb-4">
                                    <label className="block text-xs font-bold text-gray-700 mb-1">Pesan / Masukan <span className="text-red-500">*</span></label>
                                    <textarea required rows="4" className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm" value={feedbackForm.message} onChange={e => setFeedbackForm({...feedbackForm, message: e.target.value})} placeholder="Tuliskan saran, kritik, atau masukan Anda di sini..."></textarea>
                                </div>
                                <div className="flex justify-end">
                                    <button type="submit" disabled={isSubmittingFeedback || !GOOGLE_SCRIPT_INV_FEEDBACK_URL} className={`px-6 py-2.5 rounded-lg text-sm font-bold text-white shadow-sm transition-all flex items-center ${isSubmittingFeedback ? 'bg-indigo-400 cursor-wait' : (!GOOGLE_SCRIPT_INV_FEEDBACK_URL ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700')}`}>
                                        {isSubmittingFeedback ? <><i className="fas fa-spinner fa-spin mr-2"></i> Mengirim...</> : <><i className="fas fa-paper-plane mr-2"></i> Kirim Saran</>}
                                    </button>
                                </div>
                                {!GOOGLE_SCRIPT_INV_FEEDBACK_URL && (
                                    <p className="text-[10px] text-red-500 text-right mt-2 font-medium italic">*Sistem belum dikonfigurasi oleh Admin.</p>
                                )}
                            </form>
                        </div>
                    </div>
                );
            };

            const renderInventory = () => {
                const categories = ['Semua', ...new Set(inventory.map(item => item.category))];
                const filteredInventory = filterCategory === 'Semua' ? inventory : inventory.filter(item => item.category === filterCategory);

                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between md:items-end border-b pb-4 gap-4">
                            <h2 className="text-2xl font-bold text-gray-800">Stok Alat Laboratorium</h2>
                            <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-1">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setFilterCategory(cat)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${filterCategory === cat ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {isAdmin && (
                            <div className="mb-4 flex flex-wrap gap-3">
                                <button onClick={() => setShowAddForm(!showAddForm)} className={`px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition flex items-center ${showAddForm ? 'bg-slate-200 text-slate-700' : 'bg-slate-800 text-white'}`}>
                                    <i className={`fas ${showAddForm ? 'fa-times' : 'fa-plus'} mr-2`}></i> {showAddForm ? 'Batal Tambah Alat' : 'Tambah Alat Baru'}
                                </button>
                                
                                {baseInventory.some(i => i.isLocalOnly) && (
                                    <button onClick={forceSyncToSheet} className="px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition flex items-center bg-yellow-500 hover:bg-yellow-600 text-white animate-pulse">
                                        <i className="fas fa-cloud-upload-alt mr-2"></i> Paksa Sinkronisasi ke Sheet
                                    </button>
                                )}
                            </div>
                        )}
                        
                        {showAddForm && isAdmin && (
                            <form onSubmit={handleAddNewInventoryItem} className="mb-6 bg-blue-50/50 p-5 rounded-xl border border-blue-100 shadow-sm grid grid-cols-1 md:grid-cols-5 gap-4 items-end animate-fade-in">
                                <div><label className="block text-xs font-bold text-blue-900 mb-1">Kode Alat</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" value={newItemForm.id} onChange={e => setNewItemForm({...newItemForm, id: e.target.value.toUpperCase()})} /></div>
                                <div>
                                    <label className="block text-xs font-bold text-blue-900 mb-1">Kategori</label>
                                    <input type="text" required list="category-list" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" value={newItemForm.category} onChange={e => setNewItemForm({...newItemForm, category: e.target.value})} />
                                    <datalist id="category-list">{categories.filter(c => c !== 'Semua').map(c => <option key={c} value={c} />)}</datalist>
                                </div>
                                <div className="md:col-span-2"><label className="block text-xs font-bold text-blue-900 mb-1">Nama Alat / Model</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" value={newItemForm.name} onChange={e => setNewItemForm({...newItemForm, name: e.target.value})} /></div>
                                <div>
                                    <label className="block text-xs font-bold text-blue-900 mb-1">Jumlah</label>
                                    <div className="flex gap-2">
                                        <input type="number" min="1" required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" value={newItemForm.total} onChange={e => setNewItemForm({...newItemForm, total: e.target.value})} />
                                        <button type="submit" className="bg-green-600 hover:bg-green-700 text-white px-4 py-2.5 rounded-lg font-bold"><i className="fas fa-save"></i></button>
                                    </div>
                                </div>
                            </form>
                        )}

                        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-gray-800 text-white">
                                        <tr>
                                            <th className="p-4">Kode Alat</th><th className="p-4">Kategori</th><th className="p-4">Nama Alat / Model</th>
                                            <th className="p-4 text-center">Total</th><th className="p-4 text-center">Tersedia</th><th className="p-4 text-center">Status</th>
                                            {isAdmin && <th className="p-4 text-center">Aksi</th>}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {filteredInventory.map(item => (
                                            <tr key={item.id} className="hover:bg-gray-50">
                                                <td className="p-4 text-sm font-bold text-slate-700">{item.id}</td>
                                                <td className="p-4"><span className="bg-slate-100 border border-slate-200 text-slate-600 px-2 py-1 rounded text-xs font-semibold">{item.category}</span></td>
                                                <td className="p-4 font-medium text-gray-900">
                                                    {item.name}
                                                </td>
                                                <td className="p-4 text-center text-sm">{item.total}</td>
                                                <td className="p-4 text-center font-black text-green-600">{item.available}</td>
                                                <td className="p-4 text-center">
                                                    {item.available === 0 ? <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Habis</span> : <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Tersedia</span>}
                                                </td>
                                                {isAdmin && (
                                                    <td className="p-4 text-center"><button onClick={() => handleDeleteInventoryItem(item.id)} className="text-red-500 hover:bg-red-100 p-2 rounded-lg transition"><i className="fas fa-trash-alt"></i></button></td>
                                                )}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBorrowForm = () => {
                const inventoryByCategory = inventory.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">Form Peminjaman Alat</h2>
                        <form onSubmit={submitBorrow} className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Nama Peminjam / Kelompok</label><input type="text" required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={borrowForm.borrowerName} onChange={e => setBorrowForm({...borrowForm, borrowerName: e.target.value})} placeholder="Contoh: Kelompok 1 - Budi" /></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">NIM / ID Anggota</label><input type="text" required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={borrowForm.nim} onChange={e => setBorrowForm({...borrowForm, nim: e.target.value})} placeholder="Masukkan NIM" /></div>
                                
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Keperluan Peminjaman</label>
                                    <select required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer" value={borrowForm.purpose} onChange={e => setBorrowForm({...borrowForm, purpose: e.target.value, praktikumCourse: '', praktikumClass: '', praktikumLayanan: ''})}>
