        ];

        const calculateInventory = (txData, baseInv) => {
            let currentInventory = JSON.parse(JSON.stringify(baseInv));
            txData.forEach(trx => {
                if (trx.status === 'active' && trx.items) {
                    trx.items.forEach(bItem => {
                        const itemId = bItem.kode || (bItem.name && bItem.name.match(/\[(.*?)\]/) ? bItem.name.match(/\[(.*?)\]/)[1] : null);
                        const qty = parseInt(bItem.jumlah || bItem.quantity);
                        
                        if (itemId) {
                            const invIndex = currentInventory.findIndex(i => i.id === itemId);
                            if (invIndex !== -1) {
                                currentInventory[invIndex].available -= qty;
                            }
                        }
                    });
                }
            });
            return currentInventory;
        };

        function App() {
            const localSavedTx = JSON.parse(localStorage.getItem('lab_transactions_v2') || '[]');
            const localSavedInv = JSON.parse(localStorage.getItem('lab_inventory_v2') || JSON.stringify(initialInventory));
            
            const [isAppLoading, setIsAppLoading] = useState(localSavedTx.length === 0);
            const [isSyncing, setIsSyncing] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [transactions, setTransactions] = useState(localSavedTx);
            const [baseInventory, setBaseInventory] = useState(localSavedInv);
            const [inventory, setInventory] = useState(() => calculateInventory(localSavedTx, localSavedInv));
            
            const [filterCategory, setFilterCategory] = useState('Semua');
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [showAddForm, setShowAddForm] = useState(false);
            const [newItemForm, setNewItemForm] = useState({ id: '', category: '', name: '', total: 1 });

            const [txFilter, setTxFilter] = useState('Semua');
            const [txLimit, setTxLimit] = useState(10);
            const [analysisMonth, setAnalysisMonth] = useState('Semua');

            const fileInputRef = useRef(null);
            const feedbackFileInputRef = useRef(null);
            const [currentTime, setCurrentTime] = useState(new Date());

            // --- PENGATURAN LINK DATABASE ---
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPlSeyXWP0ALhXp4VqJ_NUmB433jHqLUn4hButn2UFzHu2J9hOfEeRlj-Zdky0TA_b/exec'; 
            const GOOGLE_SCRIPT_INV_FEEDBACK_URL = 'https://script.google.com/macros/s/AKfycbwGry5HOdHq2v6NmPoOIdDbQYAXAjupfbyeHwRyIK1ymGVJMf2-g0S8CiwjOZm-JF6v/exec'; 
            
            const ACTIVE_INV_URL = GOOGLE_SCRIPT_INV_FEEDBACK_URL || GOOGLE_SCRIPT_URL;

            const [borrowForm, setBorrowForm] = useState({
                borrowerName: '', nim: '', purpose: '', praktikumCourse: '', praktikumClass: '', praktikumLayanan: '',
                borrowDate: new Date().toISOString().split('T')[0], borrowTime: '',
                returnDateEst: '', returnTimeEst: '',
                items: [{ itemId: '', quantity: 1 }],
                approvalFileName: '', fileBase64: '', mimeType: ''
            });

            // STATE KOTAK SARAN
            const [feedbackForm, setFeedbackForm] = useState({ name: '', category: '', message: '' });
            const [isSubmittingFeedback, setIsSubmittingFeedback] = useState(false);

            const [notification, setNotification] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const parseRealDate = (dateString) => {
                if (!dateString) return new Date();
                if (typeof dateString === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateString.trim())) {
                    const parts = dateString.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                }
                const d = new Date(dateString);
                return isNaN(d.getTime()) ? new Date() : d;
            };

            const formatDate = (dateString) => {
                if (!dateString) return '-';
                const d = parseRealDate(dateString);
                return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
            };

            const formatDay = (dateString) => {
                if (!dateString) return '-';
                const d = parseRealDate(dateString);
                return d.toLocaleDateString('id-ID', { weekday: 'long' });
            };

            const formatTimeStr = (timeStr) => {
                if (!timeStr) return '-';
                if (typeof timeStr === 'string' && timeStr.includes('T')) {
                    try {
                        const d = new Date(timeStr);
                        if (!isNaN(d.getTime())) {
                            return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\./g, ':');
                        }
                    } catch(e) {}
                }
                if (typeof timeStr === 'string') {
                    const tMatch = timeStr.match(/(\d{1,2})[:\.](\d{1,2})/);
                    if (tMatch) {
                        return `${tMatch[1].padStart(2, '0')}:${tMatch[2].padStart(2, '0')}`;
                    }
                }
                try {
                    const d = new Date(timeStr);
                    if (!isNaN(d.getTime())) {
                        return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace(/\./g, ':');
                    }
                } catch(e) {}
                
                return String(timeStr).substring(0, 5); 
            };

            const getLatenessString = (ms) => {
                const totalSecs = Math.floor(ms / 1000);
                if (totalSecs <= 0) return "Beberapa detik";
                
                const d = Math.floor(totalSecs / (60 * 60 * 24));
                const h = Math.floor((totalSecs % (60 * 60 * 24)) / (60 * 60));
                const m = Math.floor((totalSecs % (60 * 60)) / 60);
                const s = totalSecs % 60;
                
                let strArr = [];
                if (d > 0) {
                    strArr.push(`${d} Hari`);
                    if (h > 0) strArr.push(`${h} Jam`);
                } else if (h > 0) {
                    strArr.push(`${h} Jam`);
                    if (m > 0) strArr.push(`${m} Menit`);
                } else if (m > 0) {
                    strArr.push(`${m} Menit`);
                    if (s > 0) strArr.push(`${s} Detik`);
                } else {
                    strArr.push(`${s} Detik`);
                }
                return strArr.join(' ');
            };

            const parseTargetDate = (dateStr, timeStr) => {
                const target = parseRealDate(dateStr);
                let h = 23, m = 59;
                const tStr = String(timeStr || '').replace(/['"]/g, '').trim();
                
                if (tStr.includes('T')) {
                    const td = new Date(tStr);
                    if (!isNaN(td.getTime())) {
                        h = td.getHours();
                        m = td.getMinutes();
                    }
                } else {
                    const match = tStr.match(/(\d{1,2})[:\.](\d{1,2})/);
                    if (match) {
                        h = parseInt(match[1], 10);
                        m = parseInt(match[2], 10);
                    }
                }
                target.setHours(h, m, 0, 0);
                return target;
            };

            const getMonthYear = (dateStr) => {
                if (!dateStr) return '';
                const d = parseRealDate(dateStr);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            };

            const formatMonthYearText = (yyyymm) => {
                if (!yyyymm || yyyymm === 'Semua') return 'Keseluruhan Waktu';
                const [y, m] = yyyymm.split('-');
                const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
                return `${monthNames[parseInt(m) - 1]} ${y}`;
            };

            const renderCountdownBadge = (returnDateEst, returnTimeEst, status) => {
                if (status && status.startsWith('completed')) {
                    let isLate = false;
                    let latenessStr = "";
                    let returnedDateUI = null;
                    
                    if (status.includes('|')) {
                        const safeISOString = status.split('|')[1].replace(' ', 'T');
                        const returnTimestamp = new Date(safeISOString);
                        const targetDate = parseTargetDate(returnDateEst, returnTimeEst);
                        const diffMs = returnTimestamp.getTime() - targetDate.getTime();
                        
                        const timeAccurate = returnTimestamp.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false}).replace(/\./g, ':');

                        returnedDateUI = (
                            <div className="mt-2 pt-2 border-t border-slate-200/50 w-full text-center">
                                <p className="text-[10px] text-slate-500 font-semibold uppercase tracking-wider mb-1">Dikembalikan Pada:</p>
                                <div className="flex justify-center items-center gap-1.5 text-xs text-slate-700">
                                    <span className="font-medium">{formatDate(returnTimestamp.toISOString())}</span>
                                    <span className="font-mono font-bold bg-white px-1.5 py-0.5 rounded shadow-sm border border-slate-200 text-[10px]">{timeAccurate} WIB</span>
                                </div>
                            </div>
                        );

                        if (diffMs > 0) {
                            isLate = true;
                            latenessStr = getLatenessString(diffMs);
                        }
                    }

                    if (isLate) {
                        return (
                            <div className="flex flex-col items-center justify-center bg-white p-2.5 rounded-md border border-red-200 w-max mx-auto shadow-sm">
                                <span className="bg-red-50 text-red-700 border border-red-200 px-3 py-1 rounded text-xs font-bold w-full text-center tracking-wide uppercase">
                                    <i className="fas fa-times-circle mr-1"></i> Terlambat
                                </span>
                                <span className="text-[10px] font-bold text-red-600 mt-1.5">
                                    Telat: {latenessStr}
                                </span>
                                {returnedDateUI}
                            </div>
                        );
                    } else {
                        return (
                            <div className="flex flex-col items-center justify-center bg-white p-2.5 rounded-md border border-emerald-200 w-max mx-auto shadow-sm">
                                <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1 rounded text-xs font-bold w-full text-center tracking-wide uppercase">
                                    <i className="fas fa-check-circle mr-1"></i> Tepat Waktu
                                </span>
                                {returnedDateUI}
                                {!returnedDateUI && (
                                    <span className="text-[10px] text-emerald-600 font-medium italic mt-1">(Data lama)</span>
                                )}
                            </div>
                        );
                    }
                }

                const targetDate = parseTargetDate(returnDateEst, returnTimeEst);
                const diffMs = targetDate.getTime() - currentTime.getTime();

                if (diffMs <= 0) {
                    const latenessStr = getLatenessString(Math.abs(diffMs));
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-red-50 text-red-700 px-3 py-1 rounded border border-red-200 text-xs font-bold w-max text-center uppercase tracking-wide">
                                <i className="fas fa-exclamation-circle mr-1"></i> Terlambat
                            </span>
                            <span className="text-[10px] font-bold text-white bg-red-600 px-2 py-0.5 rounded shadow-sm">
                                Telat {latenessStr}
                            </span>
                        </div>
                    );
                }

                const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diffMs % (1000 * 60)) / 1000);
                const timeString = `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

                if (days > 2) {
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-slate-50 text-slate-600 px-3 py-1 rounded border border-slate-200 text-[11px] font-bold w-max text-center">Aman (H-{days})</span>
                            <span className="bg-white border border-slate-200 text-slate-700 px-2 py-0.5 rounded shadow-sm text-[11px] font-mono font-bold flex items-center">
                                <i className="fas fa-hourglass-half mr-1.5 text-slate-400"></i>{timeString}
                            </span>
                        </div>
                    );
                } else if (days > 0) {
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-amber-50 text-amber-700 px-3 py-1 rounded border border-amber-200 text-[11px] font-bold w-max text-center">Mendekati (H-{days})</span>
                            <span className="bg-white border border-amber-200 text-amber-700 px-2 py-0.5 rounded shadow-sm text-[11px] font-mono font-bold flex items-center">
                                <i className="fas fa-hourglass-half mr-1.5 text-amber-500"></i>{timeString}
                            </span>
                        </div>
                    );
                } else {
                    return (
                        <div className="flex flex-col items-center justify-center gap-1.5">
                            <span className="bg-orange-50 text-orange-700 px-3 py-1 rounded border border-orange-200 text-[11px] font-bold w-max text-center uppercase tracking-wide">
                                <i className="fas fa-triangle-exclamation mr-1"></i> Hari Ini
                            </span>
                            <span className="bg-orange-600 text-white px-2 py-0.5 rounded shadow-sm text-[11px] font-mono font-bold flex items-center">
                                <i className="fas fa-stopwatch mr-1.5"></i>{timeString}
                            </span>
                        </div>
                    );
                }
            };

            useEffect(() => {
                localStorage.setItem('lab_transactions_v2', JSON.stringify(transactions));
                localStorage.setItem('lab_inventory_v2', JSON.stringify(baseInventory));
            }, [transactions, baseInventory]);

            // FETCH DATA DARI KEDUA SPREADSHEET
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);

                const fetchDatabase = async () => {
                    setIsSyncing(true);
                    try {
                        const cacheBuster = '?t=' + new Date().getTime();
                        
                        const txResponsePromise = fetch(GOOGLE_SCRIPT_URL + cacheBuster).then(res => res.json()).catch(() => ({ error: "Fetch TX failed" }));
                        
                        let invResponsePromise;
                        if (GOOGLE_SCRIPT_INV_FEEDBACK_URL) {
                            invResponsePromise = fetch(GOOGLE_SCRIPT_INV_FEEDBACK_URL + cacheBuster).then(res => res.json()).catch(() => null);
                        } else {
                            invResponsePromise = Promise.resolve(null);
                        }

                        const [txRawData, invRawData] = await Promise.all([txResponsePromise, invResponsePromise]);
                        
                        const currentLocalInv = JSON.parse(localStorage.getItem('lab_inventory_v2') || JSON.stringify(initialInventory));
                        let txData = [];
                        let invData = [];

                        if (txRawData && !txRawData.error) {
                            if (Array.isArray(txRawData)) {
                                txData = txRawData;
                            } else {
                                txData = txRawData.transactions || [];
                            }
                        }

                        let activeInvSource = invRawData && invRawData.inventory ? invRawData.inventory : (txRawData && txRawData.inventory ? txRawData.inventory : null);

                        if (activeInvSource && activeInvSource.length > 0) {
                            const serverInv = activeInvSource.map(item => ({
                                id: item.id, category: item.category, name: item.name, 
                                total: item.total, available: item.total, isLocalOnly: false 
                            }));
                            
                            // Ambil seluruh item lokal yang belum ada di server (spreadsheet)
                            const unsyncedItems = currentLocalInv.filter(i => !serverInv.some(s => s.id === i.id));
                            const markedUnsynced = unsyncedItems.map(i => ({...i, isLocalOnly: true}));

                            invData = [...serverInv, ...markedUnsynced];

                            markedUnsynced.forEach(item => {

                const dashboardInventory = inventory.filter(item => mainCategories.includes(item.category));

                const totalAlat = dashboardInventory.reduce((sum, item) => sum + item.total, 0);
                const totalTersedia = dashboardInventory.reduce((sum, item) => sum + item.available, 0);
                const totalDipinjam = totalAlat - totalTersedia;
                
                const persenTersedia = totalAlat === 0 ? 0 : Math.round((totalTersedia / totalAlat) * 100);
                const persenDipinjam = totalAlat === 0 ? 0 : Math.round((totalDipinjam / totalAlat) * 100);

                const activeTx = transactions.filter(t => t.status === 'active');
                
                let mendekatiDeadlineCount = 0;
                const lateTx = [];

                activeTx.forEach(trx => {
                    const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                    const diffMs = targetDate.getTime() - currentTime.getTime();
                    
                    trx.isLate = diffMs <= 0;
                    
                    if (trx.isLate) {
                        lateTx.push(trx);
                    } else {
                        const diffDaysExact = diffMs / (1000 * 60 * 60 * 24);
                        if (diffDaysExact <= 2) {
                            mendekatiDeadlineCount += trx.items.reduce((acc, item) => acc + parseInt(item.jumlah || item.quantity), 0);
                        }
                    }
                });

                const persenTerlambat = activeTx.length === 0 ? 0 : Math.round((lateTx.length / activeTx.length) * 100);

                const categories = [...new Set(dashboardInventory.map(i => i.category))];
                const categoryStats = categories.map(cat => {
                    const itemsInCat = dashboardInventory.filter(i => i.category === cat);
                    const total = itemsInCat.reduce((sum, i) => sum + i.total, 0);
                    const available = itemsInCat.reduce((sum, i) => sum + i.available, 0);
                    return { category: cat, total, borrowed: total - available, available };
                }).sort((a, b) => b.total - a.total);

                const chartColors = ['#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#64748b', '#334155'];
                
                let cumulativePercent = 0;
                const pieGradients = categoryStats.map((stat, i) => {
                    const percent = stat.total === 0 ? 0 : (stat.total / totalAlat) * 100;
                    const gradientStr = `${chartColors[i % chartColors.length]} ${cumulativePercent}% ${cumulativePercent + percent}%`;
                    cumulativePercent += percent;
                    return gradientStr;
                }).join(', ');
                const pieStyle = { background: `conic-gradient(${pieGradients})` };

                const itemFrequency = {};
                transactions.forEach(trx => {
                    if (!trx.items) return;
                    
                    let durationMs = 0;
                    const startDate = parseTargetDate(trx.borrowDate, trx.borrowTime);
                    
                    if (trx.status && trx.status.startsWith('completed|')) {
                        const returnTimestamp = new Date(trx.status.split('|')[1].replace(' ', 'T'));
                        durationMs = returnTimestamp.getTime() - startDate.getTime();
                    } else {
                        const endDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                        const now = currentTime.getTime();
                        if (endDate.getTime() < now) {
                            durationMs = now - startDate.getTime();
                        } else {
                            durationMs = endDate.getTime() - startDate.getTime();
                        }
                    }
                    if (durationMs < 0) durationMs = 0;
                    const durationHours = durationMs / (1000 * 60 * 60);

                    trx.items.forEach(item => {
                        const itemId = item.kode || (item.name && item.name.match(/\[(.*?)\]/) ? item.name.match(/\[(.*?)\]/)[1] : item.name);
                        const itemName = item.nama ? `[${item.kode}] ${item.nama}` : item.name;
                        const qty = parseInt(item.jumlah || item.quantity) || 1;
                        
                        if (!itemFrequency[itemId]) itemFrequency[itemId] = { count: 0, name: itemName, totalHours: 0 };
                        itemFrequency[itemId].count += qty;
                        itemFrequency[itemId].totalHours += (durationHours * qty);
                    });
                });
                
                const topItems = Object.keys(itemFrequency)
                    .map(id => ({ 
                        id, 
                        count: itemFrequency[id].count, 
                        name: itemFrequency[id].name,
                        hours: Math.ceil(itemFrequency[id].totalHours)
                    }))
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 5);

                const availableMonths = [...new Set(transactions.map(t => getMonthYear(t.borrowDate)))].sort().reverse();
                
                const currentPeriod = analysisMonth === 'Semua' ? '' : analysisMonth;
                let prevPeriod = '';
                if (currentPeriod) {
                    const [y, m] = currentPeriod.split('-');
                    let prevM = parseInt(m) - 1;
                    let prevY = parseInt(y);
                    if (prevM === 0) { prevM = 12; prevY -= 1; }
                    prevPeriod = `${prevY}-${String(prevM).padStart(2, '0')}`;
                }

                const filteredAnalysisTx = transactions.filter(t => currentPeriod === '' || getMonthYear(t.borrowDate) === currentPeriod);
                const prevAnalysisTx = transactions.filter(t => prevPeriod !== '' && getMonthYear(t.borrowDate) === prevPeriod);

                const categoryData = {};
                let totalFilteredTx = filteredAnalysisTx.length;
                
                filteredAnalysisTx.forEach(trx => {
                    const purposeStr = trx.purpose || 'Lainnya';
                    let mainCat = purposeStr;
                    let subCat = '';
                    
                    if (purposeStr.startsWith('Praktikum - ')) {
                        mainCat = 'Praktikum';
                        subCat = purposeStr.replace('Praktikum - ', ''); 
                    }

                    if (!categoryData[mainCat]) {
                        categoryData[mainCat] = { count: 0, subs: {}, tools: {} };
                    }
                    categoryData[mainCat].count += 1;
                    
                    if (subCat) {
                        categoryData[mainCat].subs[subCat] = (categoryData[mainCat].subs[subCat] || 0) + 1;
                    }

                    trx.items.forEach(item => {
                        const toolName = item.nama ? `[${item.kode}] ${item.nama}` : item.name;
                        const qty = parseInt(item.jumlah || item.quantity) || 1;
                        categoryData[mainCat].tools[toolName] = (categoryData[mainCat].tools[toolName] || 0) + qty;
                    });
                });

                const sortedCategoriesList = Object.keys(categoryData).map(key => ({
                    name: key,
                    count: categoryData[key].count,
                    subs: Object.keys(categoryData[key].subs).map(sub => ({ name: sub, count: categoryData[key].subs[sub] })).sort((a,b) => b.count - a.count),
                    topTool: Object.keys(categoryData[key].tools).sort((a,b) => categoryData[key].tools[b] - categoryData[key].tools[a])[0] || '-',
                    percent: totalFilteredTx === 0 ? 0 : Math.round((categoryData[key].count / totalFilteredTx) * 100)
                })).sort((a, b) => b.count - a.count);

                const trendPercent = prevAnalysisTx.length === 0 
                    ? (totalFilteredTx > 0 ? 100 : 0) 
                    : Math.round(((totalFilteredTx - prevAnalysisTx.length) / prevAnalysisTx.length) * 100);
                    
                const dominant = sortedCategoriesList.length > 0 ? sortedCategoriesList[0] : null;
                const least = sortedCategoriesList.length > 0 ? sortedCategoriesList[sortedCategoriesList.length - 1] : null;
                
                let narrative = "Belum ada data peminjaman alat pada periode ini.";
                if (dominant) {
                    narrative = `Aktivitas laboratorium saat ini didominasi secara kuat oleh kebutuhan ${dominant.name}, yang menyumbang ${dominant.percent}% dari total ${totalFilteredTx} peminjaman. `;
                    if (dominant.name === 'Praktikum' && dominant.subs.length > 0) {
                        narrative += `Fokus utama kegiatan mahasiswa berada pada kelas ${dominant.subs[0].name.split('-')[0].trim()}. `;
                    }
                    if (dominant.topTool !== '-') {
                        narrative += `Lonjakan penggunaan alat paling terpusat pada ${dominant.topTool.split(']')[1]?.trim() || dominant.topTool}. Rekomendasi: Pastikan ketersediaan alat tersebut selalu optimal.`;
                    }
                }

                const sortedActiveTx = [...activeTx].sort((a, b) => {
                    const timeA = parseTargetDate(a.borrowDate, a.borrowTime).getTime();
                    const timeB = parseTargetDate(b.borrowDate, b.borrowTime).getTime();
                    return timeB - timeA;
                });

                // --- DATA JADWAL PRAKTIKUM ---
                const MONDAY = 1, TUESDAY = 2, WEDNESDAY = 3, THURSDAY = 4, FRIDAY = 5;
                const rawSchedule = [
                    { id: 'm1', day: MONDAY, course: 'GNSS', class: 'RC', start: '07:30', end: '10:10' },
                    { id: 'm2', day: MONDAY, course: 'Hidrografi II', class: 'RA', start: '10:15', end: '13:50' },
                    { id: 'm3', day: MONDAY, course: 'Survei Konstruksi', class: 'RC', start: '12:30', end: '15:40' },
                    { id: 'm4', day: MONDAY, course: 'Pemetaan Terestris', class: 'RA', start: '15:00', end: '17:40' },
                    
                    { id: 't1', day: TUESDAY, course: 'Hidrografi II', class: 'RB', start: '07:30', end: '10:10' },
                    { id: 't2', day: TUESDAY, course: 'Pemetaan Terestris', class: 'RB', start: '07:30', end: '10:10' },
                    { id: 't3', day: TUESDAY, course: 'Survei Konstruksi', class: 'RB', start: '10:10', end: '13:50' },

                    { id: 'w1', day: WEDNESDAY, course: 'Survei GNSS', class: 'RB', start: '07:30', end: '10:10' },
                    { id: 'w2', day: WEDNESDAY, course: 'Survei Konstruksi', class: 'RA', start: '10:15', end: '13:50' },
                    { id: 'w3', day: WEDNESDAY, course: 'Hidrografi II', class: 'RC', start: '13:55', end: '16:35' },

                    { id: 'th1', day: THURSDAY, course: 'Survei GNSS', class: 'RA', start: '15:45', end: '17:40' },

                    { id: 'f1', day: FRIDAY, course: 'Indraja Biosistem', class: 'RA', start: '07:30', end: '09:15' },
                    { id: 'f2', day: FRIDAY, course: 'Pemetaan Terestris', class: 'RC', start: '13:55', end: '17:40' },
                    { id: 'f3', day: FRIDAY, course: 'Indraja Biosistem', class: 'RB', start: '15:00', end: '17:00' }
                ];

                const timeToMins = (t) => {
                    const [h, m] = t.split(':').map(Number);
                    return h * 60 + m;
                };

                const processedSchedule = rawSchedule.map(item => {
                    const startMins = timeToMins(item.start);
                    const endMins = timeToMins(item.end);
                    const overlaps = rawSchedule.filter(other => 
                        other.day === item.day && 
                        other.id !== item.id &&
                        timeToMins(other.start) < endMins && 
                        timeToMins(other.end) > startMins
                    );
                    return { ...item, startMins, endMins, isOverlap: overlaps.length > 0 };
                }).sort((a, b) => a.startMins - b.startMins);

                const todayDay = currentTime.getDay() || 7; // Sunday = 7
                const currentMins = currentTime.getHours() * 60 + currentTime.getMinutes();

                let nextPracticum = null;
                let minMinsAway = Infinity;
                const activePracticums = [];

                processedSchedule.forEach(item => {
                    if (item.day === todayDay && currentMins >= item.startMins && currentMins <= item.endMins) {
                        activePracticums.push(item);
                    }

                    let dayDiff = item.day - todayDay;
                    if (dayDiff < 0) dayDiff += 7;
                    let minsAway = (dayDiff * 24 * 60) + item.startMins - currentMins;
                    
                    if (dayDiff === 0 && item.startMins <= currentMins) {
                        minsAway += 7 * 24 * 60;
                    }

                    if (minsAway > 0 && minsAway < minMinsAway) {
                        minMinsAway = minsAway;
                        nextPracticum = item;
                    }
                });

                const formatCountdown = (totalMins) => {
                    const d = Math.floor(totalMins / (24 * 60));
                    const h = Math.floor((totalMins % (24 * 60)) / 60);
                    const m = totalMins % 60;
                    let str = [];
                    if (d > 0) str.push(`${d} Hari`);
                    if (h > 0) str.push(`${h} Jam`);
                    str.push(`${m} Menit`);
                    return str.join(' ');
                };

                const daysOfWeek = [
                    { id: MONDAY, name: 'Senin' },
                    { id: TUESDAY, name: 'Selasa' },
                    { id: WEDNESDAY, name: 'Rabu' },
                    { id: THURSDAY, name: 'Kamis' },
                    { id: FRIDAY, name: 'Jumat' }
                ];

                const renderDayColumn = (dayId, dayName) => {
                    const isToday = todayDay === dayId;
                    const dayItems = processedSchedule.filter(i => i.day === dayId);

                    return (
                        <div key={dayId} className={`flex flex-col rounded-md border ${isToday ? 'border-brand-300 bg-brand-50/20 shadow-sm ring-1 ring-brand-200' : 'border-slate-200 bg-white'} overflow-hidden`}>
                            <div className={`py-2 px-3 text-center font-bold text-xs uppercase tracking-wider ${isToday ? 'bg-brand-600 text-white' : 'bg-slate-100 text-slate-600 border-b border-slate-200'}`}>
                                {dayName} {isToday && <span className="ml-1 text-[9px] bg-white/20 px-1.5 py-0.5 rounded tracking-wider">HARI INI</span>}
                            </div>
                            <div className="p-2.5 flex flex-col gap-2">
                                {dayItems.length === 0 ? (
                                    <p className="text-center text-xs text-slate-400 italic py-4">Kosong</p>
                                ) : dayItems.map(item => {
                                    let status = 'upcoming';
                                    if (dayId < todayDay || (dayId === todayDay && item.endMins < currentMins)) status = 'past';
                                    else if (dayId === todayDay && currentMins >= item.startMins && currentMins <= item.endMins) status = 'current';

                                    let bg = 'bg-white hover:bg-slate-50 transition-colors';
                                    let border = 'border-slate-200';
                                    let iconColor = 'text-slate-500';
                                    let badgeBg = 'bg-slate-100 text-slate-600';
                                    let badgeText = 'Akan Datang';
                                    let extraClasses = '';

                                    if (status === 'past') {
                                        bg = 'bg-slate-50 opacity-60';
                                        border = 'border-slate-200';
                                        badgeBg = 'bg-slate-200 text-slate-500';
                                        iconColor = 'text-slate-400';
                                        badgeText = 'Selesai';
                                    } else if (item.isOverlap) {
                                        bg = 'bg-red-50';
                                        border = 'border-red-200';
                                        iconColor = 'text-red-500';
                                        badgeBg = 'bg-red-500 text-white';
                                        badgeText = status === 'current' ? 'BERLANGSUNG (BENTROK)' : 'BENTROK';
                                        extraClasses = status === 'current' ? 'relative z-10 shadow-md' : '';
                                    } else if (status === 'current') {
                                        bg = 'bg-emerald-50';
                                        border = 'border-emerald-300';
                                        iconColor = 'text-emerald-700';
                                        badgeBg = 'bg-emerald-600 text-white shadow-sm';
                                        badgeText = 'SEDANG BERLANGSUNG';
                                        extraClasses = 'relative z-10 shadow-md ring-1 ring-emerald-400';
                                    }

                                    return (
                                        <div key={item.id} className={`p-2.5 rounded border ${bg} ${border} shadow-sm relative flex flex-col ${extraClasses}`}>
                                            {status === 'current' && <div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse border-2 border-white"></div>}
                                            
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-xs font-bold text-slate-800 leading-tight pr-2">{item.course}</span>
                                                <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-white border border-slate-200 shadow-sm flex-shrink-0 text-slate-600">{item.class}</span>
                                            </div>
                                            <div className={`flex items-center text-[10px] font-mono font-medium mt-1 ${iconColor}`}>
                                                <i className="far fa-clock mr-1.5"></i>
                                                {item.start} - {item.end}
                                            </div>
                                            <div className="mt-2 pt-1.5 border-t border-slate-200/50">
                                                <span className={`text-[8px] font-bold px-2 py-0.5 rounded w-max block text-center uppercase tracking-wider ${badgeBg}`}>
                                                    {badgeText}
                                                </span>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex justify-between items-end border-b border-slate-200 pb-3">
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center tracking-tight">
                                Dashboard Monitoring 
                                {isSyncing && <i className="fas fa-sync fa-spin text-brand-500 text-sm ml-3" title="Sinkronisasi Data..."></i>}
                            </h2>
                            <div className="text-right bg-white px-4 py-2 rounded-md border border-slate-200 shadow-sm flex items-center gap-3">
                                <i className="far fa-clock text-brand-600 text-lg animate-pulse"></i>
                                <div>
                                    <p className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">{currentTime.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' })}</p>
                                    <p className="text-lg font-black text-slate-800 font-mono tracking-widest">{currentTime.toLocaleTimeString('id-ID', { hour12: false })}</p>
                                </div>
                            </div>
                        </div>

                        {/* BANNER: Mendekati Deadline */}
                        {mendekatiDeadlineCount > 0 && (
                            <div className="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-md flex items-center shadow-sm">
                                <i className="fas fa-exclamation-circle text-amber-500 text-2xl mr-4"></i>
                                <div>
                                    <p className="text-sm text-amber-800 font-bold tracking-tight">Perhatian: Ada alat yang mendekati jatuh tempo!</p>
                                    <p className="text-xs text-amber-700 mt-0.5">Sebanyak <span className="font-bold">{mendekatiDeadlineCount}</span> alat akan segera mencapai batas waktu pengembalian kurang dari 48 Jam. Cek tabel di bawah.</p>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                            <div className="bg-white border-t-4 border-slate-700 p-4 rounded-b-md shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Total Semua Inventaris</p><p className="text-3xl font-black text-slate-800">{grandTotalAlat}</p></div>
                                    <div className="bg-slate-100 p-2.5 rounded-md text-slate-600 flex-shrink-0 ml-2"><i className="fas fa-warehouse text-lg"></i></div>
                                </div>
                            </div>
                            <div className="bg-white border-t-4 border-brand-500 p-4 rounded-b-md shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Total Alat Utama Survei Geomatika</p><p className="text-3xl font-black text-slate-800">{totalAlat}</p></div>
                                    <div className="bg-brand-50 p-2.5 rounded-md text-brand-600 flex-shrink-0 ml-2"><i className="fas fa-boxes text-lg"></i></div>
                                </div>
                            </div>
                            <div className="bg-white border-t-4 border-emerald-500 p-4 rounded-b-md shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Ketersediaan Alat Utama</p><p className="text-3xl font-black text-emerald-600">{persenTersedia}%</p></div>
                                    <div className="bg-emerald-50 p-2.5 rounded-md text-emerald-600 flex-shrink-0 ml-2"><i className="fas fa-check-circle text-lg"></i></div>
                                </div>
                                <div className="w-full bg-slate-100 rounded-full h-1 mt-4"><div className="bg-emerald-500 h-1 rounded-full" style={{width: `${persenTersedia}%`}}></div></div>
                            </div>
                            <div className="bg-white border-t-4 border-orange-500 p-4 rounded-b-md shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Sedang Dipinjam</p><p className="text-3xl font-black text-orange-500">{persenDipinjam}%</p></div>
                                    <div className="bg-orange-50 p-2.5 rounded-md text-orange-600 flex-shrink-0 ml-2"><i className="fas fa-exchange-alt text-lg"></i></div>
                                </div>
                                <div className="w-full bg-slate-100 rounded-full h-1 mt-4"><div className="bg-orange-500 h-1 rounded-full" style={{width: `${persenDipinjam}%`}}></div></div>
                            </div>
                            <div className="bg-white border-t-4 border-red-500 p-4 rounded-b-md shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Risiko Terlambat</p><p className="text-3xl font-black text-red-500">{persenTerlambat}%</p></div>
                                    <div className="bg-red-50 p-2.5 rounded-md text-red-600 flex-shrink-0 ml-2"><i className="fas fa-exclamation-triangle text-lg"></i></div>
                                </div>
                                <div className="w-full bg-slate-100 rounded-full h-1 mt-4"><div className="bg-red-500 h-1 rounded-full" style={{width: `${persenTerlambat}%`}}></div></div>
                            </div>
                        </div>

                        {/* --- BAGIAN BARU: JADWAL PRAKTIKUM --- */}
                        <div className="bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm">
                            <div className="flex flex-col md:flex-row justify-between md:items-end mb-6 gap-4 border-b border-slate-100 pb-4">
                                <h3 className="text-lg font-bold text-slate-800 tracking-tight">
                                    <i className="fas fa-calendar-week text-brand-600 mr-2"></i> Jadwal Praktikum Laboratorium Geomatika
                                </h3>
                                <div className="flex gap-3 text-[9px] font-bold uppercase tracking-wider text-slate-500">
                                    <div className="flex items-center"><span className="w-2 h-2 bg-slate-200 rounded-sm mr-1.5"></span> Selesai</div>
                                    <div className="flex items-center"><span className="w-2 h-2 bg-emerald-500 rounded-sm mr-1.5"></span> Berjalan</div>
                                    <div className="flex items-center"><span className="w-2 h-2 bg-white border border-slate-300 rounded-sm mr-1.5"></span> Mendatang</div>
                                    <div className="flex items-center"><span className="w-2 h-2 bg-red-500 rounded-sm mr-1.5"></span> Bentrok</div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-md flex items-center">
                                    <div className="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-md flex items-center justify-center text-lg mr-4 border border-emerald-200 relative">
                                        <i className="fas fa-play"></i>
                                        {activePracticums.length > 0 && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></span>}
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">Status Real-Time</p>
                                        <p className="text-sm font-bold text-slate-800 leading-tight">
                                            {activePracticums.length > 0 
                                                ? `${activePracticums.length} Praktikum Sedang Berlangsung` 
                                                : 'Tidak ada praktikum yang berjalan saat ini'}
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-md flex items-center">
                                    <div className="w-10 h-10 bg-brand-100 text-brand-600 rounded-md flex items-center justify-center text-lg mr-4 border border-brand-200">
                                        <i className="fas fa-forward"></i>
                                    </div>
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-0.5">Praktikum Berikutnya</p>
                                        <p className="text-sm font-bold text-slate-800 leading-tight">
                                            {nextPracticum 
                                                ? `${nextPracticum.course} (${nextPracticum.class})` 
                                                : 'Tidak ada jadwal tersisa minggu ini'}
                                        </p>
                                        {nextPracticum && (
                                            <p className="text-[10px] text-brand-700 font-semibold mt-1">
                                                Mulai dalam {formatCountdown(minMinsAway)}
                                            </p>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-5 gap-3">
                                {daysOfWeek.map(d => renderDayColumn(d.id, d.name))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                            {/* Distribusi Alat */}
                            <div className="bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm flex flex-col">
                                <h3 className="text-lg font-bold text-slate-800 mb-6 tracking-tight">Distribusi Alat Utama</h3>
                                <div className="flex flex-col md:flex-row items-center gap-8 my-auto">
                                    <div className="w-36 h-36 rounded-full shadow-inner relative flex-shrink-0" style={pieStyle}>
                                        <div className="absolute inset-0 m-auto w-20 h-20 bg-white rounded-full flex flex-col items-center justify-center shadow-sm">
                                            <span className="font-black text-slate-800 text-xl">{totalAlat}</span>
                                            <span className="text-slate-500 text-[9px] font-bold uppercase">Total Alat</span>
                                        </div>
                                    </div>
                                    <div className="w-full space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                                        {categoryStats.map((stat, i) => (
                                            <div key={stat.category} className="flex items-center justify-between text-sm">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-2.5 h-2.5 rounded-sm block flex-shrink-0" style={{backgroundColor: chartColors[i % chartColors.length]}}></span>
                                                    <span className="text-slate-600 font-medium truncate max-w-[140px]" title={stat.category}>{stat.category}</span>
                                                </div>
                                                <span className="font-bold text-slate-800">{totalAlat === 0 ? 0 : Math.round((stat.total/totalAlat)*100)}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Top Alat */}
                            <div className="bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm">
                                <h3 className="text-lg font-bold text-slate-800 mb-4 tracking-tight"> Alat Paling Sering Dipinjam</h3>
                                {topItems.length === 0 ? (
                                    <p className="text-slate-400 text-sm italic py-4 text-center">Belum ada data peminjaman.</p>
                                ) : (
                                    <ul className="divide-y divide-slate-100">
                                        {topItems.map((item, idx) => (
                                            <li key={idx} className="py-2.5 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-6 h-6 rounded flex items-center justify-center text-xs font-bold ${idx === 0 ? 'bg-amber-100 text-amber-700' : idx === 1 ? 'bg-slate-200 text-slate-700' : idx === 2 ? 'bg-orange-100 text-orange-800' : 'bg-slate-50 text-slate-500 border border-slate-200'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div><p className="text-sm font-semibold text-slate-800">{item.name}</p></div>
                                                </div>
                                                
                                                <div className="text-right flex flex-col items-end gap-0.5">
                                                    <span className="bg-brand-50 text-brand-700 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider w-max">{item.count} Kali</span>
                                                    <span className="text-[10px] font-medium text-slate-500">Durasi: {item.hours} Jam</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>

                        {/* --- ANALISIS CERDAS JENIS PEMINJAMAN --- */}
                        <div className="mt-6 bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm">
                            <div className="flex flex-col md:flex-row justify-between md:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
                                <h3 className="text-lg font-bold text-slate-800 tracking-tight">
                                    <i className="fas fa-chart-line text-brand-600 mr-2"></i> Analisis Cerdas Jenis Peminjaman
                                </h3>
                                <div className="flex gap-3 items-center">
                                    <span className="text-[11px] font-bold uppercase tracking-wider text-slate-500">Periode:</span>
                                    <select className="p-1.5 border border-slate-300 rounded text-xs bg-slate-50 focus:ring-1 focus:ring-brand-500 font-medium cursor-pointer" value={analysisMonth} onChange={e => setAnalysisMonth(e.target.value)}>
                                        <option value="Semua">Keseluruhan Waktu</option>
                                        {availableMonths.map(m => (
                                            <option key={m} value={m}>{formatMonthYearText(m)}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-md flex flex-col justify-center items-start">
                                    <p className="text-[9px] text-slate-500 font-bold uppercase tracking-wider mb-1">Total Peminjaman</p>
                                    <div className="flex items-end gap-2">
                                        <span className="text-2xl font-black text-slate-800">{totalFilteredTx}</span>
                                        {analysisMonth !== 'Semua' && (
                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded mb-1 ${trendPercent >= 0 ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}`}>
                                                {trendPercent > 0 ? '+' : ''}{trendPercent}% vs bulan lalu
                                            </span>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-md md:col-span-2 flex flex-col justify-center">
                                    <p className="text-[9px] text-brand-600 font-bold uppercase tracking-wider mb-1">Aktivitas Paling Dominan</p>
                                    <p className="text-base font-bold text-slate-800 leading-tight">{dominant ? dominant.name : '-'}</p>
                                    <p className="text-[11px] text-slate-600 font-medium mt-1">Fokus Alat: <span className="font-bold">{dominant ? dominant.topTool.split(']')[1] || dominant.topTool : '-'}</span></p>
                                </div>

                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-md flex flex-col justify-center">
                                    <p className="text-[9px] text-orange-600 font-bold uppercase tracking-wider mb-1">Aktivitas Terendah</p>
                                    <p className="text-base font-bold text-slate-800 leading-tight">{least && least.name !== dominant?.name ? least.name : '-'}</p>
                                </div>
                            </div>

                            <div className="bg-slate-800 text-slate-200 p-4 rounded-md mb-6 shadow-sm flex items-start gap-3">
                                <i className="fas fa-robot text-brand-400 text-xl mt-0.5"></i>
                                <div>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Kesimpulan Sistem</p>
                                    <p className="text-sm font-medium leading-relaxed">{narrative}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                {sortedCategoriesList.map((cat, i) => {
                                    const bgColors = ['bg-brand-500', 'bg-cyan-500', 'bg-emerald-500', 'bg-amber-500', 'bg-rose-500', 'bg-violet-500'];
                                    
                                    return (
                                        <div key={cat.name}>
                                            <div className="flex justify-between items-end mb-1.5">
                                                <span className="font-semibold text-slate-700 text-sm">{cat.name}</span>
                                                <div className="text-right">
                                                    <span className={`font-bold text-slate-800 text-sm`}>{cat.percent}%</span>
                                                    <span className="text-slate-400 font-medium text-[10px] ml-1">({cat.count} kali)</span>
                                                </div>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-sm h-1.5 mb-3">
                                                <div className={`h-1.5 rounded-sm ${bgColors[i % 6]}`} style={{width: `${cat.percent}%`}}></div>
                                            </div>
                                            
                                            {cat.subs.length > 0 && (
                                                <div className="pl-3 border-l-2 border-slate-200 space-y-1.5 mt-2">
                                                    {cat.subs.slice(0, 4).map((sub, j) => {
                                                        const subPercent = Math.round((sub.count / cat.count) * 100);
                                                        return (
                                                            <div key={j} className="flex justify-between items-center text-[11px]">
                                                                <span className="text-slate-600 truncate pr-2" title={sub.name}>{sub.name}</span>
                                                                <span className="text-slate-800 font-medium flex-shrink-0">{sub.count}x <span className="text-slate-400 font-normal text-[9px] w-6 inline-block text-right">{subPercent}%</span></span>
                                                            </div>
                                                        )
                                                    })}
                                                    {cat.subs.length > 4 && <div className="text-[10px] text-slate-400 italic">...dan {cat.subs.length - 4} jenis lainnya</div>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                                {sortedCategoriesList.length === 0 && <p className="text-slate-400 text-sm italic col-span-2 text-center">Tidak ada data untuk dianalisis pada periode ini.</p>}
                            </div>
                        </div>

                        {/* Monitor Keterlambatan FULL WIDTH */}
                        <div className="mt-6 bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm relative overflow-hidden">
                            <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                                <h3 className="text-lg font-bold text-slate-800 tracking-tight"> Monitor Keterlambatan Aktif</h3>
                                {lateTx.length > 0 && <span className="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">{lateTx.length} Kasus</span>}
                            </div>
                            
                            {lateTx.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-6 text-slate-400">
                                    <i className="fas fa-shield-check text-3xl mb-2 text-emerald-400"></i>
                                    <p className="text-sm font-medium">Luar biasa! Tidak ada yang terlambat hari ini.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {lateTx.map(trx => {
                                        const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                        const diffMs = currentTime.getTime() - targetDate.getTime();
                                        const latenessStr = getLatenessString(diffMs);

                                        return (
                                        <div key={trx.id} className="flex flex-col p-4 border border-red-200 bg-white rounded-md hover:border-red-300 transition shadow-sm relative">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-red-500 rounded-l-md"></div>
                                            <div className="flex justify-between items-start mb-2 pl-2">
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-slate-800 text-sm">{trx.borrowerName}</span>
                                                    <span className="text-[10px] text-slate-500 font-medium mt-0.5">{trx.items.length} Macam Alat</span>
                                                </div>
                                                <span className="text-[9px] font-bold text-red-700 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded uppercase tracking-wider">
                                                    Telat {latenessStr}
                                                </span>
                                            </div>
                                            <div className="mt-auto border-t border-slate-100 pt-2 pl-2 flex flex-col gap-1">
                                                <span className="text-[9px] text-slate-500 font-bold uppercase tracking-wider">Target Semula:</span>
                                                <div className="flex gap-2">
                                                    <span className="text-[11px] font-medium text-slate-700">{formatDate(trx.returnDateEst)}</span>
                                                    <span className="text-[11px] font-mono font-bold text-slate-700">{formatTimeStr(trx.returnTimeEst)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )})}
                                </div>
                            )}
                        </div>

                        {/* SECTION 4: Peminjaman Berjalan */}
                        <div className="mt-6 bg-white rounded-md border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-5 md:p-6 border-b border-slate-100">
                                <h3 className="text-lg font-bold text-slate-800 tracking-tight"> Peminjaman Berjalan (Detail Peminjam)</h3>
                            </div>
                            {sortedActiveTx.length === 0 ? (
                                <p className="text-slate-400 text-sm italic py-8 text-center bg-slate-50">Tidak ada peminjaman aktif.</p>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-50 border-b border-slate-200">
                                            <tr>
                                                <th className="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-500">Info Peminjam</th>
                                                <th className="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-500">Waktu Pinjam</th>
                                                <th className="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-500">Batas Pengembalian</th>
                                                <th className="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-500">Ringkasan Alat</th>
                                                <th className="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-500 text-center">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {sortedActiveTx.map(trx => {
                                                let statusClassRow = "hover:bg-slate-50 transition-colors bg-white";

                                                if (trx.isLate) {
                                                    statusClassRow = "bg-red-50/20 hover:bg-red-50/40 transition-colors";
                                                } else {
                                                    const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                                    const diffDays = Math.floor((targetDate.getTime() - currentTime.getTime()) / (1000 * 60 * 60 * 24));
                                                    if (diffDays >= 0 && diffDays <= 2) {
                                                        statusClassRow = "bg-amber-50/20 hover:bg-amber-50/40 transition-colors";
                                                    }
                                                }

                                                return (
                                                <tr key={trx.id} className={statusClassRow}>
                                                    <td className="p-4 align-top">
                                                        <p className="font-bold text-slate-800">{trx.borrowerName}</p>
                                                        <p className="text-xs text-slate-500 mb-1">{trx.nim}</p>
                                                        <span className="inline-block bg-slate-100 text-slate-600 border border-slate-200 text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">{trx.purpose || 'Lainnya'}</span>
                                                    </td>
                                                    <td className="p-4 align-top">
                                                        <div className="flex flex-col gap-1 text-xs">
                                                            <div className="font-medium text-slate-700">{formatDate(trx.borrowDate)}</div>
                                                            <div className="font-mono font-bold text-slate-600">{formatTimeStr(trx.borrowTime)} WIB</div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 align-top">
                                                        <div className="flex flex-col gap-1 text-xs">
                                                            <div className="font-medium text-slate-700">{formatDate(trx.returnDateEst)}</div>
                                                            <div className="font-mono font-bold text-slate-600">{formatTimeStr(trx.returnTimeEst)} WIB</div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 align-top min-w-[200px]">
                                                        <div className="flex flex-col gap-1.5 w-max">
                                                            {trx.items && trx.items.map((i, idx) => (
                                                                <span key={idx} className="text-xs text-slate-700 font-medium">
                                                                    • {i.nama ? `[${i.kode}] ${i.nama}` : i.name} <span className="font-bold ml-1">({i.jumlah || i.quantity}x)</span>
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="p-4 text-center align-top">
                                                        {renderCountdownBadge(trx.returnDateEst, trx.returnTimeEst, trx.status)}
                                                    </td>
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

                        {/* --- KOTAK SARAN & MASUKAN --- */}
                        <div className="mt-8 bg-white p-6 rounded-md border border-slate-200 shadow-sm relative overflow-hidden">
                            <h3 className="text-lg font-bold text-slate-800 mb-1 relative z-10 tracking-tight">
                                Formulir Masukan & Evaluasi
                            </h3>
                            <p className="text-xs text-slate-500 mb-5 relative z-10 font-medium">Bantu kami meningkatkan kualitas layanan Laboratorium Geomatika. Setiap masukan Anda sangat berarti bagi kami.</p>
                            
                            <form onSubmit={handleFeedbackSubmit} className="relative z-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-600 uppercase tracking-wider mb-1">Nama Lengkap (Opsional)</label>
                                        <input type="text" className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500" value={feedbackForm.name} onChange={e => setFeedbackForm({...feedbackForm, name: e.target.value})} placeholder="Boleh berikan nama atau anonim" />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-600 uppercase tracking-wider mb-1">Kategori Saran <span className="text-red-500">*</span></label>
                                        <select required className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 bg-white cursor-pointer" value={feedbackForm.category} onChange={e => setFeedbackForm({...feedbackForm, category: e.target.value})}>
                                            <option value="" disabled>-- Pilih Kategori --</option>
                                            <option value="Kondisi & Kelengkapan Alat">Kondisi & Kelengkapan Alat</option>
                                            <option value="Fasilitas Laboratorium">Fasilitas Laboratorium</option>
                                            <option value="Pelayanan Staff/Asisten">Pelayanan Staff/Asisten</option>
                                            <option value="Sistem Peminjaman (Web)">Sistem Peminjaman (Aplikasi Web)</option>
                                            <option value="Lainnya">Lainnya</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="mb-4">
                                    <label className="block text-[11px] font-bold text-slate-600 uppercase tracking-wider mb-1">Pesan / Masukan <span className="text-red-500">*</span></label>
                                    <textarea required rows="3" className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500" value={feedbackForm.message} onChange={e => setFeedbackForm({...feedbackForm, message: e.target.value})} placeholder="Tuliskan saran, kritik, atau masukan Anda di sini..."></textarea>
                                </div>
                                <div className="flex justify-end">
                                    <button type="submit" disabled={isSubmittingFeedback || !GOOGLE_SCRIPT_INV_FEEDBACK_URL} className={`px-5 py-2 rounded text-sm font-bold text-white transition-all flex items-center ${isSubmittingFeedback ? 'bg-slate-400 cursor-wait' : (!GOOGLE_SCRIPT_INV_FEEDBACK_URL ? 'bg-slate-300 cursor-not-allowed' : 'bg-brand-600 hover:bg-brand-700')}`}>
                                        {isSubmittingFeedback ? <><i className="fas fa-spinner fa-spin mr-2"></i> Mengirim...</> : 'Kirim Saran'}
                                    </button>
                                </div>
                                {!GOOGLE_SCRIPT_INV_FEEDBACK_URL && (
                                    <p className="text-[10px] text-red-500 text-right mt-2 font-medium italic">*Sistem belum dikonfigurasi oleh Admin.</p>
                                )}
                            </form>
                        </div>
                    </div>
                );
            };

            const renderInventory = () => {
                const categories = ['Semua', ...new Set(inventory.map(item => item.category))];
                const filteredInventory = filterCategory === 'Semua' ? inventory : inventory.filter(item => item.category === filterCategory);

                return (
                    <div className="space-y-6 animate-fade-in bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm">
                        <div className="flex flex-col md:flex-row justify-between md:items-end border-b border-slate-200 pb-4 gap-4">
                            <h2 className="text-2xl font-bold text-slate-800 tracking-tight">Stok Alat Laboratorium</h2>
                            <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-1">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setFilterCategory(cat)} className={`px-3 py-1.5 rounded text-[11px] font-bold uppercase tracking-wider whitespace-nowrap transition-colors border ${filterCategory === cat ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {isAdmin && (
                            <div className="mb-4 flex flex-wrap gap-3">
                                <button onClick={() => setShowAddForm(!showAddForm)} className={`px-4 py-2 rounded text-sm font-bold transition flex items-center border ${showAddForm ? 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50' : 'bg-brand-600 text-white border-brand-600 hover:bg-brand-700'}`}>
                                    <i className={`fas ${showAddForm ? 'fa-times' : 'fa-plus'} mr-2`}></i> {showAddForm ? 'Batal Tambah Alat' : 'Tambah Alat Baru'}
                                </button>
                                
                                {baseInventory.some(i => i.isLocalOnly) && (
                                    <button onClick={forceSyncToSheet} className="px-4 py-2 rounded text-sm font-bold transition flex items-center bg-amber-500 hover:bg-amber-600 text-white border border-amber-600 animate-pulse">
