<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Peminjaman Alat Laboratorium Geomatika</title>
    
    <!-- Memuat Tailwind CSS untuk Desain -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MENGGUNAKAN CDNJS -->
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    
    <!-- Layar Loading -->
    <div id="root">
        <div class="flex flex-col items-center justify-center min-h-screen bg-gray-50">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-800">Memuat Aplikasi...</h2>
            <p class="text-gray-500 text-sm mt-2">Pastikan koneksi internet stabil.</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Data Awal Inventaris Lab Geomatika Sesuai Kategori
        const initialInventory = [
            // Total Station
            { id: 'TS-001', category: 'Total Station', name: 'SOUTH NTS-332R', total: 1, available: 1 },
            { id: 'TS-002', category: 'Total Station', name: 'SOUTH NTS-332R', total: 1, available: 1 },
            { id: 'TS-003', category: 'Total Station', name: 'SOUTH NTS-332R', total: 1, available: 1 },
            { id: 'TS-004', category: 'Total Station', name: 'TOPCON OS-SERIES', total: 1, available: 1 },
            { id: 'TS-005', category: 'Total Station', name: 'TOPCON ES-SERIES', total: 1, available: 1 },
            { id: 'TS-006', category: 'Total Station', name: 'TOPCON OS-SERIES', total: 1, available: 1 },
            { id: 'TS-007', category: 'Total Station', name: 'TOPCON GM-SERIES', total: 1, available: 1 },
            { id: 'TS-008', category: 'Total Station', name: 'TOPCON GTS-235N', total: 1, available: 1 },
            { id: 'TS-013', category: 'Total Station', name: 'TOTAL STATION', total: 1, available: 1 },
            { id: 'TS-014', category: 'Total Station', name: 'TOTAL STATION', total: 1, available: 1 },
            { id: 'TS-015', category: 'Total Station', name: 'TOTAL STATION', total: 1, available: 1 },
            
            // Theodolite
            { id: 'DT-001', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-002', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-003', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-004', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-005', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-006', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-007', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            { id: 'DT-008', category: 'Theodolite', name: 'TOPCON DT-200', total: 1, available: 1 },
            
            // Leveling
            { id: 'AL-001', category: 'Leveling', name: 'ORION+', total: 1, available: 1 },
            { id: 'AL-002', category: 'Leveling', name: 'ORION+', total: 1, available: 1 },
            { id: 'AL-003', category: 'Leveling', name: 'ORION+', total: 1, available: 1 },
            { id: 'AL-004', category: 'Leveling', name: 'ORION+', total: 1, available: 1 },
            { id: 'AL-005', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-006', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-007', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-008', category: 'Leveling', name: 'LEICA', total: 1, available: 1 },
            { id: 'AL-009', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-010', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-011', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-012', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-013', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-014', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            { id: 'AL-015', category: 'Leveling', name: 'TOPCON', total: 1, available: 1 },
            
            // GNSS & Laser Scanner
            { id: 'G-001', category: 'GNSS', name: 'TOPCON HIPER II', total: 1, available: 1 },
            { id: 'G-002', category: 'GNSS', name: 'LEICA GS14', total: 1, available: 1 },
            { id: 'G-003', category: 'GNSS', name: 'CHCNAV I73', total: 1, available: 1 },
            { id: 'G-004', category: 'GNSS', name: 'CHCNAV I73', total: 1, available: 1 },
            { id: 'G-005', category: 'GNSS', name: 'CHCNAV I73', total: 1, available: 1 },
            { id: 'G-006', category: 'Laser Scanner', name: 'LEICA BLK360', total: 1, available: 1 },
            
            // Safety
            { id: 'HL-001-100', category: 'Safety', name: 'Helm', total: 100, available: 100 },
            { id: 'RM-001-100', category: 'Safety', name: 'Rompi', total: 100, available: 100 },
            
            // Aksesoris
            { id: 'JL-001-020', category: 'Aksesoris', name: 'Jalon', total: 14, available: 14 },
            { id: 'RB-001-030', category: 'Aksesoris', name: 'Rambu Ukur (3 m)', total: 30, available: 30 },
            { id: 'RB-001-010', category: 'Aksesoris', name: 'Rambu Ukur (4 m)', total: 10, available: 10 },
            { id: 'RB-001-009', category: 'Aksesoris', name: 'Rambu Ukur (5 m)', total: 9, available: 9 },
            { id: 'TM-001-035', category: 'Aksesoris', name: 'Tripod / Statip', total: 35, available: 35 },
            
            // Hidrografi
            { id: 'F-0001', category: 'Hidrografi', name: 'Fish Finder', total: 1, available: 1 },
            { id: 'PL-001-029', category: 'Hidrografi', name: 'Pelampung', total: 29, available: 29 }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [inventory, setInventory] = useState(initialInventory);
            const [transactions, setTransactions] = useState([]);
            const [filterCategory, setFilterCategory] = useState('Semua');
            const [isAdmin, setIsAdmin] = useState(false); // State untuk Mode Admin
            
            const fileInputRef = useRef(null);

            // --- PENTING: GANTI DENGAN URL GOOGLE SCRIPT ANDA ---
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyOtcHEEGX7CXR6GZi48FUq5bqUUbzKIyQoA3nvk5Uwbs0qTo_4m_MXVPrQoTu7EzJn/exec'; 

            const [borrowForm, setBorrowForm] = useState({
                borrowerName: '',
                nim: '',
                borrowDate: new Date().toISOString().split('T')[0],
                returnDateEst: '',
                items: [{ itemId: '', quantity: 1 }],
                approvalFileName: ''
            });

            const [notification, setNotification] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleShareLink = () => {
                const professionalUrl = "https://ongkyanggara.github.io/peminjaman-alat-geomatika/"; 
                const textArea = document.createElement("textarea");
                textArea.value = professionalUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                showNotification('Tautan aplikasi berhasil disalin!', 'success');
            };

            const handleAddBorrowItem = () => {
                setBorrowForm({...borrowForm, items: [...borrowForm.items, { itemId: '', quantity: 1 }]});
            };

            const handleRemoveBorrowItem = (index) => {
                const newItems = [...borrowForm.items];
                newItems.splice(index, 1);
                setBorrowForm({ ...borrowForm, items: newItems });
            };

            const handleBorrowItemChange = (index, field, value) => {
                const newItems = [...borrowForm.items];
                newItems[index][field] = value;
                setBorrowForm({ ...borrowForm, items: newItems });
            };

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    setBorrowForm({...borrowForm, approvalFileName: e.target.files[0].name});
                } else {
                    setBorrowForm({...borrowForm, approvalFileName: ''});
                }
            };

            const submitBorrow = async (e) => {
                e.preventDefault();
                
                if (!borrowForm.borrowerName || !borrowForm.nim || !borrowForm.borrowDate || borrowForm.items.length === 0 || !borrowForm.approvalFileName) {
                    showNotification('Mohon lengkapi semua data diri, alat, dan unggah surat izin', 'error');
                    return;
                }

                for (let item of borrowForm.items) {
                    if (!item.itemId) {
                        showNotification('Ada baris alat yang belum dipilih', 'error');
                        return;
                    }
                    if (item.quantity <= 0) {
                        showNotification('Jumlah alat tidak valid', 'error');
                        return;
                    }
                    
                    const inventoryItem = inventory.find(i => i.id === item.itemId);
                    if (item.quantity > inventoryItem.available) {
                        showNotification(`Stok ${inventoryItem.name} tidak mencukupi! (Tersedia: ${inventoryItem.available})`, 'error');
                        return;
                    }
                }

                setIsSubmitting(true);
                const newTransactionId = 'TRX-' + Math.floor(Math.random() * 1000000);

                if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== 'MASUKKAN_URL_ANDA_DISINI') {
                    try {
                        const alatLengkap = borrowForm.items.map(item => {
                            const invItem = inventory.find(i => i.id === item.itemId);
                            return { name: `[${invItem.id}] ${invItem.name}`, quantity: item.quantity };
                        });

                        const payload = {
                            id: newTransactionId,
                            borrowerName: borrowForm.borrowerName,
                            nim: borrowForm.nim,
                            borrowDate: borrowForm.borrowDate,
                            returnDateEst: borrowForm.returnDateEst,
                            approvalFileName: borrowForm.approvalFileName,
                            items: alatLengkap
                        };

                        await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } catch (error) {
                        showNotification('Gagal mengirim ke Spreadsheet. Cek koneksi.', 'error');
                        setIsSubmitting(false);
                        return; 
                    }
                }

                const newInventory = [...inventory];
                borrowForm.items.forEach(bItem => {
                    const invIndex = newInventory.findIndex(i => i.id === bItem.itemId);
                    newInventory[invIndex].available -= parseInt(bItem.quantity);
                });

                const newTransaction = {
                    id: newTransactionId,
                    type: 'borrow',
                    status: 'active',
                    ...borrowForm,
                    borrowDateFormatted: new Date(borrowForm.borrowDate).toLocaleDateString('id-ID'),
                };

                setInventory(newInventory);
                setTransactions([newTransaction, ...transactions]);
                showNotification('Peminjaman berhasil dicatat!');
                
                setBorrowForm({
                    borrowerName: '', nim: '',
                    borrowDate: new Date().toISOString().split('T')[0],
                    returnDateEst: '', items: [{ itemId: '', quantity: 1 }],
                    approvalFileName: ''
                });
                if (fileInputRef.current) fileInputRef.current.value = "";
                
                setActiveTab('transactions');
                setIsSubmitting(false);
            };

            const handleReturn = (transactionId) => {
                if (window.confirm('Apakah alat sudah dikembalikan semua dalam kondisi baik?')) {
                    const trxIndex = transactions.findIndex(t => t.id === transactionId);
                    const trx = transactions[trxIndex];

                    const newInventory = [...inventory];
                    trx.items.forEach(rItem => {
                        const invIndex = newInventory.findIndex(i => i.id === rItem.itemId);
                        newInventory[invIndex].available += parseInt(rItem.quantity);
                    });

                    const newTransactions = [...transactions];
                    newTransactions[trxIndex].status = 'completed';
                    newTransactions[trxIndex].actualReturnDate = new Date().toLocaleDateString('id-ID');

                    setInventory(newInventory);
                    setTransactions(newTransactions);
                    showNotification('Pengembalian berhasil dicatat!');
                }
            };

            const handleDelete = (transactionId) => {
                if (window.confirm('PERINGATAN: Data ini akan dihapus dari layar dan stok akan dikembalikan. Namun data di Spreadsheet harus Anda hapus manual. Lanjutkan?')) {
                    const trxIndex = transactions.findIndex(t => t.id === transactionId);
                    const trx = transactions[trxIndex];

                    // Jika status masih dipinjam, kembalikan stoknya
                    if (trx.status === 'active') {
                        const newInventory = [...inventory];
                        trx.items.forEach(rItem => {
                            const invIndex = newInventory.findIndex(i => i.id === rItem.itemId);
                            if (invIndex !== -1) newInventory[invIndex].available += parseInt(rItem.quantity);
                        });
                        setInventory(newInventory);
                    }

                    // Hapus dari daftar transaksi
                    const newTransactions = transactions.filter(t => t.id !== transactionId);
                    setTransactions(newTransactions);
                    showNotification('Data transaksi berhasil dihapus dari sistem layar.');
                }
            };

            const handleAdminToggle = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    showNotification('Berhasil keluar dari Mode Admin', 'success');
                } else {
                    const pass = prompt('Masukkan Password Admin:');
                    if (pass === 'adminlab') { // Password rahasianya: adminlab
                        setIsAdmin(true);
                        showNotification('Mode Admin Aktif! Anda kini bisa menghapus data.', 'success');
                    } else if (pass !== null) {
                        showNotification('Password salah!', 'error');
                    }
                }
            };

            const renderDashboard = () => {
                // Kalkulasi Metrik Utama (Top Section)
                const totalAlat = inventory.reduce((sum, item) => sum + item.total, 0);
                const totalTersedia = inventory.reduce((sum, item) => sum + item.available, 0);
                const totalDipinjam = totalAlat - totalTersedia;
                
                const persenTersedia = totalAlat === 0 ? 0 : Math.round((totalTersedia / totalAlat) * 100);
                const persenDipinjam = totalAlat === 0 ? 0 : Math.round((totalDipinjam / totalAlat) * 100);

                const activeTx = transactions.filter(t => t.status === 'active');
                
                // Kalkulasi Keterlambatan
                const today = new Date();
                today.setHours(0,0,0,0);
                const lateTx = activeTx.filter(t => {
                    const rDate = new Date(t.returnDateEst);
                    rDate.setHours(0,0,0,0);
                    return today > rDate;
                });
                const persenTerlambat = activeTx.length === 0 ? 0 : Math.round((lateTx.length / activeTx.length) * 100);

                // Kalkulasi Kategori (Middle Section)
                const categories = [...new Set(inventory.map(i => i.category))];
                const categoryStats = categories.map(cat => {
                    const itemsInCat = inventory.filter(i => i.category === cat);
                    const total = itemsInCat.reduce((sum, i) => sum + i.total, 0);
                    const available = itemsInCat.reduce((sum, i) => sum + i.available, 0);
                    return { category: cat, total, borrowed: total - available, available };
                }).sort((a, b) => b.total - a.total);

                // Setup Warna Grafik Pie
                const chartColors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#14b8a6', '#f97316', '#64748b'];
                
                // CSS Grafik Pie
                let cumulativePercent = 0;
                const pieGradients = categoryStats.map((stat, i) => {
                    const percent = (stat.total / totalAlat) * 100;
                    const gradientStr = `${chartColors[i % chartColors.length]} ${cumulativePercent}% ${cumulativePercent + percent}%`;
                    cumulativePercent += percent;
                    return gradientStr;
                }).join(', ');
                const pieStyle = { background: `conic-gradient(${pieGradients})` };

                // Kalkulasi Top Alat Sering Dipinjam (Bottom Section)
                const itemFrequency = {};
                transactions.forEach(trx => {
                    trx.items.forEach(item => {
                        if (!itemFrequency[item.itemId]) itemFrequency[item.itemId] = 0;
                        itemFrequency[item.itemId] += parseInt(item.quantity);
                    });
                });
                const topItems = Object.keys(itemFrequency)
                    .map(id => ({ id, count: itemFrequency[id], ...inventory.find(i => i.id === id) }))
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 5);

                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex justify-between items-end border-b pb-2">
                            <h2 className="text-2xl font-bold text-gray-800">Dashboard Monitoring</h2>
                        </div>

                        {/* SECTION 1: Quick Stats */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1">Total Inventaris</p><p className="text-3xl font-black text-gray-800">{totalAlat}</p></div>
                                    <div className="bg-blue-100 p-3 rounded-lg text-blue-600"><i className="fas fa-boxes text-xl"></i></div>
                                </div>
                                <p className="text-xs text-gray-400 mt-4">Keseluruhan item di sistem</p>
                            </div>

                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1">Ketersediaan Alat</p><p className="text-3xl font-black text-green-600">{persenTersedia}%</p></div>
                                    <div className="bg-green-100 p-3 rounded-lg text-green-600"><i className="fas fa-check-circle text-xl"></i></div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5 mt-4">
                                    <div className="bg-green-500 h-1.5 rounded-full" style={{width: `${persenTersedia}%`}}></div>
                                </div>
                                <p className="text-xs text-gray-500 mt-1">{totalTersedia} item siap dipinjam</p>
                            </div>

                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1">Sedang Dipinjam</p><p className="text-3xl font-black text-orange-500">{persenDipinjam}%</p></div>
                                    <div className="bg-orange-100 p-3 rounded-lg text-orange-600"><i className="fas fa-exchange-alt text-xl"></i></div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5 mt-4">
                                    <div className="bg-orange-500 h-1.5 rounded-full" style={{width: `${persenDipinjam}%`}}></div>
                                </div>
                                <p className="text-xs text-gray-500 mt-1">{totalDipinjam} item diluar lab</p>
                            </div>

                            <div className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div><p className="text-sm text-gray-500 font-semibold mb-1">Risiko Keterlambatan</p><p className="text-3xl font-black text-red-500">{persenTerlambat}%</p></div>
                                    <div className="bg-red-100 p-3 rounded-lg text-red-600"><i className="fas fa-exclamation-triangle text-xl"></i></div>
                                </div>
                                <div className="w-full bg-gray-100 rounded-full h-1.5 mt-4">
                                    <div className="bg-red-500 h-1.5 rounded-full" style={{width: `${persenTerlambat}%`}}></div>
                                </div>
                                <p className="text-xs text-gray-500 mt-1">{lateTx.length} dari {activeTx.length} transaksi telat</p>
                            </div>
                        </div>

                        {/* SECTION 2: Middle Visuals */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Pie Chart: Distribusi */}
                            <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                                <h3 className="text-lg font-bold text-gray-800 mb-6">Distribusi Alat (Per Kategori)</h3>
                                <div className="flex flex-col md:flex-row items-center gap-8 my-auto">
                                    {/* Lingkaran Pie */}
                                    <div className="w-40 h-40 rounded-full shadow-inner relative flex-shrink-0" style={pieStyle}>
                                        <div className="absolute inset-0 m-auto w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-sm">
                                            <span className="font-bold text-gray-600 text-sm">Total: {totalAlat}</span>
                                        </div>
                                    </div>
                                    {/* Legend Pie */}
                                    <div className="w-full space-y-2">
                                        {categoryStats.map((stat, i) => (
                                            <div key={stat.category} className="flex items-center justify-between text-sm">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-3 h-3 rounded-full block" style={{backgroundColor: chartColors[i % chartColors.length]}}></span>
                                                    <span className="text-gray-600 font-medium truncate max-w-[120px]">{stat.category}</span>
                                                </div>
                                                <span className="font-bold text-gray-800">{Math.round((stat.total/totalAlat)*100)}%</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Bar Chart: Penggunaan */}
                            <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                                <h3 className="text-lg font-bold text-gray-800 mb-6">Tingkat Penggunaan (Sedang Dipinjam)</h3>
                                <div className="space-y-4">
                                    {categoryStats.map((stat) => {
                                        const usePercent = stat.total === 0 ? 0 : Math.round((stat.borrowed / stat.total) * 100);
                                        return (
                                            <div key={stat.category}>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="font-semibold text-gray-700">{stat.category}</span>
                                                    <span className="text-gray-500">{stat.borrowed} / {stat.total} <span className="font-bold text-blue-600 ml-1">({usePercent}%)</span></span>
                                                </div>
                                                <div className="w-full bg-gray-100 rounded-full h-2">
                                                    <div className="bg-blue-500 h-2 rounded-full transition-all duration-500" style={{width: `${usePercent}%`}}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* SECTION 3: Bottom Monitoring */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Alat Sering Dipinjam */}
                            <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                                <h3 className="text-lg font-bold text-gray-800 mb-4"><i className="fas fa-fire text-orange-500 mr-2"></i> Alat Paling Sering Dipinjam</h3>
                                {topItems.length === 0 ? (
                                    <p className="text-gray-400 text-sm italic py-4 text-center">Belum ada data peminjaman untuk dianalisis.</p>
                                ) : (
                                    <ul className="divide-y divide-gray-100">
                                        {topItems.map((item, idx) => (
                                            <li key={item.id} className="py-3 flex justify-between items-center">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${idx === 0 ? 'bg-yellow-100 text-yellow-700' : idx === 1 ? 'bg-slate-200 text-slate-700' : idx === 2 ? 'bg-orange-100 text-orange-800' : 'bg-gray-50 text-gray-500'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-bold text-gray-800">{item.name}</p>
                                                        <p className="text-xs text-gray-500">[{item.id}] - {item.category}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold">{item.count}x Dipinjam</span>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>

                            {/* Alert Keterlambatan Aktif */}
                            <div className="bg-white p-6 rounded-xl border border-red-200 shadow-sm relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-red-50 rounded-bl-full -z-10"></div>
                                <h3 className="text-lg font-bold text-red-700 mb-4"><i className="fas fa-bell mr-2"></i> Monitor Keterlambatan</h3>
                                {lateTx.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-8 text-green-500">
                                        <i className="fas fa-shield-check text-4xl mb-3 opacity-50"></i>
                                        <p className="text-sm font-medium">Luar biasa! Tidak ada peminjam yang terlambat saat ini.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {lateTx.map(trx => (
                                            <div key={trx.id} className="bg-red-50 border-l-4 border-red-500 p-3 rounded-r-lg">
                                                <div className="flex justify-between">
                                                    <p className="font-bold text-red-800 text-sm">{trx.borrowerName} <span className="font-normal text-xs text-red-600">({trx.nim})</span></p>
                                                    <span className="text-xs font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded">Telat</span>
                                                </div>
                                                <p className="text-xs text-red-700 mt-1">Batas: {new Date(trx.returnDateEst).toLocaleDateString('id-ID')}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* SECTION 4: Aktivitas Sedang Berjalan (Hari Ini) */}
                        <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                            <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-4 gap-2">
                                <h3 className="text-lg font-bold text-gray-800"><i className="fas fa-tasks text-blue-500 mr-2"></i> Aktivitas Peminjaman Berjalan</h3>
                                <span className="text-sm text-gray-600 bg-gray-100 px-3 py-1.5 rounded-lg font-medium border border-gray-200">
                                    <i className="far fa-calendar-alt mr-1"></i> {new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </span>
                            </div>
                            {activeTx.length === 0 ? (
                                <p className="text-gray-400 text-sm italic py-6 text-center bg-gray-50 rounded-lg">Tidak ada peminjaman yang sedang berlangsung saat ini.</p>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                            <tr>
                                                <th className="p-3 font-semibold rounded-tl-lg">Nama Peminjam</th>
                                                <th className="p-3 font-semibold">Ringkasan Alat</th>
                                                <th className="p-3 font-semibold">Tanggal Pinjam</th>
                                                <th className="p-3 font-semibold text-center rounded-tr-lg">Estimasi Kembali</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {activeTx.map(trx => (
                                                <tr key={trx.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-3">
                                                        <p className="font-bold text-gray-800">{trx.borrowerName}</p>
                                                        <p className="text-xs text-gray-500">{trx.nim}</p>
                                                    </td>
                                                    <td className="p-3 text-gray-700 whitespace-normal min-w-[250px]">
                                                        {trx.items.map(i => {
                                                            const alat = inventory.find(inv => inv.id === i.itemId);
                                                            return `${alat?.name} (${i.quantity}x)`;
                                                        }).join(', ')}
                                                    </td>
                                                    <td className="p-3 text-gray-600">{trx.borrowDateFormatted}</td>
                                                    <td className="p-3 text-center">
                                                        <span className="bg-orange-50 text-orange-700 border border-orange-100 px-2.5 py-1 rounded-md font-bold text-xs">
                                                            {new Date(trx.returnDateEst).toLocaleDateString('id-ID')}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderInventory = () => {
                const categories = ['Semua', ...new Set(inventory.map(item => item.category))];
                const filteredInventory = filterCategory === 'Semua' 
                    ? inventory 
                    : inventory.filter(item => item.category === filterCategory);

                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between md:items-end border-b pb-4 gap-4">
                            <h2 className="text-2xl font-bold text-gray-800">Stok Alat Laboratorium</h2>
                            <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-1">
                                {categories.map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setFilterCategory(cat)} 
                                        className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors border ${filterCategory === cat ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-gray-800 text-white">
                                        <tr>
                                            <th className="p-4">Kode Alat</th>
                                            <th className="p-4">Kategori</th>
                                            <th className="p-4">Nama Alat / Model</th>
                                            <th className="p-4 text-center">Total</th>
                                            <th className="p-4 text-center">Tersedia</th>
                                            <th className="p-4 text-center">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {filteredInventory.map(item => (
                                            <tr key={item.id} className="hover:bg-gray-50 transition-colors">
                                                <td className="p-4 text-sm font-bold text-slate-700">{item.id}</td>
                                                <td className="p-4"><span className="bg-slate-100 border border-slate-200 text-slate-600 px-2 py-1 rounded text-xs font-semibold">{item.category}</span></td>
                                                <td className="p-4 font-medium text-gray-900">{item.name}</td>
                                                <td className="p-4 text-center text-sm">{item.total}</td>
                                                <td className="p-4 text-center font-black text-green-600">{item.available}</td>
                                                <td className="p-4 text-center">
                                                    {item.available === 0 
                                                        ? <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Habis</span>
                                                        : <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Tersedia</span>
                                                    }
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBorrowForm = () => {
                const inventoryByCategory = inventory.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">Form Peminjaman Alat</h2>
                        <form onSubmit={submitBorrow} className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nama Peminjam / Kelompok</label>
                                    <input type="text" required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={borrowForm.borrowerName} onChange={e => setBorrowForm({...borrowForm, borrowerName: e.target.value})} placeholder="Contoh: Kelompok 1 - Budi" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">NIM / ID Anggota</label>
                                    <input type="text" required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={borrowForm.nim} onChange={e => setBorrowForm({...borrowForm, nim: e.target.value})} placeholder="Masukkan NIM" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Pinjam</label>
                                    <input type="date" required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={borrowForm.borrowDate} onChange={e => setBorrowForm({...borrowForm, borrowDate: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Estimasi Kembali</label>
                                    <input type="date" required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={borrowForm.returnDateEst} onChange={e => setBorrowForm({...borrowForm, returnDateEst: e.target.value})} />
                                </div>
                                <div className="md:col-span-2 bg-blue-50 p-4 rounded-xl border border-blue-200 mt-2">
                                    <label className="block text-sm font-bold text-blue-900 mb-2"><i className="fas fa-file-pdf mr-2"></i> Unggah Surat Izin</label>
                                    <input type="file" ref={fileInputRef} accept=".pdf, image/png, image/jpeg" required onChange={handleFileChange} className="w-full text-sm text-gray-600 bg-white border border-blue-300 rounded-lg p-2" />
                                </div>
                            </div>

                            <div className="border-t pt-4">
                                <div className="flex justify-between items-center mb-3">
                                    <label className="block text-sm font-bold text-gray-800">Daftar Alat yang Dipinjam</label>
                                    <button type="button" onClick={handleAddBorrowItem} className="text-sm bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200 font-bold shadow-sm transition"><i className="fas fa-plus mr-1"></i> Tambah Alat</button>
                                </div>
                                <div className="space-y-3">
                                    {borrowForm.items.map((item, index) => (
                                        <div key={index} className="flex flex-col md:flex-row gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200 items-center">
                                            <span className="font-bold text-slate-400 hidden md:block">{index + 1}.</span>
                                            <select className="flex-grow w-full p-2 border border-slate-300 rounded-lg bg-white font-medium focus:ring-2 focus:ring-blue-500" value={item.itemId} onChange={e => handleBorrowItemChange(index, 'itemId', e.target.value)} required>
                                                <option value="" disabled>-- Pilih Alat Sesuai Kategori --</option>
                                                {Object.keys(inventoryByCategory).map(category => (
                                                    <optgroup key={category} label={`--- KATEGORI: ${category.toUpperCase()} ---`}>
                                                        {inventoryByCategory[category].map(inv => (
                                                            <option key={inv.id} value={inv.id} disabled={inv.available === 0}>
                                                                [{inv.id}] {inv.name} - (Tersedia: {inv.available})
                                                            </option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                            <div className="flex items-center w-full md:w-auto gap-3">
                                                <label className="text-xs font-bold text-slate-600 md:hidden">Jumlah:</label>
                                                <input type="number" min="1" className="w-full md:w-24 p-2 border border-slate-300 rounded-lg text-center font-bold" placeholder="Jumlah" value={item.quantity} onChange={e => handleBorrowItemChange(index, 'quantity', e.target.value)} required />
                                                {borrowForm.items.length > 1 && (
                                                    <button type="button" onClick={() => handleRemoveBorrowItem(index)} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 border border-red-100 rounded-lg transition" title="Hapus Baris"><i className="fas fa-trash-alt"></i></button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="border-t pt-6 flex justify-end">
                                <button type="submit" disabled={isSubmitting} className={`w-full md:w-auto text-white font-bold py-3 px-8 rounded-lg shadow-md transition ${isSubmitting ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                    {isSubmitting ? <><i className="fas fa-spinner fa-spin mr-2"></i> Mengirim Data...</> : <><i className="fas fa-paper-plane mr-2"></i> Proses Peminjaman</>}
                                </button>
                            </div>
                        </form>
                    </div>
                );
            };

            const renderTransactions = () => (
                <div className="space-y-6 animate-fade-in">
                    <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">Status & Pengembalian Alat</h2>
                    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                        {transactions.length === 0 ? (
                            <div className="p-10 text-center text-gray-400"><i className="fas fa-clipboard-check text-5xl mb-4 opacity-30"></i><p className="font-medium text-lg">Belum ada alat yang sedang dipinjam.</p></div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-gray-800 text-white">
                                        <tr>
                                            <th className="p-4">Info Peminjam</th>
                                            <th className="p-4">Tanggal</th>
                                            <th className="p-4">Rincian Alat</th>
                                            <th className="p-4 text-center">Status</th>
                                            <th className="p-4 text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {transactions.map(trx => (
                                            <tr key={trx.id} className="hover:bg-gray-50">
                                                <td className="p-4">
                                                    <p className="font-bold text-gray-900 text-base">{trx.borrowerName}</p>
                                                    <p className="text-gray-500 text-xs mt-0.5">NIM: <span className="font-semibold">{trx.nim}</span></p>
                                                    <div className="mt-2 text-xs text-blue-700 bg-blue-50 border border-blue-100 w-max px-2 py-1 rounded-md shadow-sm">
                                                        <i className="fas fa-file-pdf mr-1"></i> {trx.approvalFileName}
                                                    </div>
                                                </td>
                                                <td className="p-4 text-xs space-y-1">
                                                    <p><span className="font-semibold text-gray-600">Pinjam:</span> <span className="font-medium">{trx.borrowDateFormatted}</span></p>
                                                    <p><span className="font-semibold text-red-500">Batas:</span> <span className="font-medium">{new Date(trx.returnDateEst).toLocaleDateString('id-ID')}</span></p>
                                                    {trx.actualReturnDate && <p className="text-green-600 mt-1 pt-1 border-t border-green-100"><span className="font-semibold">Kembali:</span> {trx.actualReturnDate}</p>}
                                                </td>
                                                <td className="p-4">
                                                    <ul className="list-none space-y-1">
                                                        {trx.items.map((item, idx) => {
                                                            const alat = inventory.find(i => i.id === item.itemId);
                                                            return (
                                                                <li key={idx} className="text-xs bg-slate-100 border border-slate-200 px-2 py-1 rounded">
                                                                    <span className="font-bold text-slate-700">[{alat?.id}]</span> {alat?.name} <span className="font-bold text-blue-600 ml-1">x{item.quantity}</span>
                                                                </li>
                                                            )
                                                        })}
                                                    </ul>
                                                </td>
                                                <td className="p-4 text-center">
                                                    {trx.status === 'active' 
                                                        ? <span className="bg-orange-100 border border-orange-200 text-orange-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm"><i className="fas fa-exclamation-circle mr-1"></i> Dipinjam</span>
                                                        : <span className="bg-green-100 border border-green-200 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm"><i className="fas fa-check-circle mr-1"></i> Selesai</span>
                                                    }
                                                </td>
                                                <td className="p-4 text-center">
                                                    {trx.status === 'active' ? (
                                                        <button onClick={() => handleReturn(trx.id)} className="bg-green-500 hover:bg-green-600 border border-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow transition w-full mb-2">
                                                            <i className="fas fa-undo mr-1"></i> Kembalikan
                                                        </button>
                                                    ) : (
                                                        <span className="text-gray-400 text-xs italic font-medium block mb-2">Tuntas</span>
                                                    )}
                                                    
                                                    {isAdmin && (
                                                        <button onClick={() => handleDelete(trx.id)} className="bg-red-500 hover:bg-red-600 border border-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow transition w-full">
                                                            <i className="fas fa-trash-alt mr-1"></i> Hapus
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {notification && (
                        <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-xl text-white font-semibold transition-all flex items-center ${notification.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            <i className={`fas ${notification.type === 'error' ? 'fa-times-circle' : 'fa-check-circle'} text-xl mr-3`}></i>
                            {notification.message}
                        </div>
                    )}

                    {/* Sidebar */}
                    <nav className="bg-slate-900 w-full md:w-64 flex-shrink-0 text-white flex flex-col shadow-xl z-10 md:min-h-screen">
                        <div className="p-6 bg-slate-950 text-center border-b border-slate-800">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-3">
                                <i className="fas fa-satellite-dish text-3xl"></i>
                            </div>
                            <h1 className="text-lg font-black tracking-tight leading-tight uppercase">Monitoring Peminjaman Alat</h1>
                            <p className="text-blue-400 text-xs font-semibold mt-2">Laboratorium Geomatika</p>
                        </div>
                        <div className="flex-grow p-4 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <i className="fas fa-chart-pie w-5"></i> <span className="font-medium">Dashboard</span>
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'inventory' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <i className="fas fa-clipboard-list w-5"></i> <span className="font-medium">Stok Alat</span>
                            </button>
                            <button onClick={() => setActiveTab('borrow')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'borrow' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <i className="fas fa-edit w-5"></i> <span className="font-medium">Form Peminjaman</span>
                            </button>
                            <button onClick={() => setActiveTab('transactions')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'transactions' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <i className="fas fa-history w-5"></i> <span className="font-medium">Pengembalian</span>
                            </button>
                        </div>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={handleShareLink} className="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-slate-700 text-slate-300 py-2.5 rounded-lg transition text-sm font-semibold mb-5 shadow-sm border border-slate-700">
                                <i className="fas fa-share-alt"></i> <span>Salin Tautan Web</span>
                            </button>
                            <div className="text-[11px] text-slate-500 text-center leading-relaxed relative">
                                &copy; 2026 Laboratorium Geomatika <br/>Institut Teknologi Sumatera
                                
                                {/* Tombol Rahasia Admin */}
                                <button onClick={handleAdminToggle} className="absolute -bottom-2 -right-2 p-2 text-slate-700 hover:text-slate-400 transition" title="Admin Access">
                                    <i className={`fas ${isAdmin ? 'fa-lock-open text-red-500' : 'fa-lock'}`}></i>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-grow p-4 md:p-8 overflow-y-auto w-full bg-gray-100/50">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'inventory' && renderInventory()}
                            {activeTab === 'borrow' && renderBorrowForm()}
                            {activeTab === 'transactions' && renderTransactions()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Kustom scrollbar untuk tab kategori */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</body>
</html>
