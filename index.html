                                        <option value="" disabled>-- Pilih Keperluan --</option>
                                        <option value="Praktikum">Praktikum</option>
                                        <option value="Tugas akhir">Tugas Akhir</option>
                                        <option value="Penelitian">Penelitian</option>
                                        <option value="Proyek">Proyek</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                </div>
                                
                                {borrowForm.purpose === 'Praktikum' && (
                                    <div className={`md:col-span-2 grid grid-cols-1 ${borrowForm.praktikumCourse === 'Layanan Praktikum GT' ? 'md:grid-cols-3' : 'md:grid-cols-2'} gap-4 bg-blue-50/50 p-4 rounded-xl border border-blue-100 animate-fade-in`}>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Mata Kuliah Praktikum</label>
                                            <select required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer" value={borrowForm.praktikumCourse} onChange={e => setBorrowForm({...borrowForm, praktikumCourse: e.target.value, praktikumLayanan: e.target.value !== 'Layanan Praktikum GT' ? '' : borrowForm.praktikumLayanan})}>
                                                <option value="" disabled>-- Pilih Mata Kuliah --</option>
                                                <option value="Layanan Praktikum GT" className="font-bold text-blue-700">Layanan Praktikum GT</option>
                                                <option value="Survei Kontruksi">Survei Kontruksi</option>
                                                <option value="Pemetaan Dasar">Pemetaan Dasar</option>
                                                <option value="Pemetaan Terestris">Pemetaan Terestris</option>
                                                <option value="Hidrografi I">Hidrografi I</option>
                                                <option value="Hidrografi II">Hidrografi II</option>
                                                <option value="Kemah Kerja">Kemah Kerja</option>
                                                <option value="Survei GNSS">Survei GNSS</option>
                                                <option value="Fotogrametri Dasar">Fotogrametri Dasar</option>
                                                <option value="Fotogrametri Lanjut">Fotogrametri Lanjut</option>
                                                <option value="Pemetaan Radar dan LiDAR">Pemetaan Radar dan LiDAR</option>
                                            </select>
                                        </div>
                                        
                                        {borrowForm.praktikumCourse === 'Layanan Praktikum GT' && (
                                            <div className="animate-fade-in">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Layanan Praktikum</label>
                                                <select required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer" value={borrowForm.praktikumLayanan} onChange={e => setBorrowForm({...borrowForm, praktikumLayanan: e.target.value})}>
                                                    <option value="" disabled>-- Pilih Layanan --</option>
                                                    <option value="Layanan Teknik Sipil">Layanan Teknik Sipil</option>
                                                    <option value="Layanan Teknik Kelautan">Layanan Teknik Kelautan</option>
                                                    <option value="Layanan Teknik Perkeretaapian">Layanan Teknik Perkeretaapian</option>
                                                    <option value="Layanan Teknik Biosistem">Layanan Teknik Biosistem</option>
                                                    <option value="Layanan Tata Kelola Air Terpadu">Layanan Tata Kelola Air Terpadu</option>
                                                </select>
                                            </div>
                                        )}

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Kelas</label>
                                            <select required className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer" value={borrowForm.praktikumClass} onChange={e => setBorrowForm({...borrowForm, praktikumClass: e.target.value})}>
                                                <option value="" disabled>-- Pilih Kelas --</option>
                                                <option value="RA">RA</option>
                                                <option value="RB">RB</option>
                                                <option value="RC">RC</option>
                                            </select>
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal & Jam Pengambilan</label>
                                    <div className="flex gap-2 relative">
                                        <input type="date" required className="w-3/5 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm cursor-pointer" value={borrowForm.borrowDate} onChange={e => setBorrowForm({...borrowForm, borrowDate: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        <input type="time" required className="w-2/5 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm font-bold cursor-pointer" value={borrowForm.borrowTime} onChange={e => setBorrowForm({...borrowForm, borrowTime: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} title="Klik untuk memilih jam" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Estimasi Tanggal & Jam Pemulangan</label>
                                    <div className="flex gap-2 relative">
                                        <input type="date" required className="w-3/5 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm cursor-pointer" value={borrowForm.returnDateEst} onChange={e => setBorrowForm({...borrowForm, returnDateEst: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        <input type="time" required className="w-2/5 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm font-bold cursor-pointer" value={borrowForm.returnTimeEst} onChange={e => setBorrowForm({...borrowForm, returnTimeEst: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} title="Klik untuk memilih jam" />
                                    </div>
                                </div>
                                
                                <div className="md:col-span-2 bg-blue-50 p-4 rounded-xl border border-blue-200 mt-2">
                                    <label className="block text-sm font-bold text-blue-900 mb-2"><i className="fas fa-file-upload mr-2"></i> Unggah Surat Izin Peminjaman (PDF/Gambar, Max 3MB)</label>
                                    <input type="file" accept=".pdf, image/jpeg, image/png" ref={fileInputRef} required onChange={handleFileChange} className="w-full text-sm text-gray-600 bg-white border border-blue-300 rounded-lg p-2 cursor-pointer" />
                                </div>
                            </div>

                            <div className="border-t pt-4">
                                <div className="flex justify-between items-center mb-3">
                                    <label className="block text-sm font-bold text-gray-800">Daftar Alat yang Dipinjam</label>
                                    <button type="button" onClick={handleAddBorrowItem} className="text-sm bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-200 transition-colors"><i className="fas fa-plus mr-1"></i> Tambah Alat</button>
                                </div>
                                <div className="space-y-3">
                                    {borrowForm.items.map((item, index) => (
                                        <div key={index} className="flex flex-col md:flex-row gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200 items-center">
                                            <span className="font-bold text-slate-400 hidden md:block">{index + 1}.</span>
                                            <select className="flex-grow w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 cursor-pointer" value={item.itemId} onChange={e => handleBorrowItemChange(index, 'itemId', e.target.value)} required>
                                                <option value="" disabled>-- Pilih Alat Sesuai Kategori --</option>
                                                {Object.keys(inventoryByCategory).map(category => (
                                                    <optgroup key={category} label={`--- KATEGORI: ${category.toUpperCase()} ---`}>
                                                        {inventoryByCategory[category].map(inv => (
                                                            <option key={inv.id} value={inv.id} disabled={inv.available === 0}>
                                                                [{inv.id}] {inv.name} - (Tersedia: {inv.available})
                                                            </option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                            <div className="flex items-center w-full md:w-auto gap-3">
                                                <label className="text-xs font-bold text-slate-600 md:hidden">Jumlah:</label>
                                                <input type="number" min="1" className="w-full md:w-24 p-2 border border-slate-300 rounded-lg text-center font-bold" value={item.quantity} onChange={e => handleBorrowItemChange(index, 'quantity', e.target.value)} required />
                                                {borrowForm.items.length > 1 && (
                                                    <button type="button" onClick={() => handleRemoveBorrowItem(index)} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition-colors"><i className="fas fa-trash-alt"></i></button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="border-t pt-6 flex justify-end">
                                <button type="submit" disabled={isSubmitting} className={`w-full md:w-auto text-white font-bold py-3 px-8 rounded-lg shadow-md transition ${isSubmitting ? 'bg-blue-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                    {isSubmitting ? <><i className="fas fa-spinner fa-spin mr-2"></i> Mengirim Data...</> : <><i className="fas fa-paper-plane mr-2"></i> Proses Peminjaman</>}
                                </button>
                            </div>
                        </form>
                    </div>
                );
            };

            const renderTransactions = () => {
                const getTxCategory = (trx) => {
                    if (trx.status === 'active') {
                        const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                        if (targetDate.getTime() - currentTime.getTime() <= 0) return 'Terlambat';
                        return 'Dipinjam';
                    } else if (trx.status && trx.status.startsWith('completed')) {
                        let isLate = false;
                        if (trx.status.includes('|')) {
                            const safeISOString = trx.status.split('|')[1].replace(' ', 'T');
                            const returnTimestamp = new Date(safeISOString);
                            const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                            if (returnTimestamp.getTime() > targetDate.getTime()) isLate = true;
                        }
                        return isLate ? 'Terlambat' : 'Tepat Waktu';
                    }
                    return 'Tepat Waktu'; 
                };

                const sortedTx = [...transactions].sort((a, b) => {
                    const dateA = parseTargetDate(a.borrowDate, a.borrowTime).getTime();
                    const dateB = parseTargetDate(b.borrowDate, b.borrowTime).getTime();
                    return dateB - dateA;
                });

                const filteredTx = sortedTx.filter(trx => {
                    if (txFilter === 'Semua') return true;
                    return getTxCategory(trx) === txFilter;
                });

                const displayedTx = txLimit === 'Semua' ? filteredTx : filteredTx.slice(0, txLimit);

                return (
                    <div className="space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-gray-800 border-b pb-2">Status & Pengembalian Alat</h2>
                        
                        <div className="flex flex-col md:flex-row justify-between gap-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                            <div className="flex items-center gap-3">
                                <label className="text-sm font-bold text-gray-700 w-24 md:w-auto"><i className="fas fa-filter mr-1 text-blue-500"></i> Filter:</label>
                                <select className="w-full md:w-auto p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 font-medium cursor-pointer" value={txFilter} onChange={(e) => setTxFilter(e.target.value)}>
                                    <option value="Semua">Semua Peminjaman</option>
                                    <option value="Dipinjam">Sedang Dipinjam</option>
                                    <option value="Tepat Waktu">Dikembalikan (Tepat Waktu)</option>
                                    <option value="Terlambat">Terlambat (Belum/Sudah Kembali)</option>
                                </select>
                            </div>
                            <div className="flex items-center gap-3">
                                <label className="text-sm font-bold text-gray-700 w-24 md:w-auto"><i className="fas fa-list-ol mr-1 text-blue-500"></i> Tampilkan:</label>
                                <select className="w-full md:w-auto p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 font-medium cursor-pointer" value={txLimit} onChange={(e) => setTxLimit(e.target.value === 'Semua' ? 'Semua' : parseInt(e.target.value))}>
                                    <option value={10}>10 Baris Teratas</option>
                                    <option value={25}>25 Baris Teratas</option>
                                    <option value={50}>50 Baris Teratas</option>
                                    <option value="Semua">Semua Data</option>
                                </select>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                            {displayedTx.length === 0 ? (
                                <div className="p-10 text-center text-gray-400">
                                    <i className="fas fa-clipboard-check text-5xl mb-4 opacity-30"></i>
                                    <p className="font-medium text-lg">Tidak ada data yang sesuai filter.</p>
                                </div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-gray-800 text-white">
                                            <tr>
                                                <th className="p-4">Info Peminjam</th>
                                                <th className="p-4 text-left">Waktu Pinjam</th>
                                                <th className="p-4 text-left">Batas Pengembalian</th>
                                                <th className="p-4">Rincian Alat</th>
                                                <th className="p-4 text-center">Status Pengembalian</th>
                                                <th className="p-4 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {displayedTx.map(trx => {
                                                const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                                const diffMs = targetDate.getTime() - currentTime.getTime();
                                                const isLate = diffMs <= 0;

                                                let rowClass = "hover:bg-gray-50 transition-colors";
                                                if (trx.status === 'active') {
                                                    if (isLate) rowClass = "bg-red-50/50 hover:bg-red-50 transition-colors";
                                                } else if (trx.status.startsWith('completed|')) {
                                                    const returnTimestamp = new Date(trx.status.split('|')[1].replace(' ', 'T'));
                                                    if (returnTimestamp.getTime() > targetDate.getTime()) {
                                                        rowClass = "bg-red-50/30 hover:bg-red-50 transition-colors";
                                                    } else {
                                                        rowClass = "bg-green-50/30 hover:bg-green-50 transition-colors";
                                                    }
                                                }

                                                return (
                                                <tr key={trx.id} className={rowClass}>
                                                    <td className="p-4 align-top">
                                                        <p className="font-bold text-gray-900 text-base">{trx.borrowerName}</p>
                                                        <p className="text-gray-500 text-xs mt-0.5">NIM: <span className="font-semibold">{trx.nim}</span></p>
                                                        {trx.purpose && <p className="text-indigo-600 text-xs font-bold mt-1"><i className="fas fa-tag mr-1"></i> {trx.purpose}</p>}
                                                        
                                                        {/* Link untuk membuka file jika Google Script mengembalikan URL File Google Drive */}
                                                        {trx.approvalFileUrl ? (
                                                            <a href={trx.approvalFileUrl} target="_blank" rel="noopener noreferrer" className="mt-2 text-xs text-blue-700 bg-blue-50 border border-blue-200 w-max px-2 py-1 rounded-md shadow-sm hover:bg-blue-100 inline-flex items-center transition"><i className="fas fa-external-link-alt mr-1 text-red-500"></i> Buka Surat Izin</a>
                                                        ) : (
                                                            <div className="mt-2 text-xs text-slate-500 bg-slate-50 border border-slate-200 w-max px-2 py-1 rounded-md"><i className="fas fa-file mr-1"></i> {trx.approvalFileName}</div>
                                                        )}
                                                    </td>
                                                    <td className="p-4 align-top whitespace-nowrap">
                                                        <div className="flex flex-col gap-2 text-sm">
                                                            <div className="flex items-center text-blue-600 font-medium">
                                                                <i className="far fa-calendar-alt w-5 text-center mt-0.5"></i>
                                                                <div className="flex flex-col ml-1">
                                                                    <span className="text-gray-800 font-bold">{formatDate(trx.borrowDate)}</span>
                                                                    <span className="text-[10px] text-gray-500 font-bold uppercase">{formatDay(trx.borrowDate)}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center text-blue-600 mt-0.5">
                                                                <i className="far fa-clock w-5 text-center"></i>
                                                                <span className="ml-1 bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md shadow-sm font-mono font-bold tracking-widest text-xs">
                                                                    {formatTimeStr(trx.borrowTime)} WIB
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 align-top whitespace-nowrap">
                                                        <div className="flex flex-col gap-2 text-sm">
                                                            <div className="flex items-center text-red-500 font-medium">
                                                                <i className="far fa-calendar-check w-5 text-center mt-0.5"></i>
                                                                <div className="flex flex-col ml-1">
                                                                    <span className="text-gray-800 font-bold">{formatDate(trx.returnDateEst)}</span>
                                                                    <span className="text-[10px] text-gray-500 font-bold uppercase">{formatDay(trx.returnDateEst)}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center text-red-500 mt-0.5">
                                                                <i className="far fa-clock w-5 text-center"></i>
                                                                <span className="ml-1 bg-red-50 text-red-700 px-2 py-0.5 rounded-md shadow-sm font-mono font-bold tracking-widest text-xs">
                                                                    {formatTimeStr(trx.returnTimeEst)} WIB
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 align-top">
                                                        <div className="flex flex-col gap-1.5 w-max">
                                                            {trx.items && trx.items.map((item, idx) => (
                                                                <span key={idx} className="bg-white border border-gray-200 text-[11px] px-2.5 py-1 rounded shadow-sm text-gray-700 font-semibold w-full block">
                                                                    {item.nama ? `[${item.kode}] ${item.nama}` : item.name} <span className="text-blue-600 ml-1">({item.jumlah || item.quantity}x)</span>
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="p-4 text-center align-top">
                                                        {renderCountdownBadge(trx.returnDateEst, trx.returnTimeEst, trx.status)}
                                                    </td>
                                                    <td className="p-4 text-center align-top">
                                                        {trx.status === 'active' ? (
                                                            isAdmin ? (
                                                                <button onClick={() => handleReturn(trx.id)} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold w-full mb-2 shadow-sm"><i className="fas fa-undo mr-1"></i> Kembalikan</button>
                                                            ) : (
                                                                <span className="text-orange-500 text-xs italic font-medium block mb-2">Menunggu Pengembalian</span>
                                                            )
                                                        ) : (
                                                            <span className="text-gray-400 text-xs italic font-medium block mb-2">Telah Selesai</span>
                                                        )}
                                                        {isAdmin && (
                                                            <button onClick={() => handleDelete(trx.id)} className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold w-full shadow-sm"><i className="fas fa-trash-alt mr-1"></i> Hapus</button>
                                                        )}
                                                    </td>
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            if (isAppLoading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-gray-50">
                        <i className="fas fa-sync fa-spin text-4xl text-blue-600 mb-4"></i>
                        <h2 className="text-xl font-bold text-gray-800">Memuat Aplikasi...</h2>
                        <p className="text-gray-500 text-sm mt-2">Membaca riwayat peminjaman dari Spreadsheet</p>
                    </div>
                )
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {notification && (
                        <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-xl text-white font-semibold transition-all flex items-center ${notification.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            <i className={`fas ${notification.type === 'error' ? 'fa-times-circle' : 'fa-check-circle'} text-xl mr-3`}></i> {notification.message}
                        </div>
                    )}

                    <nav className="bg-slate-900 w-full md:w-64 flex-shrink-0 text-white flex flex-col shadow-xl z-10 md:min-h-screen">
                        <div className="p-6 bg-slate-950 text-center border-b border-slate-800">
                            <div className="w-32 h-32 bg-white rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4 overflow-hidden p-2">
                                <img src="logo.jpeg" alt="Logo Monitoring Alat Lab Geomatika" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="text-sm font-black tracking-tight leading-tight uppercase text-slate-300">Sistem Informasi</h1>
                            <p className="text-blue-400 text-xs font-semibold mt-1">Lab Geomatika</p>
                        </div>
                        <div className="flex-grow p-4 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}><i className="fas fa-chart-pie w-5"></i> <span className="font-medium">Dashboard</span></button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'inventory' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}><i className="fas fa-clipboard-list w-5"></i> <span className="font-medium">Database Alat</span></button>
                            <button onClick={() => setActiveTab('borrow')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'borrow' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}><i className="fas fa-edit w-5"></i> <span className="font-medium">Form Peminjaman</span></button>
                            <button onClick={() => setActiveTab('transactions')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'transactions' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}><i className="fas fa-history w-5"></i> <span className="font-medium">Pengembalian</span></button>
                        </div>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={handleShareLink} className="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-slate-700 text-slate-300 py-2.5 rounded-lg transition text-sm font-semibold mb-5"><i className="fas fa-share-alt"></i> <span>Salin Tautan Web</span></button>
                            <div className="text-[11px] text-slate-500 text-center leading-relaxed relative">
                                &copy; 2026 Laboratorium Geomatika <br/>Institut Teknologi Sumatera
                                <button onClick={handleAdminToggle} className="absolute -bottom-2 -right-2 p-2 text-slate-700 hover:text-slate-400 transition" title="Admin Access">
                                    <i className={`fas ${isAdmin ? 'fa-lock-open text-red-500' : 'fa-lock'}`}></i>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-8 overflow-y-auto w-full bg-gray-100/50">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'inventory' && renderInventory()}
                            {activeTab === 'borrow' && renderBorrowForm()}
                            {activeTab === 'transactions' && renderTransactions()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</body>
</html>
