                                        <i className="fas fa-cloud-upload-alt mr-2"></i> Paksa Sinkronisasi ke Sheet
                                    </button>
                                )}
                            </div>
                        )}
                        
                        {showAddForm && isAdmin && (
                            <form onSubmit={handleAddNewInventoryItem} className="mb-6 bg-slate-50 p-5 rounded border border-slate-200 grid grid-cols-1 md:grid-cols-5 gap-4 items-end animate-fade-in">
                                <div><label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1">Kode Alat</label><input type="text" required className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-brand-500 focus:border-brand-500 text-sm" value={newItemForm.id} onChange={e => setNewItemForm({...newItemForm, id: e.target.value.toUpperCase()})} /></div>
                                <div>
                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1">Kategori</label>
                                    <input type="text" required list="category-list" className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-brand-500 focus:border-brand-500 text-sm" value={newItemForm.category} onChange={e => setNewItemForm({...newItemForm, category: e.target.value})} />
                                    <datalist id="category-list">{categories.filter(c => c !== 'Semua').map(c => <option key={c} value={c} />)}</datalist>
                                </div>
                                <div className="md:col-span-2"><label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1">Nama Alat / Model</label><input type="text" required className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-brand-500 focus:border-brand-500 text-sm" value={newItemForm.name} onChange={e => setNewItemForm({...newItemForm, name: e.target.value})} /></div>
                                <div>
                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1">Jumlah</label>
                                    <div className="flex gap-2">
                                        <input type="number" min="1" required className="w-full p-2 border border-slate-300 rounded focus:ring-1 focus:ring-brand-500 focus:border-brand-500 text-sm" value={newItemForm.total} onChange={e => setNewItemForm({...newItemForm, total: e.target.value})} />
                                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded font-bold"><i className="fas fa-save"></i></button>
                                    </div>
                                </div>
                            </form>
                        )}

                        <div className="overflow-x-auto border border-slate-200 rounded-md">
                            <table className="w-full text-left whitespace-nowrap">
                                <thead className="bg-slate-50 border-b border-slate-200 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                                    <tr>
                                        <th className="p-3">Kode Alat</th><th className="p-3">Kategori</th><th className="p-3">Nama Alat / Model</th>
                                        <th className="p-3 text-center">Total</th><th className="p-3 text-center">Tersedia</th><th className="p-3 text-center">Status</th>
                                        {isAdmin && <th className="p-3 text-center">Aksi</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm">
                                    {filteredInventory.map(item => (
                                        <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-3 font-bold text-slate-800">{item.id}</td>
                                            <td className="p-3 text-slate-600">{item.category}</td>
                                            <td className="p-3 font-medium text-slate-800">{item.name}</td>
                                            <td className="p-3 text-center text-slate-600">{item.total}</td>
                                            <td className="p-3 text-center font-bold text-slate-800">{item.available}</td>
                                            <td className="p-3 text-center">
                                                {item.available === 0 ? <span className="bg-red-50 text-red-700 border border-red-200 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Habis</span> : <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Tersedia</span>}
                                            </td>
                                            {isAdmin && (
                                                <td className="p-3 text-center"><button onClick={() => handleDeleteInventoryItem(item.id)} className="text-red-500 hover:bg-red-50 p-1.5 rounded transition"><i className="fas fa-trash-alt"></i></button></td>
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const renderBorrowForm = () => {
                const inventoryByCategory = inventory.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                        <form onSubmit={submitBorrow} className="bg-white p-6 md:p-8 rounded-md border border-slate-200 shadow-sm space-y-6">
                            <h2 className="text-2xl font-bold text-slate-800 border-b border-slate-200 pb-3 tracking-tight">Form Peminjaman Alat</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div><label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Nama Peminjam / Kelompok</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500" value={borrowForm.borrowerName} onChange={e => setBorrowForm({...borrowForm, borrowerName: e.target.value})} placeholder="Contoh: Kelompok 1 - Budi" /></div>
                                <div><label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">NIM / ID Anggota</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500" value={borrowForm.nim} onChange={e => setBorrowForm({...borrowForm, nim: e.target.value})} placeholder="Masukkan NIM" /></div>
                                
                                <div className="md:col-span-2">
                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Keperluan Peminjaman</label>
                                    <select required className="w-full p-2.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 bg-white cursor-pointer" value={borrowForm.purpose} onChange={e => setBorrowForm({...borrowForm, purpose: e.target.value, praktikumCourse: '', praktikumClass: '', praktikumLayanan: ''})}>
                                        <option value="" disabled>-- Pilih Keperluan --</option>
                                        <option value="Praktikum">Praktikum</option>
                                        <option value="Tugas akhir">Tugas Akhir</option>
                                        <option value="Penelitian">Penelitian</option>
                                        <option value="Proyek">Proyek</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                </div>
                                
                                {borrowForm.purpose === 'Praktikum' && (
                                    <div className={`md:col-span-2 grid grid-cols-1 ${borrowForm.praktikumCourse === 'Layanan Praktikum GT' ? 'md:grid-cols-3' : 'md:grid-cols-2'} gap-4 bg-slate-50 p-4 rounded border border-slate-200 animate-fade-in`}>
                                        <div>
                                            <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Mata Kuliah Praktikum</label>
                                            <select required className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 bg-white cursor-pointer" value={borrowForm.praktikumCourse} onChange={e => setBorrowForm({...borrowForm, praktikumCourse: e.target.value, praktikumLayanan: e.target.value !== 'Layanan Praktikum GT' ? '' : borrowForm.praktikumLayanan})}>
                                                <option value="" disabled>-- Pilih Mata Kuliah --</option>
                                                <option value="Layanan Praktikum GT" className="font-bold text-brand-700">Layanan Praktikum GT</option>
                                                <option value="Survei Kontruksi">Survei Kontruksi</option>
                                                <option value="Pemetaan Dasar">Pemetaan Dasar</option>
                                                <option value="Pemetaan Terestris">Pemetaan Terestris</option>
                                                <option value="Hidrografi I">Hidrografi I</option>
                                                <option value="Hidrografi II">Hidrografi II</option>
                                                <option value="Kemah Kerja">Kemah Kerja</option>
                                                <option value="Survei GNSS">Survei GNSS</option>
                                                <option value="Fotogrametri Dasar">Fotogrametri Dasar</option>
                                                <option value="Fotogrametri Lanjut">Fotogrametri Lanjut</option>
                                                <option value="Pemetaan Radar dan LiDAR">Pemetaan Radar dan LiDAR</option>
                                            </select>
                                        </div>
                                        
                                        {borrowForm.praktikumCourse === 'Layanan Praktikum GT' && (
                                            <div className="animate-fade-in">
                                                <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Layanan Praktikum</label>
                                                <select required className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 bg-white cursor-pointer" value={borrowForm.praktikumLayanan} onChange={e => setBorrowForm({...borrowForm, praktikumLayanan: e.target.value})}>
                                                    <option value="" disabled>-- Pilih Layanan --</option>
                                                    <option value="Layanan Teknik Sipil">Layanan Teknik Sipil</option>
                                                    <option value="Layanan Teknik Kelautan">Layanan Teknik Kelautan</option>
                                                    <option value="Layanan Teknik Perkeretaapian">Layanan Teknik Perkeretaapian</option>
                                                    <option value="Layanan Teknik Biosistem">Layanan Teknik Biosistem</option>
                                                    <option value="Layanan Tata Kelola Air Terpadu">Layanan Tata Kelola Air Terpadu</option>
                                                </select>
                                            </div>
                                        )}

                                        <div>
                                            <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Kelas</label>
                                            <select required className="w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 bg-white cursor-pointer" value={borrowForm.praktikumClass} onChange={e => setBorrowForm({...borrowForm, praktikumClass: e.target.value})}>
                                                <option value="" disabled>-- Pilih Kelas --</option>
                                                <option value="RA">RA</option>
                                                <option value="RB">RB</option>
                                                <option value="RC">RC</option>
                                            </select>
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Tanggal & Jam Pengambilan</label>
                                    <div className="flex gap-2 relative">
                                        <input type="date" required className="w-3/5 p-2.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 cursor-pointer" value={borrowForm.borrowDate} onChange={e => setBorrowForm({...borrowForm, borrowDate: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        <input type="time" required className="w-2/5 p-2.5 border border-slate-300 rounded text-sm font-mono font-bold focus:ring-1 focus:ring-brand-500 focus:border-brand-500 cursor-pointer" value={borrowForm.borrowTime} onChange={e => setBorrowForm({...borrowForm, borrowTime: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} title="Klik untuk memilih jam" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Estimasi Tanggal & Jam Pemulangan</label>
                                    <div className="flex gap-2 relative">
                                        <input type="date" required className="w-3/5 p-2.5 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 cursor-pointer" value={borrowForm.returnDateEst} onChange={e => setBorrowForm({...borrowForm, returnDateEst: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        <input type="time" required className="w-2/5 p-2.5 border border-slate-300 rounded text-sm font-mono font-bold focus:ring-1 focus:ring-brand-500 focus:border-brand-500 cursor-pointer" value={borrowForm.returnTimeEst} onChange={e => setBorrowForm({...borrowForm, returnTimeEst: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} title="Klik untuk memilih jam" />
                                    </div>
                                </div>
                                
                                <div className="md:col-span-2">
                                    <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Unggah Surat Izin Peminjaman (PDF/Gambar, Max 3MB)</label>
                                    <input type="file" accept=".pdf, image/jpeg, image/png" ref={fileInputRef} required onChange={handleFileChange} className="w-full text-sm text-slate-600 bg-slate-50 border border-slate-300 rounded p-2 cursor-pointer focus:outline-none focus:ring-1 focus:ring-brand-500" />
                                </div>
                            </div>

                            <div className="border-t border-slate-200 pt-5">
                                <div className="flex justify-between items-center mb-3">
                                    <label className="block text-sm font-bold text-slate-800 tracking-tight">Daftar Alat yang Dipinjam</label>
                                    <button type="button" onClick={handleAddBorrowItem} className="text-[11px] uppercase tracking-wider bg-slate-100 text-slate-700 border border-slate-300 px-3 py-1.5 rounded font-bold hover:bg-slate-200 transition-colors"><i className="fas fa-plus mr-1"></i> Tambah Alat</button>
                                </div>
                                <div className="space-y-3">
                                    {borrowForm.items.map((item, index) => (
                                        <div key={index} className="flex flex-col md:flex-row gap-3 bg-white p-3 rounded border border-slate-200 items-center">
                                            <span className="font-bold text-slate-400 text-sm hidden md:block w-6 text-center">{index + 1}.</span>
                                            <select className="flex-grow w-full p-2 border border-slate-300 rounded text-sm focus:ring-1 focus:ring-brand-500 focus:border-brand-500 cursor-pointer" value={item.itemId} onChange={e => handleBorrowItemChange(index, 'itemId', e.target.value)} required>
                                                <option value="" disabled>-- Pilih Alat Sesuai Kategori --</option>
                                                {Object.keys(inventoryByCategory).map(category => (
                                                    <optgroup key={category} label={category.toUpperCase()}>
                                                        {inventoryByCategory[category].map(inv => (
                                                            <option key={inv.id} value={inv.id} disabled={inv.available === 0}>
                                                                [{inv.id}] {inv.name} - (Tersedia: {inv.available})
                                                            </option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                            <div className="flex items-center w-full md:w-auto gap-3">
                                                <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider md:hidden">Jumlah:</label>
                                                <input type="number" min="1" className="w-full md:w-20 p-2 border border-slate-300 rounded text-center text-sm font-bold focus:ring-1 focus:ring-brand-500 focus:border-brand-500" value={item.quantity} onChange={e => handleBorrowItemChange(index, 'quantity', e.target.value)} required />
                                                {borrowForm.items.length > 1 && (
                                                    <button type="button" onClick={() => handleRemoveBorrowItem(index)} className="p-2 text-slate-400 hover:text-red-600 transition-colors"><i className="fas fa-times text-lg"></i></button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="border-t border-slate-200 pt-6 flex justify-end">
                                <button type="submit" disabled={isSubmitting} className={`w-full md:w-auto text-white font-bold py-2.5 px-8 rounded shadow-sm transition ${isSubmitting ? 'bg-slate-400 cursor-wait' : 'bg-brand-600 hover:bg-brand-700'}`}>
                                    {isSubmitting ? 'Mengirim Data...' : 'Proses Peminjaman'}
                                </button>
                            </div>
                        </form>
                    </div>
                );
            };

            const renderTransactions = () => {
                const getTxCategory = (trx) => {
                    if (trx.status === 'active') {
                        const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                        if (targetDate.getTime() - currentTime.getTime() <= 0) return 'Terlambat';
                        return 'Dipinjam';
                    } else if (trx.status && trx.status.startsWith('completed')) {
                        let isLate = false;
                        if (trx.status.includes('|')) {
                            const safeISOString = trx.status.split('|')[1].replace(' ', 'T');
                            const returnTimestamp = new Date(safeISOString);
                            const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                            if (returnTimestamp.getTime() > targetDate.getTime()) isLate = true;
                        }
                        return isLate ? 'Terlambat' : 'Tepat Waktu';
                    }
                    return 'Tepat Waktu'; 
                };

                const sortedTx = [...transactions].sort((a, b) => {
                    const dateA = parseTargetDate(a.borrowDate, a.borrowTime).getTime();
                    const dateB = parseTargetDate(b.borrowDate, b.borrowTime).getTime();
                    return dateB - dateA;
                });

                const filteredTx = sortedTx.filter(trx => {
                    if (txFilter === 'Semua') return true;
                    return getTxCategory(trx) === txFilter;
                });

                const displayedTx = txLimit === 'Semua' ? filteredTx : filteredTx.slice(0, txLimit);

                return (
                    <div className="space-y-6 animate-fade-in bg-white p-5 md:p-6 rounded-md border border-slate-200 shadow-sm">
                        <h2 className="text-2xl font-bold text-slate-800 border-b border-slate-200 pb-3 tracking-tight">Status & Pengembalian Alat</h2>
                        
                        <div className="flex flex-col md:flex-row justify-between gap-4 bg-slate-50 p-4 rounded border border-slate-200">
                            <div className="flex items-center gap-3">
                                <label className="text-[11px] font-bold text-slate-600 uppercase tracking-wider w-20 md:w-auto">Filter:</label>
                                <select className="w-full md:w-auto p-1.5 border border-slate-300 rounded text-sm bg-white focus:ring-1 focus:ring-brand-500 focus:border-brand-500 font-medium cursor-pointer" value={txFilter} onChange={(e) => setTxFilter(e.target.value)}>
                                    <option value="Semua">Semua Peminjaman</option>
                                    <option value="Dipinjam">Sedang Dipinjam</option>
                                    <option value="Tepat Waktu">Dikembalikan (Tepat Waktu)</option>
                                    <option value="Terlambat">Terlambat (Belum/Sudah Kembali)</option>
                                </select>
                            </div>
                            <div className="flex items-center gap-3">
                                <label className="text-[11px] font-bold text-slate-600 uppercase tracking-wider w-20 md:w-auto">Tampilkan:</label>
                                <select className="w-full md:w-auto p-1.5 border border-slate-300 rounded text-sm bg-white focus:ring-1 focus:ring-brand-500 focus:border-brand-500 font-medium cursor-pointer" value={txLimit} onChange={(e) => setTxLimit(e.target.value === 'Semua' ? 'Semua' : parseInt(e.target.value))}>
                                    <option value={10}>10 Baris Teratas</option>
                                    <option value={25}>25 Baris Teratas</option>
                                    <option value={50}>50 Baris Teratas</option>
                                    <option value="Semua">Semua Data</option>
                                </select>
                            </div>
                        </div>

                        <div className="overflow-x-auto border border-slate-200 rounded-md">
                            {displayedTx.length === 0 ? (
                                <div className="p-10 text-center text-slate-400 bg-white">
                                    <p className="font-medium text-sm">Tidak ada data yang sesuai filter.</p>
                                </div>
                            ) : (
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="bg-slate-50 border-b border-slate-200 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                                        <tr>
                                            <th className="p-3">Info Peminjam</th>
                                            <th className="p-3">Waktu Pinjam</th>
                                            <th className="p-3">Batas Pengembalian</th>
                                            <th className="p-3">Rincian Alat</th>
                                            <th className="p-3 text-center">Status Pengembalian</th>
                                            <th className="p-3 text-center">Aksi / Cetak Bukti</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 bg-white">
                                        {displayedTx.map(trx => {
                                            const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                            const diffMs = targetDate.getTime() - currentTime.getTime();
                                            const isLate = diffMs <= 0;

                                            let rowClass = "hover:bg-slate-50 transition-colors";
                                            if (trx.status === 'active') {
                                                if (isLate) rowClass = "bg-red-50/20 hover:bg-red-50/40 transition-colors";
                                            } else if (trx.status.startsWith('completed|')) {
                                                const returnTimestamp = new Date(trx.status.split('|')[1].replace(' ', 'T'));
                                                if (returnTimestamp.getTime() > targetDate.getTime()) {
                                                    rowClass = "bg-red-50/10 hover:bg-red-50/20 transition-colors";
                                                } else {
                                                    rowClass = "bg-emerald-50/10 hover:bg-emerald-50/20 transition-colors";
                                                }
                                            }

                                            return (
                                            <tr key={trx.id} className={rowClass}>
                                                <td className="p-3 align-top">
                                                    <p className="font-bold text-slate-800">{trx.borrowerName}</p>
                                                    <p className="text-slate-500 text-xs mt-0.5">NIM: <span className="font-semibold">{trx.nim}</span></p>
                                                    {trx.purpose && <span className="inline-block mt-1 bg-slate-100 text-slate-600 border border-slate-200 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">{trx.purpose}</span>}
                                                    
                                                    {trx.approvalFileUrl ? (
                                                        <a href={trx.approvalFileUrl} target="_blank" rel="noopener noreferrer" className="mt-2 text-[10px] text-brand-700 bg-brand-50 border border-brand-200 w-max px-1.5 py-0.5 rounded hover:bg-brand-100 inline-flex items-center transition font-semibold">Buka Surat Izin</a>
                                                    ) : (
                                                        <div className="mt-2 text-[10px] text-slate-500 font-medium"><i className="fas fa-paperclip mr-1"></i>{trx.approvalFileName}</div>
                                                    )}
                                                </td>
                                                <td className="p-3 align-top">
                                                    <div className="flex flex-col gap-1 text-xs">
                                                        <div className="font-medium text-slate-700">{formatDate(trx.borrowDate)}</div>
                                                        <div className="font-mono font-bold text-slate-600">{formatTimeStr(trx.borrowTime)} WIB</div>
                                                    </div>
                                                </td>
                                                <td className="p-3 align-top">
                                                    <div className="flex flex-col gap-1 text-xs">
                                                        <div className="font-medium text-slate-700">{formatDate(trx.returnDateEst)}</div>
                                                        <div className="font-mono font-bold text-slate-600">{formatTimeStr(trx.returnTimeEst)} WIB</div>
                                                    </div>
                                                </td>
                                                <td className="p-3 align-top min-w-[200px]">
                                                    <div className="flex flex-col gap-1">
                                                        {trx.items && trx.items.map((item, idx) => (
                                                            <span key={idx} className="text-xs text-slate-700">
                                                                • {item.nama ? `[${item.kode}] ${item.nama}` : item.name} <span className="font-bold ml-0.5">({item.jumlah || item.quantity}x)</span>
                                                            </span>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="p-3 text-center align-top">
                                                    {renderCountdownBadge(trx.returnDateEst, trx.returnTimeEst, trx.status)}
                                                </td>
                                                <td className="p-3 text-center align-top min-w-[120px]">
                                                    {trx.status === 'active' ? (
                                                        <>
                                                            {isAdmin && (
                                                                <button onClick={() => handleReturn(trx.id)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider w-full mb-1 transition-colors">Kembalikan</button>
                                                            )}
                                                            {!isAdmin && <span className="text-slate-500 text-[10px] font-bold uppercase tracking-wider block mb-2">Menunggu</span>}
                                                        </>
                                                    ) : (
                                                        <span className="text-emerald-600 text-[10px] font-bold uppercase tracking-wider block mb-2"><i className="fas fa-check-circle mr-1"></i> Selesai</span>
                                                    )}
                                                    
                                                    {/* TOMBOL CETAK PDF BARU */}
                                                    <button onClick={() => handlePrintPDF(trx)} className="bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider w-full mb-1 transition-colors flex justify-center items-center gap-1.5 shadow-sm">
                                                        <i className="fas fa-file-pdf text-red-500 text-sm"></i> Cetak PDF
                                                    </button>

                                                    {isAdmin && trx.status !== 'active' && (
                                                        <button onClick={() => handleDelete(trx.id)} className="bg-white text-red-600 border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider w-full mt-1 transition-colors">Hapus</button>
                                                    )}
                                                </td>
                                            </tr>
                                        )})}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                );
            };

            if (isAppLoading) {
                return null; // The initial HTML spinner handles this cleanly now
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50">
                    {notification && (
                        <div className={`fixed top-4 right-4 z-50 px-5 py-3 rounded shadow-lg text-sm font-bold text-white transition-all flex items-center ${notification.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'}`}>
                            {notification.message}
                        </div>
                    )}

                    {/* SIDEBAR PROFESIONAL */}
                    <nav className="bg-slate-900 w-full md:w-64 flex-shrink-0 text-slate-300 flex flex-col shadow-xl z-10 md:min-h-screen border-r border-slate-800">
                        <div className="p-6 bg-slate-950 text-center border-b border-slate-800/50">
                            <div className="w-24 h-24 bg-white rounded-lg mx-auto flex items-center justify-center shadow-inner mb-4 overflow-hidden p-1.5">
                                <img src="logo.jpeg" alt="Logo Monitoring Alat Lab Geomatika" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="text-xs font-black tracking-widest uppercase text-slate-100">Sistem Informasi</h1>
                            <p className="text-brand-400 text-[10px] font-bold uppercase tracking-widest mt-1">Lab Geomatika</p>
                        </div>
                        <div className="flex-grow py-4 space-y-1">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-6 py-3 transition-all text-sm ${activeTab === 'dashboard' ? 'bg-slate-800 text-white border-l-4 border-brand-500 font-semibold' : 'hover:bg-slate-800 hover:text-white font-medium border-l-4 border-transparent'}`}>
                                <i className="fas fa-chart-pie w-5 text-center"></i> <span>Dashboard</span>
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center space-x-3 px-6 py-3 transition-all text-sm ${activeTab === 'inventory' ? 'bg-slate-800 text-white border-l-4 border-brand-500 font-semibold' : 'hover:bg-slate-800 hover:text-white font-medium border-l-4 border-transparent'}`}>
                                <i className="fas fa-clipboard-list w-5 text-center"></i> <span>Database Alat</span>
                            </button>
                            <button onClick={() => setActiveTab('borrow')} className={`w-full flex items-center space-x-3 px-6 py-3 transition-all text-sm ${activeTab === 'borrow' ? 'bg-slate-800 text-white border-l-4 border-brand-500 font-semibold' : 'hover:bg-slate-800 hover:text-white font-medium border-l-4 border-transparent'}`}>
                                <i className="fas fa-edit w-5 text-center"></i> <span>Form Peminjaman</span>
                            </button>
                            <button onClick={() => setActiveTab('transactions')} className={`w-full flex items-center space-x-3 px-6 py-3 transition-all text-sm ${activeTab === 'transactions' ? 'bg-slate-800 text-white border-l-4 border-brand-500 font-semibold' : 'hover:bg-slate-800 hover:text-white font-medium border-l-4 border-transparent'}`}>
                                <i className="fas fa-history w-5 text-center"></i> <span>Pengembalian</span>
                            </button>
                        </div>
                        <div className="p-5 border-t border-slate-800/50 bg-slate-900">
                            <button onClick={handleShareLink} className="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 rounded transition border border-slate-700 text-[11px] font-bold uppercase tracking-wider mb-4">
                                <i className="fas fa-share-alt"></i> <span>Salin Tautan Web</span>
                            </button>
                            <div className="text-[10px] text-slate-500 text-center leading-relaxed font-medium uppercase tracking-widest">
                                &copy; 2026 Lab Geomatika <br/>
                                <span onClick={handleAdminToggle} className="cursor-default hover:text-slate-400 transition-colors">ITERA</span>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-8 overflow-y-auto w-full">
                        <div className="max-w-[1400px] mx-auto">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'inventory' && renderInventory()}
                            {activeTab === 'borrow' && renderBorrowForm()}
                            {activeTab === 'transactions' && renderTransactions()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scrollbar Profesional Kustom */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Scrollbar Global */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</body>
</html>
