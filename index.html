                            <p className="text-xs text-slate-300 mb-6 relative z-10 border-b border-slate-600 pb-4">Bantu kami meningkatkan kualitas layanan Laboratorium Geomatika. Setiap masukan Anda akan terekam secara resmi dalam sistem.</p>
                            
                            <form onSubmit={handleFeedbackSubmit} className="relative z-10 bg-slate-50 p-5 rounded border border-slate-300 shadow-sm">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-1">Nama Lengkap (Opsional)</label>
                                        <input type="text" className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm" value={feedbackForm.name} onChange={e => setFeedbackForm({...feedbackForm, name: e.target.value})} placeholder="Anonim diizinkan" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 mb-1">Kategori Masukan <span className="text-red-600">*</span></label>
                                        <select required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm bg-white cursor-pointer" value={feedbackForm.category} onChange={e => setFeedbackForm({...feedbackForm, category: e.target.value})}>
                                            <option value="" disabled>-- Pilih Kategori --</option>
                                            <option value="Kondisi & Kelengkapan Alat">Kondisi & Kelengkapan Alat</option>
                                            <option value="Fasilitas Laboratorium">Fasilitas Laboratorium</option>
                                            <option value="Pelayanan Staff/Asisten">Pelayanan Staff/Asisten</option>
                                            <option value="Sistem Peminjaman (Web)">Sistem Peminjaman (Aplikasi Web)</option>
                                            <option value="Lainnya">Lainnya</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="mb-4">
                                    <label className="block text-xs font-bold text-slate-700 mb-1">Pesan / Pengaduan <span className="text-red-600">*</span></label>
                                    <textarea required rows="4" className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm" value={feedbackForm.message} onChange={e => setFeedbackForm({...feedbackForm, message: e.target.value})} placeholder="Uraikan masukan atau kendala Anda secara rinci..."></textarea>
                                </div>
                                <div className="flex justify-end">
                                    <button type="submit" disabled={isSubmittingFeedback || !GOOGLE_SCRIPT_INV_FEEDBACK_URL} className={`px-6 py-2.5 rounded text-sm font-bold text-white shadow-sm transition-all flex items-center ${isSubmittingFeedback ? 'bg-indigo-400 cursor-wait' : (!GOOGLE_SCRIPT_INV_FEEDBACK_URL ? 'bg-slate-400 cursor-not-allowed' : 'bg-indigo-700 hover:bg-indigo-800')}`}>
                                        {isSubmittingFeedback ? <><i className="fas fa-spinner fa-spin mr-2"></i> Memproses...</> : <><i className="fas fa-paper-plane mr-2"></i> Kirim Laporan</>}
                                    </button>
                                </div>
                                {!GOOGLE_SCRIPT_INV_FEEDBACK_URL && (
                                    <p className="text-[10px] text-red-500 text-right mt-2 font-medium italic">*Konfigurasi integrasi database belum dilengkapi oleh Administrator.</p>
                                )}
                            </form>
                        </div>
                    </div>
                );
            };

            const renderInventory = () => {
                const categories = ['Semua', ...new Set(inventory.map(item => item.category))];
                const filteredInventory = filterCategory === 'Semua' ? inventory : inventory.filter(item => item.category === filterCategory);

                return (
                    <div className="space-y-6 animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between md:items-end border-b border-slate-300 pb-4 gap-4">
                            <h2 className="text-2xl font-bold text-slate-800">Manajemen Inventaris Laboratorium</h2>
                            <div className="flex gap-2 overflow-x-auto custom-scrollbar pb-1">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setFilterCategory(cat)} className={`px-4 py-1.5 rounded text-xs font-bold whitespace-nowrap transition-colors border ${filterCategory === cat ? 'bg-indigo-700 text-white border-indigo-700 shadow-sm' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {isAdmin && (
                            <div className="mb-4 flex flex-wrap gap-3">
                                <button onClick={() => setShowAddForm(!showAddForm)} className={`px-4 py-2 rounded text-sm font-bold shadow-sm transition flex items-center ${showAddForm ? 'bg-slate-200 text-slate-700 border border-slate-300' : 'bg-indigo-800 text-white hover:bg-indigo-900'}`}>
                                    <i className={`fas ${showAddForm ? 'fa-times' : 'fa-plus'} mr-2`}></i> {showAddForm ? 'Batal Tambah Instrumen' : 'Registrasi Instrumen Baru'}
                                </button>
                                
                                {baseInventory.some(i => i.isLocalOnly) && (
                                    <button onClick={forceSyncToSheet} className="px-4 py-2 rounded text-sm font-bold shadow-sm transition flex items-center bg-amber-600 hover:bg-amber-700 text-white animate-pulse">
                                        <i className="fas fa-cloud-upload-alt mr-2"></i> Sinkronisasi Data Master
                                    </button>
                                )}
                            </div>
                        )}
                        
                        {showAddForm && isAdmin && (
                            <form onSubmit={handleAddNewInventoryItem} className="mb-6 bg-slate-50 p-5 rounded border border-slate-300 shadow-sm grid grid-cols-1 md:grid-cols-5 gap-4 items-end animate-fade-in">
                                <div><label className="block text-xs font-bold text-slate-800 mb-1">Kode Identifikasi</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm bg-white" value={newItemForm.id} onChange={e => setNewItemForm({...newItemForm, id: e.target.value.toUpperCase()})} /></div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-800 mb-1">Kategori</label>
                                    <input type="text" required list="category-list" className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm bg-white" value={newItemForm.category} onChange={e => setNewItemForm({...newItemForm, category: e.target.value})} />
                                    <datalist id="category-list">{categories.filter(c => c !== 'Semua').map(c => <option key={c} value={c} />)}</datalist>
                                </div>
                                <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-800 mb-1">Nomenklatur / Model Alat</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm bg-white" value={newItemForm.name} onChange={e => setNewItemForm({...newItemForm, name: e.target.value})} /></div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-800 mb-1">Kuantitas Base</label>
                                    <div className="flex gap-2">
                                        <input type="number" min="1" required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm bg-white" value={newItemForm.total} onChange={e => setNewItemForm({...newItemForm, total: e.target.value})} />
                                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded font-bold transition-colors"><i className="fas fa-save"></i></button>
                                    </div>
                                </div>
                            </form>
                        )}

                        <div className="bg-white rounded-lg border border-slate-300 overflow-hidden shadow-sm">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-slate-800 text-white">
                                        <tr>
                                            <th className="p-4 text-xs uppercase tracking-wider font-semibold">Kode Identitas</th>
                                            <th className="p-4 text-xs uppercase tracking-wider font-semibold">Kategori Klasifikasi</th>
                                            <th className="p-4 text-xs uppercase tracking-wider font-semibold">Nomenklatur / Model Instrumen</th>
                                            <th className="p-4 text-center text-xs uppercase tracking-wider font-semibold">Stok Master</th>
                                            <th className="p-4 text-center text-xs uppercase tracking-wider font-semibold">Tersedia</th>
                                            <th className="p-4 text-center text-xs uppercase tracking-wider font-semibold">Status Operasional</th>
                                            {isAdmin && <th className="p-4 text-center text-xs uppercase tracking-wider font-semibold">Otorisasi</th>}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                        {filteredInventory.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 text-sm font-bold text-slate-800 font-mono">{item.id}</td>
                                                <td className="p-4"><span className="bg-slate-100 border border-slate-300 text-slate-700 px-2 py-1 rounded text-xs font-bold">{item.category}</span></td>
                                                <td className="p-4 font-semibold text-slate-900 text-sm">
                                                    {item.name}
                                                </td>
                                                <td className="p-4 text-center text-sm font-semibold">{item.total}</td>
                                                <td className="p-4 text-center font-black text-indigo-700 text-lg">{item.available}</td>
                                                <td className="p-4 text-center">
                                                    {item.available === 0 ? <span className="bg-red-50 text-red-700 border border-red-200 px-3 py-1 rounded text-xs font-bold uppercase tracking-wide">Habis</span> : <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1 rounded text-xs font-bold uppercase tracking-wide">Tersedia</span>}
                                                </td>
                                                {isAdmin && (
                                                    <td className="p-4 text-center"><button onClick={() => handleDeleteInventoryItem(item.id)} className="text-red-600 hover:bg-red-100 p-2 rounded transition-colors"><i className="fas fa-trash-alt"></i></button></td>
                                                )}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBorrowForm = () => {
                const inventoryByCategory = inventory.reduce((acc, item) => {
                    if (!acc[item.category]) acc[item.category] = [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                return (
                    <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-slate-800 border-b border-slate-300 pb-3">Registrasi Peminjaman Instrumen</h2>
                        <form onSubmit={submitBorrow} className="bg-white p-6 rounded-lg border border-slate-300 shadow-sm space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div><label className="block text-sm font-bold text-slate-700 mb-1.5">Penanggung Jawab / Kelompok</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 bg-slate-50 transition-all" value={borrowForm.borrowerName} onChange={e => setBorrowForm({...borrowForm, borrowerName: e.target.value})} placeholder="Sesuai dokumen persetujuan" /></div>
                                <div><label className="block text-sm font-bold text-slate-700 mb-1.5">NIM / Nomor Identitas</label><input type="text" required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 bg-slate-50 transition-all" value={borrowForm.nim} onChange={e => setBorrowForm({...borrowForm, nim: e.target.value})} placeholder="123456789" /></div>
                                
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-bold text-slate-700 mb-1.5">Klasifikasi Keperluan</label>
                                    <select required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 bg-white cursor-pointer transition-all" value={borrowForm.purpose} onChange={e => setBorrowForm({...borrowForm, purpose: e.target.value, praktikumCourse: '', praktikumClass: '', praktikumLayanan: ''})}>
                                        <option value="" disabled>-- Tentukan Klasifikasi --</option>
                                        <option value="Praktikum">Kegiatan Praktikum Akademik</option>
                                        <option value="Tugas akhir">Penyusunan Tugas Akhir</option>
                                        <option value="Penelitian">Penelitian Institusional</option>
                                        <option value="Proyek">Proyek Eksternal / Mandiri</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                </div>
                                
                                {borrowForm.purpose === 'Praktikum' && (
                                    <div className={`md:col-span-2 grid grid-cols-1 ${borrowForm.praktikumCourse === 'Layanan Praktikum GT' ? 'md:grid-cols-3' : 'md:grid-cols-2'} gap-4 bg-slate-50 p-5 rounded border border-slate-200 animate-fade-in`}>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1.5">Mata Kuliah Praktikum</label>
                                            <select required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 bg-white cursor-pointer" value={borrowForm.praktikumCourse} onChange={e => setBorrowForm({...borrowForm, praktikumCourse: e.target.value, praktikumLayanan: e.target.value !== 'Layanan Praktikum GT' ? '' : borrowForm.praktikumLayanan})}>
                                                <option value="" disabled>-- Pilih Mata Kuliah --</option>
                                                <option value="Layanan Praktikum GT" className="font-bold text-indigo-700">Layanan Praktikum Terpadu</option>
                                                <option value="Survei Kontruksi">Survei Konstruksi</option>
                                                <option value="Pemetaan Dasar">Pemetaan Dasar</option>
                                                <option value="Pemetaan Terestris">Pemetaan Terestris</option>
                                                <option value="Hidrografi I">Hidrografi I</option>
                                                <option value="Hidrografi II">Hidrografi II</option>
                                                <option value="Kemah Kerja">Kemah Kerja</option>
                                                <option value="Survei GNSS">Survei GNSS</option>
                                                <option value="Fotogrametri Dasar">Fotogrametri Dasar</option>
                                                <option value="Fotogrametri Lanjut">Fotogrametri Lanjut</option>
                                                <option value="Pemetaan Radar dan LiDAR">Pemetaan Radar dan LiDAR</option>
                                            </select>
                                        </div>
                                        
                                        {borrowForm.praktikumCourse === 'Layanan Praktikum GT' && (
                                            <div className="animate-fade-in">
                                                <label className="block text-sm font-bold text-slate-700 mb-1.5">Layanan Akademik Program Studi</label>
                                                <select required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 bg-white cursor-pointer" value={borrowForm.praktikumLayanan} onChange={e => setBorrowForm({...borrowForm, praktikumLayanan: e.target.value})}>
                                                    <option value="" disabled>-- Pilih Program Studi Layanan --</option>
                                                    <option value="Layanan Teknik Sipil">Layanan Prodi Teknik Sipil</option>
                                                    <option value="Layanan Teknik Kelautan">Layanan Prodi Teknik Kelautan</option>
                                                    <option value="Layanan Teknik Perkeretaapian">Layanan Prodi Teknik Perkeretaapian</option>
                                                    <option value="Layanan Teknik Biosistem">Layanan Prodi Teknik Biosistem</option>
                                                    <option value="Layanan Tata Kelola Air Terpadu">Layanan Prodi TKAT</option>
                                                </select>
                                            </div>
                                        )}

                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1.5">Klasifikasi Kelas</label>
                                            <select required className="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 bg-white cursor-pointer" value={borrowForm.praktikumClass} onChange={e => setBorrowForm({...borrowForm, praktikumClass: e.target.value})}>
                                                <option value="" disabled>-- Identifikasi Kelas --</option>
                                                <option value="RA">Reguler A (RA)</option>
                                                <option value="RB">Reguler B (RB)</option>
                                                <option value="RC">Reguler C (RC)</option>
                                            </select>
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1.5">Waktu Pengeluaran Instrumen</label>
                                    <div className="flex gap-2 relative">
                                        <input type="date" required className="w-3/5 p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm cursor-pointer bg-white" value={borrowForm.borrowDate} onChange={e => setBorrowForm({...borrowForm, borrowDate: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        <input type="time" required className="w-2/5 p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm font-bold cursor-pointer bg-white" value={borrowForm.borrowTime} onChange={e => setBorrowForm({...borrowForm, borrowTime: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} title="Tentukan Waktu" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1.5">Batas Waktu Pemulangan Instrumen</label>
                                    <div className="flex gap-2 relative">
                                        <input type="date" required className="w-3/5 p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm cursor-pointer bg-white" value={borrowForm.returnDateEst} onChange={e => setBorrowForm({...borrowForm, returnDateEst: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        <input type="time" required className="w-2/5 p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 text-sm font-bold cursor-pointer bg-white" value={borrowForm.returnTimeEst} onChange={e => setBorrowForm({...borrowForm, returnTimeEst: e.target.value})} onClick={(e) => e.target.showPicker && e.target.showPicker()} title="Tentukan Waktu" />
                                    </div>
                                </div>
                                
                                <div className="md:col-span-2 bg-indigo-50 p-5 rounded border border-indigo-200 mt-2">
                                    <label className="block text-sm font-bold text-indigo-900 mb-2"><i className="fas fa-file-signature mr-2"></i> Dokumen Otorisasi (Unggah PDF/Gambar Surat Izin, Maks 3MB)</label>
                                    <input type="file" accept=".pdf, image/jpeg, image/png" ref={fileInputRef} required onChange={handleFileChange} className="w-full text-sm text-slate-700 bg-white border border-indigo-300 rounded p-2.5 cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-all" />
                                </div>
                            </div>

                            <div className="border-t border-slate-200 pt-5">
                                <div className="flex justify-between items-center mb-4">
                                    <label className="block text-sm font-bold text-slate-800">Spesifikasi Instrumen yang Diajukan</label>
                                    <button type="button" onClick={handleAddBorrowItem} className="text-sm bg-indigo-100 text-indigo-800 border border-indigo-200 px-4 py-2 rounded font-bold hover:bg-indigo-200 transition-colors shadow-sm"><i className="fas fa-plus mr-1"></i> Tambah Entri Alat</button>
                                </div>
                                <div className="space-y-3">
                                    {borrowForm.items.map((item, index) => (
                                        <div key={index} className="flex flex-col md:flex-row gap-3 bg-slate-50 p-4 rounded border border-slate-300 items-center">
                                            <span className="font-bold text-slate-400 hidden md:block w-6 text-center">{index + 1}.</span>
                                            <select className="flex-grow w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-600 cursor-pointer bg-white font-medium" value={item.itemId} onChange={e => handleBorrowItemChange(index, 'itemId', e.target.value)} required>
                                                <option value="" disabled>-- Spesifikasikan Instrumen Master --</option>
                                                {Object.keys(inventoryByCategory).map(category => (
                                                    <optgroup key={category} label={`--- KATEGORI: ${category.toUpperCase()} ---`}>
                                                        {inventoryByCategory[category].map(inv => (
                                                            <option key={inv.id} value={inv.id} disabled={inv.available === 0}>
                                                                [{inv.id}] {inv.name} - (Sisa Kuota: {inv.available})
                                                            </option>
                                                        ))}
                                                    </optgroup>
                                                ))}
                                            </select>
                                            <div className="flex items-center w-full md:w-auto gap-3">
                                                <label className="text-xs font-bold text-slate-600 md:hidden">Kuantitas:</label>
                                                <input type="number" min="1" className="w-full md:w-24 p-2.5 border border-slate-300 rounded text-center font-bold bg-white focus:ring-2 focus:ring-indigo-600" value={item.quantity} onChange={e => handleBorrowItemChange(index, 'quantity', e.target.value)} required />
                                                {borrowForm.items.length > 1 && (
                                                    <button type="button" onClick={() => handleRemoveBorrowItem(index)} className="p-2.5 text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 rounded transition-colors" title="Hapus Baris"><i className="fas fa-trash-alt"></i></button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="border-t border-slate-200 pt-6 flex justify-end">
                                <button type="submit" disabled={isSubmitting} className={`w-full md:w-auto text-white font-bold py-3 px-10 rounded shadow-md transition-all uppercase tracking-wide text-sm ${isSubmitting ? 'bg-indigo-400 cursor-wait' : 'bg-indigo-700 hover:bg-indigo-800'}`}>
                                    {isSubmitting ? <><i className="fas fa-spinner fa-spin mr-2"></i> Otorisasi Berjalan...</> : <><i className="fas fa-paper-plane mr-2"></i> Proses Registrasi Otorisasi</>}
                                </button>
                            </div>
                        </form>
                    </div>
                );
            };

            const renderTransactions = () => {
                const getTxCategory = (trx) => {
                    if (trx.status === 'active') {
                        const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                        if (targetDate.getTime() - currentTime.getTime() <= 0) return 'Terlambat';
                        return 'Dipinjam';
                    } else if (trx.status && trx.status.startsWith('completed')) {
                        let isLate = false;
                        if (trx.status.includes('|')) {
                            const safeISOString = trx.status.split('|')[1].replace(' ', 'T');
                            const returnTimestamp = new Date(safeISOString);
                            const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                            if (returnTimestamp.getTime() > targetDate.getTime()) isLate = true;
                        }
                        return isLate ? 'Terlambat' : 'Tepat Waktu';
                    }
                    return 'Tepat Waktu'; 
                };

                const sortedTx = [...transactions].sort((a, b) => {
                    const dateA = parseTargetDate(a.borrowDate, a.borrowTime).getTime();
                    const dateB = parseTargetDate(b.borrowDate, b.borrowTime).getTime();
                    return dateB - dateA;
                });

                const filteredTx = sortedTx.filter(trx => {
                    if (txFilter === 'Semua') return true;
                    return getTxCategory(trx) === txFilter;
                });

                const displayedTx = txLimit === 'Semua' ? filteredTx : filteredTx.slice(0, txLimit);

                return (
                    <div className="space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-slate-800 border-b border-slate-300 pb-3">Log Transaksi & Pengembalian Dokumen</h2>
                        
                        <div className="flex flex-col md:flex-row justify-between gap-4 bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-3">
                                <label className="text-sm font-bold text-slate-700 w-24 md:w-auto"><i className="fas fa-filter mr-1 text-indigo-600"></i> Kriteria Filter:</label>
                                <select className="w-full md:w-auto p-2 border border-slate-300 rounded text-sm bg-white focus:ring-2 focus:ring-indigo-600 font-medium cursor-pointer" value={txFilter} onChange={(e) => setTxFilter(e.target.value)}>
                                    <option value="Semua">Menampilkan Semua Arsip</option>
                                    <option value="Dipinjam">Operasional (Belum Kembali)</option>
                                    <option value="Tepat Waktu">Selesai (Tepat Waktu)</option>
                                    <option value="Terlambat">Selesai/Operasional (Terdapat Keterlambatan)</option>
                                </select>
                            </div>
                            <div className="flex items-center gap-3">
                                <label className="text-sm font-bold text-slate-700 w-24 md:w-auto"><i className="fas fa-list-ol mr-1 text-indigo-600"></i> Pembatasan Entri:</label>
                                <select className="w-full md:w-auto p-2 border border-slate-300 rounded text-sm bg-white focus:ring-2 focus:ring-indigo-600 font-medium cursor-pointer" value={txLimit} onChange={(e) => setTxLimit(e.target.value === 'Semua' ? 'Semua' : parseInt(e.target.value))}>
                                    <option value={10}>Batasi 10 Arsip Teratas</option>
                                    <option value={25}>Batasi 25 Arsip Teratas</option>
                                    <option value={50}>Batasi 50 Arsip Teratas</option>
                                    <option value="Semua">Akses Seluruh Arsip</option>
                                </select>
                            </div>
                        </div>

                        <div className="bg-white rounded-lg border border-slate-300 overflow-hidden shadow-sm">
                            {displayedTx.length === 0 ? (
                                <div className="p-10 text-center text-slate-400">
                                    <i className="fas fa-clipboard-check text-5xl mb-4 opacity-30"></i>
                                    <p className="font-medium text-lg">Basis data tidak memuat arsip dengan kriteria tersebut.</p>
                                </div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-800 text-white">
                                            <tr>
                                                <th className="p-4 text-xs uppercase tracking-wider font-semibold">Identitas Peminjam</th>
                                                <th className="p-4 text-left text-xs uppercase tracking-wider font-semibold">Waktu Penarikan</th>
                                                <th className="p-4 text-left text-xs uppercase tracking-wider font-semibold">Tenggat Waktu Otorisasi</th>
                                                <th className="p-4 text-xs uppercase tracking-wider font-semibold">Rincian Muatan</th>
                                                <th className="p-4 text-center text-xs uppercase tracking-wider font-semibold">Validasi Pengembalian</th>
                                                <th className="p-4 text-center text-xs uppercase tracking-wider font-semibold">Tindakan Otoritas</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-200">
                                            {displayedTx.map(trx => {
                                                const targetDate = parseTargetDate(trx.returnDateEst, trx.returnTimeEst);
                                                const diffMs = targetDate.getTime() - currentTime.getTime();
                                                const isLate = diffMs <= 0;

                                                let rowClass = "hover:bg-slate-50 transition-colors";
                                                if (trx.status === 'active') {
                                                    if (isLate) rowClass = "bg-red-50/50 hover:bg-red-100 transition-colors";
                                                } else if (trx.status.startsWith('completed|')) {
                                                    const returnTimestamp = new Date(trx.status.split('|')[1].replace(' ', 'T'));
                                                    if (returnTimestamp.getTime() > targetDate.getTime()) {
                                                        rowClass = "bg-red-50/30 hover:bg-red-50 transition-colors";
                                                    } else {
                                                        rowClass = "bg-emerald-50/30 hover:bg-emerald-50 transition-colors";
                                                    }
                                                }

                                                return (
                                                <tr key={trx.id} className={rowClass}>
                                                    <td className="p-4 align-top">
                                                        <p className="font-bold text-slate-900 text-base">{trx.borrowerName}</p>
                                                        <p className="text-slate-600 text-xs mt-0.5">Identitas: <span className="font-semibold font-mono">{trx.nim}</span></p>
                                                        {trx.purpose && <p className="text-indigo-700 text-xs font-bold mt-1 bg-indigo-50 border border-indigo-100 px-1.5 py-0.5 rounded w-max"><i className="fas fa-tag mr-1"></i> {trx.purpose}</p>}
                                                        
                                                        {/* Link untuk membuka file jika Google Script mengembalikan URL File Google Drive */}
                                                        {trx.approvalFileUrl ? (
                                                            <a href={trx.approvalFileUrl} target="_blank" rel="noopener noreferrer" className="mt-2 text-xs text-indigo-700 bg-indigo-100 border border-indigo-200 w-max px-2 py-1 rounded shadow-sm hover:bg-indigo-200 inline-flex items-center transition font-bold"><i className="fas fa-external-link-alt mr-1 text-red-600"></i> Cek Dokumen Akses</a>
                                                        ) : (
                                                            <div className="mt-2 text-xs text-slate-500 bg-slate-100 border border-slate-200 w-max px-2 py-1 rounded"><i className="fas fa-file-archive mr-1"></i> {trx.approvalFileName}</div>
                                                        )}
                                                    </td>
                                                    <td className="p-4 align-top whitespace-nowrap">
                                                        <div className="flex flex-col gap-2 text-sm">
                                                            <div className="flex items-center text-indigo-700 font-medium">
                                                                <i className="far fa-calendar-alt w-5 text-center mt-0.5"></i>
                                                                <div className="flex flex-col ml-1">
                                                                    <span className="text-slate-800 font-bold">{formatDate(trx.borrowDate)}</span>
                                                                    <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wide">{formatDay(trx.borrowDate)}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center text-indigo-700 mt-0.5">
                                                                <i className="far fa-clock w-5 text-center"></i>
                                                                <span className="ml-1 bg-white border border-indigo-200 text-indigo-800 px-2 py-0.5 rounded shadow-sm font-mono font-bold tracking-widest text-xs">
                                                                    {formatTimeStr(trx.borrowTime)} WIB
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 align-top whitespace-nowrap">
                                                        <div className="flex flex-col gap-2 text-sm">
                                                            <div className="flex items-center text-red-600 font-medium">
                                                                <i className="far fa-calendar-check w-5 text-center mt-0.5"></i>
                                                                <div className="flex flex-col ml-1">
                                                                    <span className="text-slate-800 font-bold">{formatDate(trx.returnDateEst)}</span>
                                                                    <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wide">{formatDay(trx.returnDateEst)}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center text-red-600 mt-0.5">
                                                                <i className="far fa-clock w-5 text-center"></i>
                                                                <span className="ml-1 bg-white border border-red-200 text-red-800 px-2 py-0.5 rounded shadow-sm font-mono font-bold tracking-widest text-xs">
                                                                    {formatTimeStr(trx.returnTimeEst)} WIB
                                                                </span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 align-top">
                                                        <div className="flex flex-col gap-1.5 w-max">
                                                            {trx.items && trx.items.map((item, idx) => (
                                                                <span key={idx} className="bg-white border border-slate-300 text-[11px] px-2.5 py-1 rounded shadow-sm text-slate-700 font-semibold w-full block">
                                                                    {item.nama ? `[${item.kode}] ${item.nama}` : item.name} <span className="text-indigo-700 ml-1 font-bold">({item.jumlah || item.quantity} Unit)</span>
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="p-4 text-center align-top">
                                                        {renderCountdownBadge(trx.returnDateEst, trx.returnTimeEst, trx.status)}
                                                    </td>
                                                    <td className="p-4 text-center align-top">
                                                        {trx.status === 'active' ? (
                                                            isAdmin ? (
                                                                <button onClick={() => handleReturn(trx.id)} className="bg-emerald-600 hover:bg-emerald-700 border border-emerald-700 text-white px-4 py-2 rounded text-xs font-bold w-full mb-2 shadow-sm transition"><i className="fas fa-check-double mr-1"></i> Konfirmasi Kembali</button>
                                                            ) : (
                                                                <span className="text-orange-600 text-[11px] italic font-bold block mb-2 uppercase tracking-wide border border-orange-200 bg-orange-50 py-1 rounded">Dalam Operasional</span>
                                                            )
                                                        ) : (
                                                            <span className="text-slate-500 text-[11px] italic font-bold block mb-2 uppercase tracking-wide border border-slate-300 bg-slate-100 py-1 rounded">Otorisasi Selesai</span>
                                                        )}
                                                        
                                                        {/* Tombol Cetak PDF yang ditambahkan */}
                                                        <button onClick={() => handlePrintPDF(trx)} className="bg-indigo-50 text-indigo-700 border border-indigo-300 hover:bg-indigo-100 px-4 py-2 rounded text-xs font-bold w-full mb-2 shadow-sm transition flex items-center justify-center"><i className="fas fa-file-pdf mr-2 text-red-600 text-sm"></i> Unduh Berita Acara</button>

                                                        {isAdmin && (
                                                            <button onClick={() => handleDelete(trx.id)} className="bg-red-600 hover:bg-red-700 border border-red-700 text-white px-4 py-2 rounded text-xs font-bold w-full shadow-sm transition"><i className="fas fa-eraser mr-1"></i> Hapus Arsip</button>
                                                        )}
                                                    </td>
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            if (isAppLoading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50">
                        <i className="fas fa-circle-notch fa-spin text-4xl text-indigo-700 mb-5"></i>
                        <h2 className="text-xl font-bold text-slate-800 tracking-wide">Sinkronisasi Basis Data Pusat...</h2>
                        <p className="text-slate-500 text-sm mt-2 font-medium">Melakukan otentikasi riwayat instrumen laboratorium</p>
                    </div>
                )
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-100">
                    {notification && (
                        <div className={`fixed top-6 right-6 z-50 px-6 py-4 rounded shadow-2xl text-white font-bold transition-all flex items-center tracking-wide border-b-4 ${notification.type === 'error' ? 'bg-red-800 border-red-500' : 'bg-emerald-800 border-emerald-500'}`}>
                            <i className={`fas ${notification.type === 'error' ? 'fa-times-circle' : 'fa-check-circle'} text-2xl mr-3 opacity-90`}></i> {notification.message}
                        </div>
                    )}

                    <nav className="bg-slate-900 w-full md:w-72 flex-shrink-0 text-white flex flex-col shadow-2xl z-10 md:min-h-screen border-r border-slate-800">
                        <div className="p-6 bg-slate-950 text-center border-b border-slate-800">
                            <div className="w-28 h-28 bg-white rounded-lg mx-auto flex items-center justify-center shadow-lg mb-4 p-2 border-2 border-indigo-900">
                                <img src="logo.jpeg" alt="Logo Monitoring Alat Lab Geomatika" className="w-full h-full object-contain" onerror="this.src='https://placehold.co/400x400/ffffff/4f46e5?text=Lab+Geo'" />
                            </div>
                            <h1 className="text-xs font-black tracking-widest leading-tight uppercase text-slate-400">Sistem Informasi Pusat</h1>
                            <p className="text-indigo-400 text-sm font-bold mt-1 tracking-wide">LABORATORIUM GEOMATIKA</p>
                        </div>
                        <div className="flex-grow p-4 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center space-x-3 px-5 py-3.5 rounded transition-all border-l-4 ${activeTab === 'dashboard' ? 'bg-slate-800 text-indigo-400 border-indigo-500 font-bold shadow-md' : 'border-transparent text-slate-400 hover:bg-slate-800/50 hover:text-slate-300 font-medium'}`}><i className="fas fa-chart-pie w-5 text-center"></i> <span>Dashboard</span></button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full flex items-center space-x-3 px-5 py-3.5 rounded transition-all border-l-4 ${activeTab === 'inventory' ? 'bg-slate-800 text-indigo-400 border-indigo-500 font-bold shadow-md' : 'border-transparent text-slate-400 hover:bg-slate-800/50 hover:text-slate-300 font-medium'}`}><i className="fas fa-server w-5 text-center"></i> <span>Database Instrumen</span></button>
                            <button onClick={() => setActiveTab('borrow')} className={`w-full flex items-center space-x-3 px-5 py-3.5 rounded transition-all border-l-4 ${activeTab === 'borrow' ? 'bg-slate-800 text-indigo-400 border-indigo-500 font-bold shadow-md' : 'border-transparent text-slate-400 hover:bg-slate-800/50 hover:text-slate-300 font-medium'}`}><i className="fas fa-file-signature w-5 text-center"></i> <span>Registrasi Peminjaman</span></button>
                            <button onClick={() => setActiveTab('transactions')} className={`w-full flex items-center space-x-3 px-5 py-3.5 rounded transition-all border-l-4 ${activeTab === 'transactions' ? 'bg-slate-800 text-indigo-400 border-indigo-500 font-bold shadow-md' : 'border-transparent text-slate-400 hover:bg-slate-800/50 hover:text-slate-300 font-medium'}`}><i className="fas fa-archive w-5 text-center"></i> <span>Arsip & Validasi Serah Terima</span></button>
                        </div>
                        <div className="p-4 border-t border-slate-800 bg-slate-950">
                            <button onClick={handleShareLink} className="w-full flex items-center justify-center space-x-2 bg-indigo-900 hover:bg-indigo-800 border border-indigo-700 text-indigo-100 py-3 rounded transition text-xs font-bold uppercase tracking-wider mb-5"><i className="fas fa-link"></i> <span>Salin Tautan Portal</span></button>
                            <div className="text-[10px] text-slate-600 text-center leading-relaxed font-semibold tracking-wide">
                                &copy; 2026 LABORATORIUM GEOMATIKA <br/>
                                INSTITUT <span onClick={handleAdminToggle} className="cursor-default">TEKNOLOGI</span> SUMATERA
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow p-4 md:p-8 overflow-y-auto w-full">
                        <div className="max-w-7xl mx-auto">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'inventory' && renderInventory()}
                            {activeTab === 'borrow' && renderBorrowForm()}
                            {activeTab === 'transactions' && renderTransactions()}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.7rem center; background-size: 1em; }
    </style>
</body>
</html>
